<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas Fiscais</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #334155;
    text-align: left;
}

button {
    background: #22c55e;
    border: none;
    padding: 8px 12px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #16a34a;
}
</style>

</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
    <th>ID Pedido</th>
    <th>Cliente</th>
    <th>CPF/CNPJ</th>
    <th>Email</th>
    <th>Serviço</th>
    <th>Valor</th>
    <th>Ação</th>
</tr>
</thead>

<tbody id="tabelaPedidos"></tbody>
</table>

<script>

// 🔥 COLE A URL DO MAKE AQUI
const WEBHOOK_URL = "https://hook.us2.make.com/nuq3e37vp5tkkpxtef51nqf51n63rssa";

// Dados simulados (depois podemos puxar da planilha)
const pedidos = [
    {
        id: "1234",
        nome: "Renato",
        cpf: "2224433",
        email: "cliente@email.com",
        servico: "corte tamanho x11",
        valor: 50
    }
];

// Renderizar tabela
function carregarPedidos() {
    const tabela = document.getElementById("tabelaPedidos");
    tabela.innerHTML = "";

    pedidos.forEach(p => {
        tabela.innerHTML += `
            <tr>
                <td>${p.id}</td>
                <td>${p.nome}</td>
                <td>${p.cpf}</td>
                <td>${p.email}</td>
                <td>${p.servico}</td>
                <td>R$ ${p.valor}</td>
                <td>
                    <button onclick="emitirNota('${p.id}')">
                        Emitir Nota
                    </button>
                </td>
            </tr>
        `;
    });
}

// 🚀 Enviar para o Make
function emitirNota(id) {

    const pedido = pedidos.find(p => p.id === id);

    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id_pedido: pedido.id,
            nome: pedido.nome,
            cpf_cnpj: pedido.cpf,
            email: pedido.email,
            servico: pedido.servico,
            valor: pedido.valor
        })
    })
    .then(() => {
        alert("Nota enviada com sucesso para o pedido " + id);
    })
    .catch(() => {
        alert("Erro ao enviar nota");
    });
}

// Inicializar
carregarPedidos();

</script>

</body>
</html>
