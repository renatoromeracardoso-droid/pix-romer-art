<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Notas</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    button {
      padding: 8px 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>1234</td>
      <td>Renato</td>
      <td>2224433</td>
      <td>rrerelk@fjkfkç</td>
      <td>
        <button onclick="emitirNota(
          1234,
          'Renato',
          '2224433',
          'rrerelk@fjkfkç',
          'corte tamanho x11',
          50
        )">
          Emitir Nota
        </button>
      </td>
    </tr>
  </tbody>
</table>

<script>
function emitirNota(id, nome, cpf, email, servico, valor) {

  const url = "https://hook.us2.make.com/nuq3e37vp5tkkpxtef51nqf51n63rssa";

  fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id_pedido: id,
      nome: nome,
      cpf_cnpj: cpf,
      email: email,
      servico: servico,
      valor: valor
    })
  })
  .then(response => {
    alert("✅ Nota enviada para o Make!");
  })
  .catch(error => {
    alert("❌ Erro ao enviar");
    console.error(error);
  });

}
</script>

</body>
</html>
