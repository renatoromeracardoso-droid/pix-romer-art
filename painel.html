<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Notas</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    button {
      padding: 8px 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody id="tabela"></tbody>
</table>

<script>

const API_URL = "http://localhost:3000/pedidos";

function carregarPedidos() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const tabela = document.getElementById("tabela");
      tabela.innerHTML = "";

      data.forEach(pedido => {
        tabela.innerHTML += `
          <tr>
            <td>${pedido["ID Pedido"]}</td>
            <td>${pedido["Nome"]}</td>
            <td>${pedido["CPF/CNPJ"]}</td>
            <td>${pedido["Email"]}</td>
            <td>
              <button onclick="emitirNota(
                '${pedido["ID Pedido"]}',
                '${pedido["Nome"]}',
                '${pedido["CPF/CNPJ"]}',
                '${pedido["Email"]}',
                '${pedido["Servico"]}',
                '${pedido["Valor"]}'
              )">
                Emitir Nota
              </button>
            </td>
          </tr>
        `;
      });

    })
    .catch(err => {
      console.error("Erro ao carregar pedidos", err);
    });
}

function emitirNota(id, nome, cpf, email, servico, valor) {

  const url = "https://hook.us2.make.com/nuq3e37vp5tkkpxtef51nqf51n63rssa";

  fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id_pedido: id,
      nome: nome,
      cpf_cnpj: cpf,
      email: email,
      servico: servico,
      valor: valor
    })
  })
  .then(response => {
    alert("✅ Nota enviada!");
  })
  .catch(error => {
    alert("❌ Erro ao enviar");
    console.error(error);
  });

}

// carrega automático
carregarPedidos();

</script>

</body>
</html>
