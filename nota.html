<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nota Fiscal</title>

<style>
body {
  font-family: monospace;
  background: #e5e7eb;
  padding: 20px;
}

.nota {
  background: white;
  max-width: 350px;
  margin: auto;
  padding: 20px;
  border-radius: 8px;
}

/* 🔥 ESSENCIAL PARA PDF */
@media print {
  body {
    background: white;
    padding: 0;
  }
}

.center { text-align: center; }
.bold { font-weight: bold; }

hr {
  border: none;
  border-top: 1px dashed #000;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="nota" id="nota">
Carregando...
</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const autoPDF = params.get("pdf"); // 🔥 novo

async function carregarNota() {

  const res = await fetch(API);
  const dados = await res.json();

  const p = dados.find(x => x["ID Pedido"] == id);

  if (!p) {
    document.getElementById("nota").innerHTML = "Pedido não encontrado";
    return;
  }

  document.getElementById("nota").innerHTML = `
    <div class="center bold">ROMER ART</div>
    <div class="center">CNPJ: 66.252.416/0001-05</div>
    <div class="center">São Paulo - SP</div>

    <hr>

    <div class="center bold">DANFE NFC-e</div>
    <div class="center">Documento Auxiliar</div>

    <hr>

    Pedido: ${id}<br>
    Data da compra: ${p["Data"] || "-"}

    <hr>

    ${p["Serviço"]}

    <hr>

    VALOR TOTAL: <b>R$ ${p["Valor"]}</b>

    <hr>

    FORMA DE PAGAMENTO<br>
    PIX

    <hr>

    ${p["Nome"]}<br>
    CPF: ${p["CPF/CNPJ"]}

    <hr>

    <div class="center">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}">
    </div>

    <hr>

    <div class="center">Documento gerado automaticamente</div>
  `;

  /* 🔥 AUTO PDF */
  if (autoPDF == "1") {
    setTimeout(() => {
      window.print();
    }, 800);
  }
}

carregarNota();

</script>

</body>
</html>
