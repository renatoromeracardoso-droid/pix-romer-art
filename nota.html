<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANFE NFC-e</title>

<style>
body {
  font-family: monospace;
  background: #e5e7eb;
  padding: 20px;
}

.nota {
  background: white;
  max-width: 360px;
  margin: auto;
  padding: 15px;
  border-radius: 6px;
}

.center { text-align: center; }
.bold { font-weight: bold; }

hr {
  border: none;
  border-top: 1px dashed #000;
  margin: 8px 0;
}

.small { font-size: 12px; }
</style>
</head>

<body>

<div class="nota" id="nota">
Carregando...
</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const autoPDF = params.get("pdf");

/* 🔥 cálculo tributo simples (IBPT médio) */
function calcularTributo(valor){
  return (valor * 0.068).toFixed(2); // ~6.8%
}

async function carregar(){

  const res = await fetch(API);
  const dados = await res.json();

  const p = dados.find(x => x["ID Pedido"] == id);

  if(!p){
    document.getElementById("nota").innerHTML = "Pedido não encontrado";
    return;
  }

  const valor = parseFloat(p["Valor"] || 0);
  const tributo = calcularTributo(valor);

  document.getElementById("nota").innerHTML = `

<div class="center bold">ROMER ART Laser & Design</div>
<div class="center small">São Paulo - SP</div>
<div class="center small">CNPJ: 66.252.416/0001-05</div>

<hr>

<div class="center bold">DANFE NFC-e</div>
<div class="center small">
Documento Auxiliar da Nota Fiscal<br>
do Consumidor Eletrônica<br>
Não permite aproveitamento de crédito de ICMS
</div>

<hr>

Pedido: ${id}<br>
Data da compra: ${p["Data"] || "-"}

<hr>

ITEM  COD  DESCRIÇÃO<br>


1   1   ${p["Serviço"]}

<hr>

QTD TOTAL DE ITENS: 1<br>
VALOR TOTAL: R$ ${valor.toFixed(2)}

<hr>

FORMA DE PAGAMENTO<br>
PIX<br>
VALOR PAGO: R$ ${valor.toFixed(2)}

<hr>

Val aprox dos tributos: R$ ${tributo} (6.8%)

<hr>

Emitido pelo software RomerArt<br>
Versão 1.0.0<br>
HOMOLOGAÇÃO - SEM VALOR FISCAL

<hr>

${p["Nome"]}<br>
CPF/CNPJ: ${p["CPF/CNPJ"]}

<hr>

<div class="center">
Consulta via QR Code
<br><br>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}">
</div>

<hr>

<div class="center small">
Documento gerado automaticamente<br>
RomerArt SaaS
</div>

`;

  /* 🔥 PDF automático */
  if(autoPDF == "1"){
    setTimeout(()=>window.print(), 700);
  }
}

carregar();

</script>

</body>
</html>
