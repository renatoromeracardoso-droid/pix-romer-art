<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nota Fiscal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #e5e7eb;
  margin: 0;
  padding: 20px;
}

.nota {
  background: #fff;
  max-width: 800px;
  margin: auto;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

/* HEADER */
.topo {
  display: flex;
  justify-content: space-between;
  border-bottom: 2px solid #000;
  padding-bottom: 10px;
}

.empresa {
  font-size: 14px;
}

.nf-box {
  text-align: right;
}

.nf-num {
  font-size: 18px;
  font-weight: bold;
}

/* CLIENTE */
.bloco {
  margin-top: 15px;
  border: 1px solid #000;
  padding: 10px;
}

.titulo {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 13px;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #000;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #f3f4f6;
}

/* TOTAL */
.total {
  text-align: right;
  margin-top: 10px;
  font-size: 16px;
  font-weight: bold;
}

/* RODAPÉ */
.footer {
  margin-top: 20px;
  font-size: 12px;
  text-align: center;
  color: #555;
}
</style>
</head>

<body>

<div class="nota">

  <!-- CABEÇALHO -->
  <div class="topo">
    <div class="empresa">
      <strong>ROMER ART</strong><br>
      CNPJ: 00.000.000/0001-00<br>
      São Paulo - SP
    </div>

    <div class="nf-box">
      <div>NOTA FISCAL</div>
      <div class="nf-num" id="pedido"></div>
      <div id="data"></div>
    </div>
  </div>

  <!-- CLIENTE -->
  <div class="bloco">
    <div class="titulo">DADOS DO CLIENTE</div>
    <div><b>Nome:</b> <span id="cliente"></span></div>
    <div><b>CPF/CNPJ:</b> <span id="cpf"></span></div>
  </div>

  <!-- SERVIÇO -->
  <div class="bloco">
    <div class="titulo">DESCRIÇÃO DOS SERVIÇOS</div>

    <table>
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Valor</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td id="servico"></td>
          <td id="valor"></td>
        </tr>
      </tbody>
    </table>

    <div class="total">
      Total: <span id="valorTotal"></span>
    </div>
  </div>

  <!-- RODAPÉ -->
  <div class="footer">
    Documento gerado automaticamente • RomerArt Sistema SaaS
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const pedido = params.get("id");
const nome = params.get("nome");
const cpf = params.get("cpf");
const servico = params.get("servico");
const valor = params.get("valor");

document.getElementById("pedido").innerText = "NF-" + pedido;
document.getElementById("cliente").innerText = nome;
document.getElementById("cpf").innerText = cpf;
document.getElementById("servico").innerText = servico;

document.getElementById("valor").innerText = "R$ " + valor;
document.getElementById("valorTotal").innerText = "R$ " + valor;

document.getElementById("data").innerText =
  new Date().toLocaleDateString("pt-BR");

</script>

</body>
</html>
