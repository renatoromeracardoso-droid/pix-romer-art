<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nota Fiscal</title>

<style>
body {
  font-family: monospace;
  background: #e5e7eb;
  padding: 20px;
}

.nota {
  background: white;
  max-width: 350px;
  margin: auto;
  padding: 20px;
  border-radius: 8px;
}

.center { text-align: center; }
.bold { font-weight: bold; }

hr {
  border: none;
  border-top: 1px dashed #000;
  margin: 10px 0;
}

.qrcode {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="nota" id="nota">
Carregando...
</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function carregarNota() {

  const res = await fetch(API);
  const dados = await res.json();

  const pedido = dados.find(p => p["ID Pedido"] == id);

  if (!pedido) {
    document.getElementById("nota").innerHTML = "Pedido não encontrado";
    return;
  }

  const nome = pedido["Nome"];
  const cpf = pedido["CPF/CNPJ"];
  const servico = pedido["Serviço"];
  const valor = pedido["Valor"];
  const data = pedido["Data"] || "-";

  document.getElementById("nota").innerHTML = `
    <div class="center bold">ROMER ART</div>
    <div class="center">CNPJ: 66.252.416/0001-05</div>
    <div class="center">São Paulo - SP</div>

    <hr>

    <div class="center bold">DANFE NFC-e</div>
    <div class="center">Documento Auxiliar</div>

    <hr>

    Pedido: ${id}<br>
    Data da compra: ${data}

    <hr>

    <div class="bold">Descrição</div>
    ${servico}

    <hr>

    VALOR TOTAL: <b>R$ ${valor}</b>

    <hr>

    FORMA DE PAGAMENTO<br>
    PIX

    <hr>

    <div class="center">CONSUMIDOR</div>
    ${nome}<br>
    CPF: ${cpf}

    <hr>

    <div class="qrcode">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}">
    </div>

    <hr>

    <div class="center">Documento gerado automaticamente</div>
  `;
}

carregarNota();

</script>

</body>
</html>
