<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANFE NFC-e</title>

<style>
body {
  font-family: monospace;
  background: #e5e7eb;
  padding: 20px;
}

.nota {
  background: white;
  max-width: 360px;
  margin: auto;
  padding: 15px;
  border-radius: 6px;
}

.center { text-align: center; }
.bold { font-weight: bold; }

hr {
  border: none;
  border-top: 1px dashed #000;
  margin: 8px 0;
}

.small { font-size: 12px; }

.chave {
  word-break: break-all;
  font-size: 11px;
}

.barcode {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="nota" id="nota">
Carregando...
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const autoPDF = params.get("pdf");

/* 🔥 FORMATA DATA */
function formatarData(data){
  if(!data) return "-";
  const d = new Date(data);
  return d.toLocaleString("pt-BR");
}

/* 🔥 TRIBUTO */
function calcularTributo(valor){
  return (valor * 0.068).toFixed(2);
}

async function carregar(){

  const res = await fetch(API);
  const dados = await res.json();

  const p = dados.find(x => x["ID Pedido"] == id);

  if(!p){
    document.getElementById("nota").innerHTML = "Pedido não encontrado";
    return;
  }

  const valor = parseFloat(p["Valor"] || 0);
  const tributo = calcularTributo(valor);

  /* 🔥 NOVO: MÉTODO PAGAMENTO */
  const pagamento = p["Método pagamento"] || "PIX";

  /* 🔥 CHAVE NF */
  const chave = p["Número chave"] || p["Chave NF"] || "";

  const linkConsulta = chave
    ? "https://www.nfse.gov.br/EmissorNacional/Notas/Visualizar/Index/" + chave
    : "";

  document.getElementById("nota").innerHTML = `

<div class="center bold">ROMER ART Laser & Design</div>
<div class="center small">São Paulo - SP</div>
<div class="center small">CNPJ: 66.252.416/0001-05</div>

<hr>

<div class="center bold">DANFSe v1.0</div>
<div class="center small">
Documento Auxiliar da NFS-e<br>
Prefeitura da Cidade de São Paulo
</div>

<hr>

Pedido: ${id}<br>
Data da compra: ${formatarData(p["Data"])}

<hr>

ITEM  COD  DESCRIÇÃO<br>
1   1   ${p["Serviço"]}

<hr>

VALOR TOTAL: R$ ${valor.toFixed(2)}

<hr>

FORMA DE PAGAMENTO<br>
${pagamento}<br>
VALOR PAGO: R$ ${valor.toFixed(2)}

<hr>

Tributos aprox: R$ ${tributo} (6.8%)

<hr>
CONSUMIDOR

<br>

${p["Nome"]}<br>
CPF/CNPJ: ${p["CPF/CNPJ"]}

<hr>

<div class="center chave">
<b>Chave NFS-e:</b><br>
${chave || "Não informada"}
</div>

${chave ? `
<div class="center barcode">
<svg id="barcode"></svg>
</div>
` : ""}

<hr>

<div class="center">
Consulta via QR Code<br><br>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${linkConsulta}">
</div>

<hr>

<div class="center small">
Consulte esta nota pelo QR Code acima<br>
ou pela chave de acesso<br><br>
www.nfse.gov.br
</div>

<hr>

<div class="center small">
Emitido pelo sistema RomerArt
</div>

`;

  /* 🔥 GERA CÓDIGO DE BARRAS */
  if(chave){
    JsBarcode("#barcode", chave, {
      format: "CODE128",
      width: 1,
      height: 40,
      displayValue: false,
      margin: 0
    });
  }

  /* 🔥 PDF AUTOMÁTICO */
  if(autoPDF == "1"){
    setTimeout(()=>window.print(), 700);
  }
}

carregar();

</script>

</body>
</html>
