<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:350px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;cursor:pointer;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Pedido</h3>

<select id="item">
<option value="">Selecione</option>
<option value="10">MDF</option>
<option value="20">Acrílico</option>
</select>

<input id="larg" placeholder="Largura mm">
<input id="alt" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

let itens=[];
let pagamentoId=null;

// ➕ ADICIONAR
function addItem(){

  const select=document.getElementById("item");
  const nome=select.options[select.selectedIndex].text;
  const preco=Number(select.value);

  const l=Number(document.getElementById("larg").value);
  const a=Number(document.getElementById("alt").value);
  const q=Number(document.getElementById("qtd").value);

  if(!preco){
    alert("Selecione item");
    return;
  }

  if(!l || !a){
    alert("Informe medidas");
    return;
  }

  const area=(l*a)/100;
  const valor=(area*preco)*q;

  itens.push({nome,valor});

  render();
}

// 📊 RESUMO
function render(){

  let html="";
  let total=0;

  itens.forEach((i,x)=>{
    total+=i.valor;
    html+=${x+1}) ${i.nome} - R$ ${i.valor.toFixed(2)}<br>;
  });

  html+=<br><b>Total: R$ ${total.toFixed(2)}</b>;

  document.getElementById("resumo").innerHTML=html;
}

// 💰 PIX
async function gerarPix(){

  let total=0;
  itens.forEach(i=>total+=i.valor);

  if(total<=0){
    alert("Adicione itens");
    return;
  }

  const r=await fetch("/pix",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({valor: total})
  });

  const d=await r.json();

  pagamentoId=d.id;

  document.getElementById("resumo").innerHTML+=`
  <br><br>
  <img width="200" src="data:image/png;base64,${d.img}">
  <textarea style="width:100%">${d.qr}</textarea>
  <br><b id="statusPix">Aguardando pagamento...</b>
  `;

  verificar();
}

// 🔁 STATUS
function verificar(){

  const intervalo=setInterval(async()=>{

    const r=await fetch("/status/"+pagamentoId);
    const d=await r.json();

    if(d.status==="pago"){
      document.getElementById("statusPix").innerHTML="✅ PAGAMENTO APROVADO";
      clearInterval(intervalo);
    }

  },3000);
}

</script>

</body>
</html>
