<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:350px;
  color:#fff;
}
input,select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:6px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  margin-top:5px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.add{background:#f97316;}
.pix{background:#16a34a;}
</style>

</head>
<body>

<div class="box">

<h3>Pedidos Online</h3>

<select id="material">
<option value="0.08">MDF</option>
<option value="0.15">ACRILICO</option>
</select>

<input id="larg" type="number" placeholder="Largura mm">
<input id="alt" type="number" placeholder="Altura mm">
<input id="qtd" type="number" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>

<div id="resumo"></div>

</div>

<script>

let itens = [];

function addItem(){

 let l = parseFloat(document.getElementById("larg").value) || 0;
 let a = parseFloat(document.getElementById("alt").value) || 0;
 let q = parseInt(document.getElementById("qtd").value) || 1;
 let preco = parseFloat(document.getElementById("material").value) || 0;

 if(l <= 0 || a <= 0){
   alert("Preencha largura e altura");
   return;
 }

 if(l > 400 || a > 400){
   alert("Máximo 400mm");
   return;
 }

 let area = (l * a)/100;
 let valor = (area * preco)+2;
 valor = valor * q;

 if(isNaN(valor)){
   alert("Erro no cálculo");
   return;
 }

 itens.push({
   l:Number(l),
   a:Number(a),
   q:Number(q),
   valor:Number(valor)
 });

 render();
}

function render(){

 let total=0;
 let html="<br><b>Pedido:</b><br>";

 itens.forEach((i,x)=>{
   let v = Number(i.valor || 0);
   total += v;
   html += ${x+1}) ${i.l}x${i.a} | Qtd:${i.q} | R$ ${v.toFixed(2)}<br>;
 });

 let desc = total*0.05;
 let final = total-desc;

 html += <br>Subtotal: R$ ${total.toFixed(2)};
 html += <br>Desconto PIX: -R$ ${desc.toFixed(2)};
 html += <br><b>Total: R$ ${final.toFixed(2)}</b>;

 document.getElementById("resumo").innerHTML = html;
}

async function gerarPix(){

 if(itens.length === 0){
   alert("Adicione item primeiro");
   return;
 }

 let total=0;
 itens.forEach(i=> total+=Number(i.valor||0));

 let final = Number((total*0.95).toFixed(2));

 try{

   let r = await fetch("https://pix-romer-art.onrender.com/pix",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify({
       valor: final,
       email:"romerartbrasil@gmail.com"
     })
   });

   let d = await r.json();

   let qr = d.qr || d.qr_code || "";
   let img = d.img || d.qr_code_base64 || "";

   document.getElementById("resumo").innerHTML += `
   <br><br><b>Pague com PIX:</b><br>
   ${img ? <img width="200" src="data:image/png;base64,${img}"> : ""}
   <textarea style="width:100%">${qr}</textarea>
   `;

 }catch(e){
   alert("Erro ao gerar PIX");
 }
}

</script>

</body>
</html>
