<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teste RomerArt</title>

<style>
body{background:#111;color:#fff;font-family:Arial;}
.box{max-width:300px;margin:auto;margin-top:50px;}
input,button{width:100%;padding:10px;margin-top:10px;}
button{background:orange;border:none;}
</style>

</head>
<body>

<div class="box">

<input id="valor" placeholder="Valor">
<button onclick="addItem()">Adicionar</button>
<button onclick="gerarPix()">Gerar PIX</button>

<div id="resumo"></div>

</div>

<script>

// 🔥 TESTE SIMPLES

function addItem(){
  document.getElementById("resumo").innerHTML = "Item adicionado";
}

async function gerarPix(){

  const valor = document.getElementById("valor").value;

  const r = await fetch("/pix",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({valor: Number(valor)})
  });

  const d = await r.json();

  document.getElementById("resumo").innerHTML += `
    <br><img width="200" src="data:image/png;base64,${d.img}">
  `;
}

</script>

</body>
</html>
