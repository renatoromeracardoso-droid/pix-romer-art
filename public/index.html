[14:57, 01/04/2026] Renato: <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pedidos RomerArt</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;cursor:pointer;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#25d366;display:none;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="cliente" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
</div>

<div class="card">
<h3>Serviço</h3>

<select id="tipo">
<option value="">Selecione</option>
<option>Corte</option>
<option>Gravação</option>
<option>Corte + Gravação</option>
</select>

<select id="item">
<option value="">Selecione</option>
<option>MDF</option>
<option>ACRILICO</option>
<option>CAMISETA</option>
</select>

<input id="larg" placeholder="Largura mm">
<input id="alt" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="whats" onclick="enviarWhats()">Enviar WhatsApp</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

let itens=[];
let pagamentoId=null;
let intervalo=null;

// ADD ITEM
function addItem(){

  let item=document.getElementById("item").value;
  let l=Number(document.getElementById("larg").value);
  let a=Number(document.getElementById("alt").value);
  let q=Number(document.getElementById("qtd").value);

  if(!item){
    alert("Selecione item");
    return;
  }

  let valor=(l*a/100)*0.1*q;

  itens.push({item,valor});

  render();
}

// RESUMO
function render(){

  let html="";
  let total=0;

  itens.forEach((i,x)=>{
    total+=i.valor;
    html+=${x+1}) ${i.item} - R$ ${i.valor.toFixed(2)}<br>;
  });

  html+=<br>Total: R$ ${total.toFixed(2)};

  document.getElementById("resumo").innerHTML=html;
}

// PIX
async function gerarPix(){

  let total=0;
  itens.forEach(i=>total+=i.valor);

  const r=await fetch("/pix",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({valor:total})
  });

  const d=await r.json();

  pagamentoId=d.id;

  document.getElementById("resumo").innerHTML+=`
  <br><img width="200" src="data:image/png;base64,${d.img}">
  <textarea style="width:100%">${d.qr}</textarea>
  <br><b id="statusPix">Aguardando...</b>
  `;

  verificar();
}

// STATUS
function verificar(){

  intervalo=setInterval(async()=>{

    const r=await fetch("/status/"+pagamentoId);
    const d=await r.json();

    if(d.status==="pago"){

      document.getElementById("statusPix").innerHTML="✅ PAGO";
      document.getElementById("btnWhats").style.display="block";

      clearInterval(intervalo);
    }

  },3000);
}

// WHATS
function enviarWhats(){

  let texto=document.getElementById("resumo").innerText;

  window.open(https://wa.me/5511946447040?text=${encodeURIComponent(texto)});
}

</script>

</body>
</html>
