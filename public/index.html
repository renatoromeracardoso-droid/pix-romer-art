<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:330px;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.add{background:#f97316;}
.pix{background:#16a34a;}

#resumo{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h2>Pedidos Online</h2>

<select id="material">
<option value="0.08">MDF 3mm</option>
<option value="0.10">MDF 6mm</option>
<option value="0.15">Acrílico</option>
<option value="25">Camiseta</option>
<option value="12">Copo</option>
</select>

<input id="l" placeholder="Largura mm">
<input id="a" placeholder="Altura mm">
<input id="q" type="number" value="1">

<button class="add" onclick="adicionar()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>

<div id="resumo"></div>

</div>

<script>

let itens=[];

function adicionar(){

  let mat = document.getElementById("material");
  let nome = mat.options[mat.selectedIndex].text;
  let preco = Number(mat.value);

  let l = Number(document.getElementById("l").value);
  let a = Number(document.getElementById("a").value);
  let q = Number(document.getElementById("q").value);

  if(nome.includes("Camiseta") || nome.includes("Copo")){
    l=1; a=1;
  }else{
    if(!l || !a){
      alert("Preencha largura e altura");
      return;
    }
  }

  let valor;

  if(nome.includes("Camiseta") || nome.includes("Copo")){
    valor = preco*q;
  }else{
    let area = (l*a)/10000;
    valor = ((area*preco)+2)*q;
  }

  itens.push({nome,l,a,q,valor});

  atualizar();
}

function atualizar(){

  let html="";
  let subtotal=0;

  itens.forEach((i,n)=>{
    subtotal+=i.valor;

    html += ${n+1}) ${i.nome} - ${i.l}x${i.a} - Qtd:${i.q} - R$ ${i.valor.toFixed(2)}<br>;
  });

  let desconto = subtotal*0.05;
  let total = subtotal-desconto;

  html += <br>Subtotal: R$ ${subtotal.toFixed(2)};
  html += <br>Desconto PIX: -R$ ${desconto.toFixed(2)};
  html += <br><b>Total: R$ ${total.toFixed(2)}</b>;

  document.getElementById("resumo").innerHTML = html;
}

async function gerarPix(){

  let subtotal=0;
  itens.forEach(i=> subtotal+=i.valor);

  let total = Number((subtotal*0.95).toFixed(2));

  try{

    let r = await fetch("/pix",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:total})
    });

    let d = await r.json();

    document.getElementById("resumo").innerHTML += `
    <br><br><b>PIX:</b><br>
    <textarea style="width:100%">${d.qr}</textarea>
    `;

  }catch(e){
    alert("Erro ao gerar PIX");
  }

}

</script>

</body>
</html>
