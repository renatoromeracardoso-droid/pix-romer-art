<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:320px;
  color:#fff;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  color:#fff;
  font-weight:bold;
}

.add{background:orange;}
.pix{background:green;}

#resumo{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h3>Pedidos Online</h3>

<select id="material">
<option value="0.08">MDF</option>
<option value="0.15">Acrílico</option>
</select>

<input id="l" placeholder="Largura">
<input id="a" placeholder="Altura">
<input id="q" value="1">

<button class="add" onclick="add()">Adicionar</button>
<button class="pix" onclick="pix()">Gerar PIX</button>

<div id="resumo"></div>

</div>

<script>

let itens = [];

function add(){

  let l = Number(document.getElementById("l").value);
  let a = Number(document.getElementById("a").value);
  let q = Number(document.getElementById("q").value);
  let p = Number(document.getElementById("material").value);

  if(!l || !a){
    alert("Preencha largura e altura");
    return;
  }

  let area = (l*a)/100;
  let v = ((area*p)+2)*q;

  itens.push({l,a,q,v});

  render();
}

function render(){

  let total=0;
  let html="";

  itens.forEach((i,n)=>{
    total += i.v;
    html += ${n+1}) ${i.l}x${i.a} - R$ ${i.v.toFixed(2)}<br>;
  });

  let final = total*0.95;

  html += <br>Total: R$ ${final.toFixed(2)};

  document.getElementById("resumo").innerHTML = html;
}

async function pix(){

  let total=0;
  itens.forEach(i=> total+=i.v);

  let final = Number((total*0.95).toFixed(2));

  try{

    let r = await fetch("/pix",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:final})
    });

    let d = await r.json();

    document.getElementById("resumo").innerHTML += `
    <br><img width="200" src="data:image/png;base64,${d.img}">
    <textarea>${d.qr}</textarea>
    `;

  }catch(e){
    alert("Erro PIX");
  }

}

</script>

</body>
</html>
