<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt - Pedidos</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:360px;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  margin-top:6px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.btn-add{background:#f97316;}
.btn-pix{background:#16a34a;}

.resumo{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Pedidos Online</h2>

<select id="material">
<option value="0.08">MDF</option>
<option value="0.15">ACRÍLICO</option>
</select>

<input id="largura" type="number" placeholder="Largura (mm)">
<input id="altura" type="number" placeholder="Altura (mm)">
<input id="qtd" type="number" value="1">

<button class="btn-add" onclick="adicionar()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>

<div id="resumo" class="resumo"></div>

</div>

<script>

let itens = [];

function adicionar(){

  let l = parseFloat(document.getElementById("largura").value) || 0;
  let a = parseFloat(document.getElementById("altura").value) || 0;
  let q = parseInt(document.getElementById("qtd").value) || 1;
  let preco = parseFloat(document.getElementById("material").value) || 0;

  if(l <= 0 || a <= 0){
    alert("Preencha largura e altura");
    return;
  }

  if(l > 400 || a > 400){
    alert("Máximo permitido: 400mm");
    return;
  }

  let area = (l * a) / 100;
  let valor = ((area * preco) + 2) * q;

  if(isNaN(valor)){
    alert("Erro no cálculo");
    return;
  }

  itens.push({l, a, q, valor});
  render();
}

function render(){

  let total = 0;
  let html = "<b>Pedido:</b><br>";

  itens.forEach((item, i)=>{
    total += item.valor;
    html += ${i+1}) ${item.l}x${item.a} | Qtd:${item.q} | R$ ${item.valor.toFixed(2)}<br>;
  });

  let desconto = total * 0.05;
  let final = total - desconto;

  html += <br>Subtotal: R$ ${total.toFixed(2)};
  html += <br>Desconto PIX: -R$ ${desconto.toFixed(2)};
  html += <br><b>Total: R$ ${final.toFixed(2)}</b>;

  document.getElementById("resumo").innerHTML = html;
}

async function gerarPix(){

  if(itens.length === 0){
    alert("Adicione itens primeiro");
    return;
  }

  let total = 0;
  itens.forEach(i => total += i.valor);

  let final = Number((total * 0.95).toFixed(2));

  try{

    let resposta = await fetch("/pix", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        valor: final,
        email: "romerartbrasil@gmail.com"
      })
    });

    let dados = await resposta.json();

    if(dados.erro){
      alert(dados.erro);
      return;
    }

    document.getElementById("resumo").innerHTML += `
      <br><br><b>Pague com PIX:</b><br>
      <img width="200" src="data:image/png;base64,${dados.img}">
      <textarea style="width:100%;margin-top:10px">${dados.qr}</textarea>
    `;

  }catch(e){
    alert("Erro ao conectar com servidor");
    console.log(e);
  }
}

</script>

</body>
</html>
