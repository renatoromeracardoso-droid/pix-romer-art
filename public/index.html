<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedidos RomerArt</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:300px;
  color:white;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
}

select,input,button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  font-weight:bold;
  cursor:pointer;
}

.btn-add{
  background:#f59e0b;
}

.btn-pix{
  background:#22c55e;
}

#resumo{
  margin-top:15px;
  font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<h2>Pedidos Online</h2>

<select id="material">
  <option value="150">MDF 3mm</option>
  <option value="180">MDF 6mm</option>
  <option value="220">Acrílico</option>
  <option value="50">Camiseta</option>
  <option value="30">Copo</option>
</select>

<input id="l" placeholder="Largura mm">
<input id="a" placeholder="Altura mm">
<input id="q" value="1" placeholder="Quantidade">

<button class="btn-add" onclick="adicionar()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>

<div id="resumo"></div>

</div>

<script>

let itens = [];
let pagamentoId = null;
let intervalo = null;

// ➕ ADICIONAR ITEM
function adicionar(){

  const mat = document.getElementById("material");
  const nome = mat.options[mat.selectedIndex].text;
  const preco = Number(mat.value);

  let l = Number(document.getElementById("l").value);
  let a = Number(document.getElementById("a").value);
  let q = Number(document.getElementById("q").value);

  if(nome.includes("Camiseta") || nome.includes("Copo")){
    l = 1;
    a = 1;
  }else{
    if(!l || !a){
      alert("Preencha largura e altura");
      return;
    }
  }

  let valor = 0;

  if(nome.includes("Camiseta") || nome.includes("Copo")){
    valor = preco * q;
  }else{
    const area = (l * a) / 10000;
    valor = ((area * preco) + 2) * q;
  }

  itens.push({nome,l,a,q,valor});

  atualizar();
}

// 🔄 ATUALIZA RESUMO
function atualizar(){

  let html = "";
  let subtotal = 0;

  itens.forEach((i, index) => {
    subtotal += i.valor;
    html += (index+1) + ") " + i.nome + " - " + i.l + "x" + i.a + " - Qtd:" + i.q + " - R$ " + i.valor.toFixed(2) + "<br>";
  });

  const desconto = subtotal * 0.05;
  const total = subtotal - desconto;

  html += "<br>Subtotal: R$ " + subtotal.toFixed(2);
  html += "<br>Desconto PIX: -R$ " + desconto.toFixed(2);
  html += "<br><b>Total: R$ " + total.toFixed(2) + "</b>";

  document.getElementById("resumo").innerHTML = html;
}

// 💰 GERAR PIX
async function gerarPix(){

  let subtotal = 0;
  itens.forEach(i => subtotal += i.valor);

  const total = Number((subtotal * 0.95).toFixed(2));

  try{

    const r = await fetch("/pix",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({valor: total})
    });

    const d = await r.json();

    pagamentoId = d.id;

    document.getElementById("resumo").innerHTML +=
      "<br><br><b>PIX:</b><br>" +
      "<img width='200' src='data:image/png;base64," + d.img + "'/>" +
      "<textarea style='width:100%'>" + d.qr + "</textarea>" +
      "<br><b id='statusPagamento'>Aguardando pagamento...</b>";

    iniciarVerificacao();

  }catch(e){
    alert("Erro ao gerar PIX");
  }

}

// 🔁 VERIFICA AUTOMATICAMENTE
function iniciarVerificacao(){

  intervalo = setInterval(async () => {

    if(!pagamentoId) return;

    const r = await fetch("/status/" + pagamentoId);
    const d = await r.json();

    if(d.status === "pago"){

      document.getElementById("statusPagamento").innerHTML =
        "✅ PAGAMENTO APROVADO";

      clearInterval(intervalo);

    }

  }, 3000);

}

</script>

</body>
</html>
