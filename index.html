<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0b0f1a;color:#e2e8f0;}

header {
  background:#020617;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 🔥 COR ROMERART */
.btn-refresh {
  background:#f97316;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn-refresh:hover{background:#ea580c;}

.container {padding:15px;}

.cards {display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card {
  background:#020617;
  padding:15px;
  border-radius:12px;
  text-align:center;
  border:1px solid #1e293b;
}

.filtros{margin-top:15px;display:flex;gap:10px;}
.filtros input, .filtros select{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

table {width:100%;border-collapse: collapse;}
th, td {padding:10px;border-bottom:1px solid #1e293b;font-size:13px;}

.badge {padding:5px 12px;border-radius:999px;font-size:11px;font-weight:bold;}
.emitido {background:#22c55e;color:#000;}
.pendente {background:#f97316;color:#000;} /* 🔥 laranja */

.menu-btn{
  background:#1e293b;
  border:none;
  color:white;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

.menu-popup {
  position:absolute;
  background:#020617;
  border-radius:14px;
  padding:8px;
  display:flex;
  flex-direction:column;
  z-index:999;
  min-width:200px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.menu-popup button:hover {
  background:#f97316;
  color:black;
}

/* 🔥 TOAST */
.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#f97316;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
  font-weight:bold;
}

.toast.show {opacity:1;}
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2><span>Total</span></div>
  <div class="card"><h2 id="pendentes">0</h2><span>Pendentes</span></div>
  <div class="card"><h2 id="emitidos">0</h2><span>Emitidos</span></div>
  <div class="card"><h2 id="envios">0</h2><span>Envios</span></div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwEY9Ybci7rULdNEiS49_vcXPi2_vsPtwk-R5s1ndNjSn3qx4Y4o7GWpVpXAxDm_8LwZQ/exec";

const API_ETIQUETA = "https://script.google.com/macros/s/AKfycbzQeZfOaSKql1r7NrsLcEs6wMO5knXEZWQBxHdopu7K5wk2NSQPdg5_C-3OUiJ4x_7qxA/exec";

let pedidos = [];
let menuAtual = null;

/* 🔥 CORREÇÃO DO BOTÃO ATUALIZAR */
async function atualizarManual(){
  toast("Atualizando...");
  await carregar();
  toast("Atualizado com sucesso 🚀");
}

/* 🔥 TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

/* 🔥 FECHAR MENU SEM BUG */
function fecharMenu(){
  if(menuAtual){
    menuAtual.remove();
    menuAtual=null;
  }
}

/* 🔥 FECHA AO CLICAR FORA */
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu-popup") && !e.target.closest(".menu-btn")){
    fecharMenu();
  }
});

/* 🔥 CARREGAR */
async function carregar(){
  const res = await fetch(API+"?t="+Date.now());
  pedidos = await res.json();
  atualizarCards();
  render();
}

function atualizarCards(){
  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>p["Status NF"]!="emitido").length;
  emitidos.innerText = pedidos.filter(p=>p["Status NF"]=="emitido").length;
  envios.innerText = pedidos.filter(p=>p["Frete"] || p["Rastreio"]).length;
}

/* 🔥 RENDER */
function render(){

  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const status = (p["Status NF"]=="emitido") ? "emitido" : "pendente";

    tabela.innerHTML+=`
    <tr>
      <td>
        <button class="menu-btn" onclick="menu(${i},this)">⋮</button>
        ${p["ID Pedido"]}
      </td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td><span class="badge ${status}">${status}</span></td>
      <td>${(p["Frete"] || p["Rastreio"]) ? "📦" : "-"}</td>
    </tr>`;
  });
}

/* 🔥 MENU MELHORADO */
function menu(i,el){

  fecharMenu();

  const p = pedidos[i];
  const m = document.createElement("div");
  m.className="menu-popup";

  m.innerHTML=`
    <button onclick="acao('nota',${i})">👁 Ver Nota</button>
    <button onclick="acao('pdf',${i})">📄 PDF</button>
    <button onclick="acao('emitir',${i})">🧾 Emitir Nota</button>
    <button onclick="acao('envio',${i})">📦 Gerar Envio</button>
    <button onclick="acao('etiqueta',${i})">🏷 Gerar Etiqueta</button>
  `;

  document.body.appendChild(m);

  const r=el.getBoundingClientRect();
  m.style.top=r.bottom+"px";
  m.style.left=r.left+"px";

  menuAtual=m;
}

/* 🔥 CENTRAL DE AÇÕES (RESOLVE O BUG DO MENU) */
async function acao(tipo,i){

  fecharMenu(); // 👈 ESSENCIAL (resolve seu bug)

  const id = pedidos[i]["ID Pedido"];

  if(tipo==="envio"){
    toast("Gerando envio...");
    await fetch(API+"?acao=envio&id="+id);
    toast("Envio criado 📦");
  }

  if(tipo==="etiqueta"){
    toast("Gerando etiqueta...");
    const res = await fetch(API_ETIQUETA+"?id="+id);
    const txt = await res.text();

    if(txt.startsWith("http")){
      window.open(txt);
      toast("Etiqueta pronta 🚀");
    }else{
      toast(txt);
    }
  }

  if(tipo==="emitir"){
    toast("Emitindo...");
    await fetch(API+"?acao=emitir&id="+id);
    toast("Nota emitida");
  }

  if(tipo==="nota"){
    window.open("nota.html?id="+id);
  }

  if(tipo==="pdf"){
    window.open("nota.html?id="+id+"&pdf=1");
  }

  await carregar();
}

carregar();

</script>

</body>
</html>
