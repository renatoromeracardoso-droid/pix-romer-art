<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Romer Art</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#25d366;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
.hidden{display:none;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="endereco" placeholder="Rua" readonly>
<input id="bairro" placeholder="Bairro" readonly>
<input id="cidade" placeholder="Cidade" readonly>
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Serviço</h3>

<select id="servico">
<option value="">Selecione</option>
<option>Corte</option>
<option>Gravação</option>
<option>Corte + Gravação</option>
</select>

<select id="material">
<option value="">Material</option>
<option>MDF</option>
<option>Acrílico</option>
<option>Madeira</option>
<option>Compensado</option>
</select>

<select id="espessura"></select>

<select id="produto">
<option value="">Produto</option>
<option>CAMISETA</option>
<option>COPO</option>
<option>TAÇA</option>
<option>GARRAFA</option>
<option>CHAVEIRO</option>
<option>CANETA</option>
<option>LÁPIS</option>
</select>

<select id="tamanho" class="hidden">
<option value="">Tamanho</option>
<option>P</option><option>M</option><option>G</option><option>GG</option>
</select>

<select id="cor" class="hidden">
<option value="">Cor</option>
<option>Branco</option><option>Preto</option><option>Colorido</option>
</select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="whats" id="btnWhats" disabled onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>
<div id="pix" class="box"></div>

</div>

<script>

const API="https://pix-romer-art.onrender.com/pix";
const WHATS="5511946447040";

let itens=[];

// ===== ESPESSURA =====
const espMap={
 MDF:[3,6],
 Acrílico:[2,3,5],
 Madeira:[3,5],
 Compensado:[3,4]
};

// ===== CEP =====
cep.onblur=async()=>{
 let c=cep.value.replace(/\D/g,'');
 if(c.length!==8)return;

 let r=await fetch(`https://viacep.com.br/ws/${c}/json/`);
 let d=await r.json();

 endereco.value=d.logradouro||"";
 bairro.value=d.bairro||"";
 cidade.value=d.localidade||"";
};

// ===== CONTROLE CAMPOS =====
servico.onchange=()=>{
 controlarCampos();
};

produto.onchange=()=>{
 if(produto.value==="CAMISETA"){
  tamanho.classList.remove("hidden");
  cor.classList.remove("hidden");
 }else{
  tamanho.classList.add("hidden");
  cor.classList.add("hidden");
 }
};

material.onchange=()=>{
 let lista=espMap[material.value]||[];
 espessura.innerHTML=lista.map(e=>`<option>${e}mm</option>`).join("");
};

function controlarCampos(){

 if(servico.value==="Gravação"){
  material.classList.add("hidden");
  espessura.classList.add("hidden");
 }else{
  material.classList.remove("hidden");
  espessura.classList.remove("hidden");
 }

 if(["COPO","TAÇA","GARRAFA","CANETA","LÁPIS"].includes(produto.value)){
  largura.classList.add("hidden");
  altura.classList.add("hidden");
 }else{
  largura.classList.remove("hidden");
  altura.classList.remove("hidden");
 }
}

// ===== LIMITES =====
largura.oninput=()=>{if(largura.value>400)largura.value=400;}
altura.oninput=()=>{if(altura.value>400)altura.value=400;}

// ===== CALCULO =====
function calcular(){

 let q=Number(qtd.value)||1;

 // PRODUTOS
 if(produto.value){

  if(produto.value==="CAMISETA"){
   let base={P:18,M:20,G:22,GG:25}[tamanho.value]||20;
   if(cor.value==="Colorido") base+=3;
   return base*q;
  }

  let precos={
   COPO:8,TAÇA:10,GARRAFA:15,
   CHAVEIRO:3,CANETA:2,"LÁPIS":1
  };

  return (precos[produto.value]||5)*q;
 }

 // MATERIAL
 let l=Number(largura.value)||0;
 let a=Number(altura.value)||0;

 if(l<=0||a<=0){alert("Informe medidas");return 0;}

 let area=(l*a)/100;

 let base={
  MDF:0.08,Acrílico:0.15,Madeira:0.12,Compensado:0.07
 }[material.value]||0.1;

 let custo=area*base;
 let tempo=area*0.04;

 let total=(custo+tempo+1)*1.4;

 if(servico.value==="Gravação") total*=1.2;
 if(servico.value==="Corte + Gravação") total*=1.5;

 return total*q;
}

// ===== ADD =====
function addItem(){

 if(!nome.value||!email.value||!cep.value||!numero.value){
  alert("Preencha dados do cliente");
  return;
 }

 let valor=calcular();
 if(valor<=0)return;

 itens.push({
  servico:servico.value,
  material:material.value,
  produto:produto.value,
  esp:espessura.value||"-",
  l:largura.value||"-",
  a:altura.value||"-",
  q:qtd.value,
  valor
 });

 render();
}

// ===== RESUMO =====
function render(){

 let total=0;

 let html=`<b>Pedido #${Date.now().toString().slice(-6)}</b><br><br>
 Nome: ${nome.value}<br>
 Email: ${email.value}<br>
 ${endereco.value}, ${numero.value}<br>
 ${bairro.value} - ${cidade.value}<br><br>`;

 itens.forEach((i,x)=>{
  total+=i.valor;

  html+=`${x+1}) ${i.servico}<br>
  ${i.material||""} ${i.esp}<br>
  ${i.produto||""}<br>
  ${i.l}x${i.a} Qtd:${i.q}<br>
  R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let desconto=total*0.05;
 let final=total-desconto;

 html+=`
 Subtotal: R$ ${total.toFixed(2)}<br>
 Desconto PIX: -R$ ${desconto.toFixed(2)}<br>
 <b>Total: R$ ${final.toFixed(2)}</b><br>
 Prazo: 2 a 5 dias úteis
 `;

 resumo.innerHTML=html;
}

// ===== PIX =====
async function gerarPix(){

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let final=total-(total*0.05);

 if(final<=0){
  alert("Valor inválido");
  return;
 }

 pix.innerHTML="Gerando PIX...";

 let r=await fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({valor:Number(final.toFixed(2))})
 });

 let d=await r.json();

 pix.innerHTML=`
 <img src="data:image/png;base64,${d.qr}" width="200"><br>
 <textarea style="width:100%">${d.copia}</textarea>
 `;

 acompanhar(d.id);
}

// ===== STATUS =====
function acompanhar(id){

 let t=setInterval(async()=>{

  let r=await fetch(API+"/status/"+id);
  let d=await r.json();

  if(d.status==="approved"){
   clearInterval(t);
   pix.innerHTML+="<br><b style='color:lightgreen;'>Pago!</b>";
   btnWhats.disabled=false;
  }

 },3000);
}

// ===== WHATS =====
function enviarWhats(){
 window.open(`https://wa.me/${WHATS}?text=${encodeURIComponent(resumo.innerText)}`);
}

</script>

</body>
</html>
