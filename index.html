<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Romer Art</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  font-weight:bold;
}

.btn-add{ background:orange }
.btn-pix{ background:green; color:white }
.btn-send{ background:#22c55e }

#qrcode{ width:200px; margin-top:10px }
</style>
</head>

<body>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipo">
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
<option>Acrílico</option>
</select>

<select id="espessura">
<option>3mm</option>
<option>6mm</option>
</select>

<input id="largura" placeholder="Largura">
<input id="altura" placeholder="Altura">
<input id="quantidade" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnEnviar" class="btn-send" onclick="enviarPedido()" disabled>Enviar Pedido</button>

</div>

<div class="card">
<h3>Resumo</h3>
<div id="resumo"></div>
<div id="total"></div>

<h4>PIX:</h4>
<img id="qrcode"/>
<input id="copiaPix"/>

<div id="statusPagamento"></div>
</div>

<script>

let itens = []
let total = 0
let statusPagamento = "pending"
let pedidoId = null

function calcularPreco(qtd){
  return qtd * 0.20
}

function addItem(){

  const largura = Number(larguraEl.value)
  const altura = Number(alturaEl.value)
  const qtd = Number(quantidadeEl.value)

  const preco = calcularPreco(qtd)

  itens.push({ largura, altura, qtd, preco })

  atualizarResumo()
}

const larguraEl = document.getElementById("largura")
const alturaEl = document.getElementById("altura")
const quantidadeEl = document.getElementById("quantidade")

function atualizarResumo(){

  const div = document.getElementById("resumo")
  const totalDiv = document.getElementById("total")

  div.innerHTML = ""
  total = 0

  itens.forEach((i, index)=>{
    total += i.preco

    div.innerHTML += `
      ${index+1}) ${i.largura}x${i.altura}mm | Qtd:${i.qtd}<br>
      R$ ${i.preco.toFixed(2)}<br><br>
    `
  })

  totalDiv.innerHTML = `<b>Total: R$ ${total.toFixed(2)}</b>`
}

async function gerarPix(){

  if(itens.length === 0){
    alert("Adicione itens primeiro")
    return
  }

  pedidoId = "PED_" + Date.now()

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ valor: total, pedidoId })
  })

  const data = await res.json()

  document.getElementById("qrcode").src = "data:image/png;base64," + data.qr
  document.getElementById("copiaPix").value = data.copia

  statusPagamento = "pending"
  atualizarStatus()

  verificarPagamento()
}

function verificarPagamento(){

  const intervalo = setInterval(async ()=>{

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pedidoId}`)
    const data = await res.json()

    if(data.status === "approved"){
      statusPagamento = "approved"
      atualizarStatus()
      clearInterval(intervalo)
    }

  },3000)
}

function atualizarStatus(){

  const div = document.getElementById("statusPagamento")
  const btn = document.getElementById("btnEnviar")

  if(statusPagamento === "pending"){
    div.innerHTML = "⏳ Aguardando pagamento..."
    btn.disabled = true
  }

  if(statusPagamento === "approved"){
    div.innerHTML = "✅ Pagamento aprovado"
    btn.disabled = false
  }
}

async function enviarPedido(){

  if(statusPagamento !== "approved"){
    alert("Aguardando pagamento")
    return
  }

  const pedido = {
    cliente:{
      nome: nome.value,
      email: email.value,
      cep: cep.value,
      rua: rua.value,
      bairro: bairro.value,
      cidade: cidade.value,
      numero: numero.value
    },
    itens,
    total,
    data: new Date()
  }

  await fetch("https://pix-romer-art.onrender.com/pedido",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(pedido)
  })

  alert("Pedido enviado 🚀")
}

document.getElementById("cep").addEventListener("blur", async ()=>{

  const cep = document.getElementById("cep").value

  const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
  const data = await res.json()

  rua.value = data.logradouro
  bairro.value = data.bairro
  cidade.value = data.localidade

})

</script>

</body>
</html>
