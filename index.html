<script>
const API = "https://pix-romer-art.onrender.com";

async function carregarPedidos() {
  try {
    const res = await fetch(`${API}/pedidos`);
    const dados = await res.json();

    console.log(dados);

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach(p => {
      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Servico"] || "-"}</td>
          <td>${p["Valor"] || "-"}</td>
          <td>${p["Status"] || "-"}</td>
          <td>
            <button onclick="alert('Emitir nota')">
              Emitir Nota
            </button>
          </td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar dados");
  }
}

carregarPedidos();
</script>
