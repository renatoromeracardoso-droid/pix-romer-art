<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; font-weight:bold }
.btn-add { background:orange }
.btn-pix { background:green; color:#fff }
.btn-send { background:#22c55e; color:#fff }
.card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px }
</style>

</head>
<body>

<h2>🚀 RomerArt Pedidos</h2>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome" required>
<input id="email" placeholder="Email" required>
<input id="cep" placeholder="CEP" required>
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipo">
<option value="">Tipo</option>
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option value="">Material</option>
<option>MDF</option>
<option>Acrílico</option>
</select>

<input id="largura" placeholder="Largura (máx 500)">
<input id="altura" placeholder="Altura (máx 500)">
<input id="qtd" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
<button class="btn-send" id="btnEnviar" disabled onclick="enviarPedido()">Enviar Pedido</button>

</div>

<div class="card">
<h3>Resumo</h3>
<div id="resumo"></div>
<div id="pix"></div>
<div id="status"></div>
</div>

<script>

let itens = []
let total = 0
let pago = false
let paymentId = null

// CEP automático
document.getElementById("cep").addEventListener("blur", async () => {
  const cep = document.getElementById("cep").value.replace("-", "")
  if (cep.length !== 8) return

  const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
  const data = await res.json()

  document.getElementById("rua").value = data.logradouro || ""
  document.getElementById("bairro").value = data.bairro || ""
  document.getElementById("cidade").value = data.localidade || ""
})

function addItem(){

let tipo = tipoEl.value
let material = materialEl.value
let largura = parseFloat(larguraEl.value)
let altura = parseFloat(alturaEl.value)
let qtd = parseInt(qtdEl.value)

if(!tipo || !material || !largura || !altura || !qtd){
alert("Preencha todos os campos")
return
}

if(largura > 500 || altura > 500){
alert("Limite máximo 500mm")
return
}

let preco = (largura * altura * 0.002) * qtd

itens.push({ tipo, material, largura, altura, qtd, preco })

total += preco

renderResumo()

}

const tipoEl = document.getElementById("tipo")
const materialEl = document.getElementById("material")
const larguraEl = document.getElementById("largura")
const alturaEl = document.getElementById("altura")
const qtdEl = document.getElementById("qtd")

function renderResumo(){

let html = ""

itens.forEach((i, index)=>{
html += `${index+1}) ${i.tipo}<br>
Material: ${i.material}<br>
${i.largura}x${i.altura} | Qtd:${i.qtd}<br>
R$ ${i.preco.toFixed(2)}<br><br>`
})

html += `<b>Total: R$ ${total.toFixed(2)}</b>`

document.getElementById("resumo").innerHTML = html

}

async function gerarPix(){

if(total <= 0){
alert("Adicione itens")
return
}

const res = await fetch("https://pix-romer-art.onrender.com/pix", {
method:"POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ valor: total })
})

const data = await res.json()

paymentId = data.id

document.getElementById("pix").innerHTML = `
<img src="data:image/png;base64,${data.qr_code_base64}" width="200"/>
<br><small>${data.copiaecola}</small>
`

document.getElementById("status").innerHTML = "⏳ Aguardando pagamento..."

monitorarPagamento()

}

function monitorarPagamento(){

const interval = setInterval(async ()=>{

if(!paymentId) return

const res = await fetch(`https://pix-romer-art.onrender.com/status/${paymentId}`)
const data = await res.json()

if(data.status === "approved"){
clearInterval(interval)

pago = true

document.getElementById("status").innerHTML = "✅ Pagamento aprovado"
document.getElementById("btnEnviar").disabled = false
}

},3000)

}

async function enviarPedido(){

if(!pago){
alert("Pagamento não confirmado")
return
}

const pedido = {
id: "PED_" + Date.now(),
cliente:{
nome: nome.value,
email: email.value,
cidade: cidade.value
},
items: itens,
total: total
}

// envia para Google Sheets
await fetch("https://script.google.com/macros/s/AKfycbwor6wiV4noo8eysSyl4_nsdN2O897SiaErtuy00RlMVU6zBIHYIpqhsLakagnvjbls/exec",{
method:"POST",
body: JSON.stringify(pedido)
})

alert("Pedido enviado 🚀")

location.reload()

}

</script>

</body>
</html>
