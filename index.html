<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container { max-width: 500px; margin: auto; }

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

.btn-add { background: orange; }
.btn-pix { background: green; color: white; }
.btn-send { background: #22c55e; color: white; }

.resumo {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>

<select id="servico">
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
<option>Acrílico</option>
</select>

<input id="largura" type="number" placeholder="Largura (máx 400mm)">
<input id="altura" type="number" placeholder="Altura (máx 400mm)">
<input id="qtd" type="number" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button id="btnPix" class="btn-pix" onclick="gerarPix()" disabled>Gerar PIX</button>
<button id="btnEnviar" class="btn-send" onclick="enviarPedido()" disabled>Enviar Pedido</button>

<div id="resumo" class="resumo"></div>

</div>

<script>

let itens = []
let total = 0
let frete = 0
let pagamentoId = null
let pedidoNumero = "PED-" + Date.now()

// CEP automático
cep.onblur = async () => {
  if (!cep.value) return

  const res = await fetch(`https://viacep.com.br/ws/${cep.value}/json/`)
  const d = await res.json()

  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""

  calcularFrete()
}

// FRETE (simples com regra 10km grátis)
function calcularFrete() {

  // simulação simples
  const cepCliente = cep.value

  if (cepCliente.startsWith("03822")) {
    frete = 0
  } else {
    frete = 15
  }

}

// adicionar item
function addItem() {

  if (largura.value > 400 || altura.value > 400) {
    alert("Limite máximo 400mm")
    return
  }

  if (!largura.value || !altura.value || !qtd.value) {
    alert("Preencha tudo")
    return
  }

  const item = {
    servico: servico.value,
    material: material.value,
    largura: Number(largura.value),
    altura: Number(altura.value),
    qtd: Number(qtd.value)
  }

  item.preco = ((item.largura * item.altura) / 1000) * item.qtd

  itens.push(item)
  total += item.preco

  atualizarResumo()

  btnPix.disabled = false
}

// resumo
function atualizarResumo() {

  let html = `<b>Pedido: ${pedidoNumero}</b><br><br>`

  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `<b>Email:</b> ${email.value}<br>`
  html += `<b>Endereço:</b><br>${rua.value}, ${numero.value}<br>${bairro.value} - ${cidade.value}<br><br>`

  html += `<b>Itens:</b><br><br>`

  itens.forEach((i, index) => {
    html += `${index+1}) ${i.servico} - ${i.material}<br>`
    html += `${i.largura}x${i.altura} mm | Qtd: ${i.qtd}<br>`
    html += `R$ ${i.preco.toFixed(2)}<br><br>`
  })

  html += `<b>Subtotal: R$ ${total.toFixed(2)}</b><br>`
  html += `<b>Frete: ${frete === 0 ? "Grátis" : "R$ " + frete}</b><br>`

  const totalFinal = total + frete

  html += `<b>Total Final: R$ ${totalFinal.toFixed(2)}</b><br>`

  resumo.innerHTML = html
}

// gerar PIX
async function gerarPix() {

  const totalFinal = total + frete

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ valor: totalFinal })
  })

  const data = await res.json()

  pagamentoId = data.id

  resumo.innerHTML += `
  <br><img src="data:image/png;base64,${data.qr_code_base64}" width="200"><br>
  <small>${data.copiaecola}</small>
  <br id="statusPix">⏳ Aguardando pagamento...
  `

  verificarPagamento()
}

// STATUS CORRIGIDO
function verificarPagamento() {

  const interval = setInterval(async () => {

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
    const data = await res.json()

    console.log("STATUS:", data.status)

    if (data.status === "approved") {

      clearInterval(interval)

      document.getElementById("statusPix").innerHTML = "✅ Pago"

      btnEnviar.disabled = false
    }

  }, 5000)
}

// enviar pedido
async function enviarPedido() {

  const totalFinal = total + frete

  const pedido = {
    id: pedidoNumero,
    cliente: {
      nome: nome.value,
      email: email.value,
      cidade: cidade.value
    },
    total: totalFinal,
    itens
  }

  await fetch("https://script.google.com/macros/s/AKfycbwor6wiV4noo8eysSyl4_nsdN2O897SiaErtuy00RlMVU6zBIHYIpqhsLakagnvjbls/exec", {
    method: "POST",
    body: JSON.stringify(pedido)
  })

  let msg = `🧾 Pedido ${pedidoNumero}\n\n`
  msg += `${nome.value}\n${cidade.value}\n\n`

  itens.forEach(i => {
    msg += `${i.servico} - ${i.material}\n${i.largura}x${i.altura} | ${i.qtd}\n\n`
  })

  msg += `💰 Total: R$ ${totalFinal.toFixed(2)}`

  window.open(`https://wa.me/5511946447040?text=${encodeURIComponent(msg)}`)

  alert("Pedido enviado 🚀")
}

</script>

</body>
</html>
