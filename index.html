<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Notas Fiscais</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h1 { margin-bottom:20px; }

table {
  width:100%;
  border-collapse:collapse;
  background:#1e293b;
}

th, td {
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
}

th { background:#020617; }

.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.pago { background:#22c55e; }
.emitido { background:#3b82f6; }
.pendente { background:#facc15; color:#000; }

button {
  padding:6px 10px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.disabled {
  opacity:0.4;
}
</style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>CPF/CNPJ</th>
<th>Email</th>
<th>Serviço</th>
<th>Valor</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbzSnyWol8f3D2U1sapo5YTypaEcShDeyWnMJHS_v1J12-rltxkXxsI3fvzUrlzEmkDtcw/exec";

let pedidos = [];

// 🔧 NORMALIZA STATUS (CORREÇÃO PRINCIPAL)
function normalizarStatus(s){
  if(!s) return "";
  s = s.toString().toLowerCase().trim();

  if(s === "paid") return "pago";
  if(s === "pago") return "pago";
  if(s === "emitido") return "emitido";

  return "pendente";
}

async function carregar(){
  try{
    const res = await fetch(API);
    pedidos = await res.json();
    render();
  }catch(e){
    alert("Erro ao carregar dados");
    console.error(e);
  }
}

function render(){
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  pedidos.forEach((p,i)=>{

    const status = normalizarStatus(p["Status NF"]);

    let badge = `<span class="badge pendente">PENDENTE</span>`;
    let acao = `<span class="disabled">Aguardando</span>`;

    if(status === "pago"){
      badge = `<span class="badge pago">PAGO</span>`;
      acao = `<button onclick="emitir(${i})">Emitir</button>`;
    }

    if(status === "emitido"){
      badge = `<span class="badge emitido">EMITIDO</span>`;
      acao = `<span class="disabled">Emitido</span>`;
    }

    tabela.innerHTML += `
      <tr>
        <td>${p["ID Pedido"] || "-"}</td>
        <td>${p["Nome"] || "-"}</td>
        <td>${p["CPF/CNPJ"] || "-"}</td>
        <td>${p["Email"] || "-"}</td>
        <td>${p["Serviço"] || "-"}</td>
        <td>R$ ${p["Valor"] || "-"}</td>
        <td>${badge}</td>
        <td>${acao}</td>
      </tr>
    `;
  });
}

async function emitir(i){
  const pedido = pedidos[i];

  if(!confirm("Emitir nota do pedido " + pedido["ID Pedido"] + "?")) return;

  try{
    const res = await fetch(API_EMITIR + "?id=" + pedido["ID Pedido"]);
    const data = await res.json();

    if(data.ok){
      alert("Nota emitida com sucesso!");
      carregar();
    }else{
      alert(data.erro || "Erro ao emitir");
    }

  }catch(e){
    alert("Erro ao emitir");
    console.error(e);
  }
}

carregar();

</script>

</body>
</html>
