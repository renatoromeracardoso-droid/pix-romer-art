<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Romer Art - Pedido</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
}
.btn-add { background: orange; }
.btn-pix { background: green; color:#fff;}
.btn-send { background: #22c55e; color:#fff;}
</style>
</head>

<body>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome" required>
<input id="email" placeholder="Email" required>
<input id="cep" placeholder="CEP" required>
<input id="numero" placeholder="Número" required>
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipo">
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
</select>

<select id="espessura">
<option>3mm</option>
</select>

<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
<button class="btn-send" id="btnEnviar" disabled>Enviar Pedido</button>

</div>

<div class="card" id="resumo"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLvB0Eydzka9KU09w9lTou9CIF-oGiVHo",
  authDomain: "firestore-database-9b92d.firebaseapp.com",
  projectId: "firestore-database-9b92d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pedidoId = null;
let total = 0;

function validarCampos() {
  return (
    nome.value &&
    email.value &&
    cep.value &&
    numero.value
  );
}

window.addItem = function() {

  if (largura.value > 400 || altura.value > 400) {
    alert("Máximo 400mm");
    return;
  }

  total = (parseFloat(qtd.value) * 0.20).toFixed(2);

  document.getElementById("resumo").innerHTML = `
  Pedido:
  ${tipo.value} <br>
  ${material.value} ${espessura.value}<br>
  ${largura.value}x${altura.value}mm | Qtd:${qtd.value}<br>
  Total: R$ ${total}
  `;
}

window.gerarPix = async function() {

  if (!validarCampos()) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  pedidoId = Date.now().toString();

  await setDoc(doc(db, "pedidos", pedidoId), {
    status: "pending",
    total: total
  });

  document.getElementById("resumo").innerHTML += `
  <br><br>Gerando PIX...<br>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=pixfake${pedidoId}">
  <br>Aguardando pagamento...
  `;

  ouvirStatus();
}

function ouvirStatus() {

  const ref = doc(db, "pedidos", pedidoId);

  onSnapshot(ref, (docSnap) => {

    if (docSnap.exists()) {

      const dados = docSnap.data();

      if (dados.status === "approved") {

        document.getElementById("resumo").innerHTML += `
        <br>✅ PAGAMENTO APROVADO
        `;

        document.getElementById("btnEnviar").disabled = false;
      }
    }
  });
}

</script>

</body>
</html>
