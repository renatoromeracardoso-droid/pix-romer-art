<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}
button { font-weight: bold }
.add { background: orange }
.pix { background: green; color: white }
.enviar { background: #22c55e; color: white }
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>
<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

<div class="card" id="resumo"></div>

<script>

let itens = []
let pixId = null
let pedidoId = "PED-" + Date.now()

// 🔥 CEP automático
cep.addEventListener("blur", async () => {
  const c = cep.value.replace(/\D/g,"")
  if (c.length !== 8) return

  const res = await fetch(`https://viacep.com.br/ws/${c}/json/`)
  const d = await res.json()

  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""
})

// 🔥 Validação
function validar() {
  if (!nome.value || !email.value || !cep.value || !numero.value) {
    alert("Preencha os campos obrigatórios")
    return false
  }

  if (itens.length === 0) {
    alert("Adicione itens")
    return false
  }

  return true
}

// 🔥 Adicionar item
function addItem() {

  const l = Number(largura.value)
  const a = Number(altura.value)
  const q = Number(qtd.value)

  if (!l || !a || !q) {
    alert("Preencha largura, altura e quantidade")
    return
  }

  if (l > 400 || a > 400) {
    alert("Limite máximo 400mm")
    return
  }

  const area = (l * a) / 10000
  const valorUnit = 0.10
  const valor = area * valorUnit * q

  itens.push({ l,a,q,valor })

  atualizarResumo()
}

// 🔥 Total
function total() {
  return itens.reduce((s,i)=>s+i.valor,0)
}

// 🔥 Resumo
function atualizarResumo(status="Aguardando pagamento") {

  let html = `<b>Pedido:</b> ${pedidoId}<br>`
  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `<b>Email:</b> ${email.value}<br>`
  html += `<b>Endereço:</b> ${rua.value}, ${numero.value} - ${bairro.value} - ${cidade.value}<br><br>`

  itens.forEach((i,idx)=>{
    html += `${idx+1}) ${i.l}x${i.a} | Qtd: ${i.q} | R$ ${i.valor.toFixed(2)}<br>`
  })

  html += `<br><b>Total: R$ ${total().toFixed(2)}</b><br>`
  html += `<b>Status:</b> ${status}<br>`

  html += `<img id="qrcode" width="200"><br>`
  html += `<p id="pixCopia"></p>`

  resumo.innerHTML = html
}

// 🔥 Gerar PIX
async function gerarPix() {

  if (!validar()) return

  try {

    const res = await fetch("https://pix-romer-art.onrender.com/pix", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ valor: total() })
    })

    const data = await res.json()

    if (!data.id) {
      alert("Erro ao gerar PIX")
      return
    }

    pixId = data.id

    atualizarResumo()

    document.getElementById("qrcode").src =
      "data:image/png;base64," + data.qr_code_base64

    document.getElementById("pixCopia").innerText =
      data.copiaecola

    monitorar()

  } catch (e) {
    alert("Erro PIX")
  }
}

// 🔥 Monitorar pagamento
function monitorar() {

  const loop = setInterval(async ()=>{

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pixId}`)
    const data = await res.json()

    if (data.status === "approved") {
      atualizarResumo("Pagamento aprovado ✅")
      clearInterval(loop)
    }

  }, 4000)
}

// 🔥 Enviar pedido
async function enviarPedido() {

  if (!validar()) return

  const dados = {
    pedido: pedidoId,
    nome: nome.value,
    email: email.value,
    cep: cep.value,
    rua: rua.value,
    bairro: bairro.value,
    cidade: cidade.value,
    numero: numero.value,
    total: total(),
    itens,
    status: "Novo"
  }

  try {

    const res = await fetch("https://script.google.com/macros/s/AKfycbyoE1fckemtWTKY6KNkrvnsZWUXkvDsmmjpPe2AKoZK1Vk52YzdDLvdDz6UVpqoYPDr/exec", {
      method:"POST",
      body: JSON.stringify(dados)
    })

    const r = await res.json()
    console.log("Planilha:", r)

  } catch (e) {
    alert("Erro ao salvar na planilha")
  }

  // 🔥 WhatsApp completo
  let msg = `Pedido ${pedidoId}%0A`
  msg += `Cliente: ${nome.value}%0A`
  msg += `Endereço: ${rua.value}, ${numero.value}%0A`

  itens.forEach((i,idx)=>{
    msg += `${idx+1}) ${i.l}x${i.a} Qtd:${i.q} R$${i.valor.toFixed(2)}%0A`
  })

  msg += `Total: R$ ${total().toFixed(2)}`

  window.open(`https://wa.me/5511946447040?text=${msg}`)

  alert("Pedido enviado 🚀")
}

</script>

</body>
</html>
