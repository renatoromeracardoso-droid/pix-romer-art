<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Notas Fiscais</title>

  <style>
    body {
      background: #1e293b;
      color: #fff;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #334155;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #475569;
      text-align: left;
      max-width: 250px;
      word-wrap: break-word;
    }

    th {
      background: #1e293b;
    }

    button {
      padding: 6px 10px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      opacity: 0.8;
    }

    /* STATUS */
    .status {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .paid { background: #22c55e; }
    .pending { background: #f59e0b; }
    .cancel { background: #ef4444; }
    .unknown { background: #64748b; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22c55e;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      z-index: 999;
    }
  </style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Serviço</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody id="tabela"></tbody>
</table>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

async function carregarPedidos() {
  try {
    const res = await fetch(API);
    const dados = await res.json();

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    // Mais recentes primeiro
    dados.reverse();

    dados.forEach(p => {

      const status = (p["Status"] || "").toLowerCase();

      let statusClass = "unknown";
      if (status.includes("paid")) statusClass = "paid";
      else if (status.includes("pend")) statusClass = "pending";
      else if (status.includes("cancel")) statusClass = "cancel";

      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Serviço"] || "-"}</td>
          <td>R$ ${p["Valor"] || "-"}</td>
          <td>
            <span class="status ${statusClass}">
              ${p["Status"] || "-"}
            </span>
          </td>
          <td>
            ${
              status.includes("paid")
                ? `<button onclick='emitir(${JSON.stringify(p)})'>Emitir</button>`
                : `<span style="opacity:0.5;">Aguardando</span>`
            }
          </td>
        </tr>
      `;
    });

  } catch (err) {
    mostrarToast("Erro ao carregar dados ❌");
    console.error(err);
  }
}

function emitir(p) {

  const msg = `
📄 Nota Fiscal Disponível

👤 Cliente: ${p["Nome"]}
📦 Pedido: ${p["ID Pedido"]}
💰 Valor: R$ ${p["Valor"]}

Seu pedido foi processado com sucesso ✅
`;

  // Abre WhatsApp
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");

  mostrarToast("Abrindo envio no WhatsApp 🚀");
}

function mostrarToast(msg) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = msg;

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

carregarPedidos();

</script>

</body>
</html>
