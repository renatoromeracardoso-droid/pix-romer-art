<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.filtros {
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap: wrap;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

.table-container {
  margin-top:15px;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.badge {
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
  color:#000;
}

.emitido { background:#22c55e; }
.pendente { background:#f59e0b; }

.acoes button {
  background:#1e293b;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card">
    <h2 id="pendentes">0</h2>
    <span>Pendentes</span>
  </div>
  <div class="card">
    <h2 id="emitidos">0</h2>
    <span>Emitidos</span>
  </div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar...">
  
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>

  <!-- 🔥 NOVO FILTRO DE DATA -->
  <input type="date" id="dataFiltro">
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];
let menuAtual = null;

function statusNormalizado(s) {
  if (!s) return "pendente";
  s = s.toLowerCase();
  if (s === "emitido") return "emitido";
  return "pendente";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

/* 🚀 CACHE + PERFORMANCE */
async function carregar() {

  const cache = localStorage.getItem("dados_nf");

  if (cache) {
    pedidos = JSON.parse(cache);
    atualizarCards();
    render();
  }

  try {
    const res = await fetch(API);
    const data = await res.json();

    pedidos = data;
    localStorage.setItem("dados_nf", JSON.stringify(data));

    atualizarCards();
    render();

  } catch {
    showToast("Erro ao atualizar");
  }
}

function atualizarManual() {
  const btn = document.querySelector(".btn-refresh");
  btn.innerText = "Atualizando...";
  carregar();
  setTimeout(() => btn.innerText = "Atualizar", 1000);
}

function atualizarCards() {
  document.getElementById("total").innerText = pedidos.length;

  document.getElementById("pendentes").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"]) === "pendente").length;

  document.getElementById("emitidos").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"]) === "emitido").length;
}

/* 🔥 FILTROS COMPLETOS */
function render() {

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;
  const dataFiltro = document.getElementById("dataFiltro").value;

  pedidos
    .filter(p => {

      const status = statusNormalizado(p["Status NF"]);

      const matchBusca =
        (p["Nome"] || "").toLowerCase().includes(busca) ||
        (p["ID Pedido"] || "").includes(busca);

      const matchStatus =
        filtro === "todos" ||
        (filtro === "pendente" && status === "pendente") ||
        (filtro === "emitido" && status === "emitido");

      let matchData = true;

      if (dataFiltro && p["Data"]) {
        const dataPlanilha = new Date(p["Data"]).toISOString().slice(0,10);
        matchData = dataPlanilha === dataFiltro;
      }

      return matchBusca && matchStatus && matchData;

    })
    .forEach((p, i) => {

      const status = statusNormalizado(p["Status NF"]);

      const badge =
        status === "emitido"
          ? `<span class="badge emitido">EMITIDO</span>`
          : `<span class="badge pendente">PENDENTE</span>`;

      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"]}</td>
          <td>${p["Nome"]}</td>
          <td>R$ ${p["Valor"]}</td>
          <td>${badge}</td>
          <td>
            <div class="acoes">
              <button onclick="abrirMenu(${pedidos.indexOf(p)}, this)">⋮</button>
            </div>
          </td>
        </tr>
      `;
    });
}

/* EVENTOS */
document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtro").addEventListener("change", render);
document.getElementById("dataFiltro").addEventListener("change", render);

/* AUTO UPDATE */
setInterval(carregar, 30000);

/* START */
carregar();

</script>

</body>
</html>
