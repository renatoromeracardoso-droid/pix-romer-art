<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Notas Fiscais</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #0ea5e9;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 6px 10px;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Serviço</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody id="tabela"></tbody>
</table>

<script>
const API = "https://pix-romer-art.onrender.com";

async function carregarPedidos() {
  try {
    const res = await fetch(API + "/pedidos");

    if (!res.ok) {
      throw new Error("API não respondeu");
    }

    const dados = await res.json();

    console.log("DADOS:", dados);

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    // 👉 se vier erro do backend
    if (!Array.isArray(dados)) {
      alert("Erro vindo do backend");
      console.log(dados);
      return;
    }

    if (dados.length === 0) {
      tabela.innerHTML = "<tr><td colspan='8'>Nenhum dado encontrado</td></tr>";
      return;
    }

    dados.forEach(p => {
      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Servico"] || "-"}</td>
          <td>${p["Valor"] || "-"}</td>
          <td>${p["Status"] || "-"}</td>
          <td>
            <button onclick="emitirNota('${p["ID Pedido"]}')">
              Emitir Nota
            </button>
          </td>
        </tr>
      `;
    });

  } catch (erro) {
    console.error("ERRO:", erro);
    alert("Erro ao carregar dados");
  }
}

function emitirNota(id) {
  alert("Emitir nota do pedido: " + id);
}

carregarPedidos();
</script>

</body>
</html>
