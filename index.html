<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{
  background:#0f172a;
  font-family:Arial;
  margin:0;
}

.app{
  max-width:420px;
  margin:20px auto;
  padding:15px;
}

h3{
  color:#fff;
  text-align:center;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

label{
  font-size:13px;
  font-weight:bold;
  color:#334155;
  display:block;
  margin-top:10px;
}

.campo{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  margin-top:5px;
  font-size:14px;
}

.row{
  display:flex;
  gap:8px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

.add{background:#f97316;color:#fff;}
.pix{background:#16a34a;color:#fff;}
.whats{background:#25d366;color:#fff;display:none;}

.box{
  background:#fff;
  border-radius:16px;
  padding:15px;
  font-size:14px;
}
</style>

</head>
<body>

<div class="app">

<h3>Pedido Personalizado</h3>

<div class="card">

<label>Nome *</label>
<input id="cliente" class="campo">

<label>Email *</label>
<input id="email" class="campo">

<label>CEP *</label>
<input id="cep" class="campo">

<label>Endereço</label>
<input id="endereco" class="campo" readonly>

<label>Número *</label>
<input id="numero" class="campo">

<label>Bairro</label>
<input id="bairro" class="campo" readonly>

<label>Cidade</label>
<input id="cidade" class="campo" readonly>

</div>

<div class="card">

<label>Material</label>
<select id="material" class="campo">
<option>MDF</option>
<option>ACRILICO</option>
</select>

<div class="row">
<input id="larg" class="campo" placeholder="Largura (mm)">
<input id="alt" class="campo" placeholder="Altura (mm)">
</div>

<label>Quantidade</label>
<input id="qtd" class="campo" value="1">

<button class="btn add" onclick="addItem()">Adicionar Item</button>
<button class="btn pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="btn whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

// ================= VARIÁVEIS =================
let itens = [];
let pago = false;
const WHATS = "5511946447040";

// ================= CEP =================
cep.onblur = async ()=>{
 let c = cep.value.replace(/\D/g,'');
 if(c.length!==8) return;

 let r = await fetch("https://viacep.com.br/ws/"+c+"/json/");
 let d = await r.json();

 endereco.value = d.logradouro||"";
 bairro.value = d.bairro||"";
 cidade.value = d.localidade||"";
}

// ================= ADD =================
function addItem(){

 let l = +larg.value;
 let a = +alt.value;
 let q = +qtd.value;

 if(!l || !a || !q){
   alert("Preencha os campos");
   return;
 }

 if(l>400 || a>400){
   alert("Máx 400mm");
   return;
 }

 let valor = ((l*a)/100)*0.1*q + 2;

 itens.push({l,a,q,valor});

 render();
}

// ================= RESUMO =================
function render(){

 let total = 0;
 let html = "<b>Resumo do Pedido</b><br><br>";

 itens.forEach((i,x)=>{
   total += i.valor;

   html += `${x+1}) ${i.l}x${i.a} Qtd:${i.q}<br>
   R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let desc = total * 0.05;
 if(desc > total) desc = 0;

 let final = total - desc;
 if(final < 15) final = 15;

 html += `Subtotal: R$ ${total.toFixed(2)}<br>`;
 html += `Desconto PIX: -R$ ${desc.toFixed(2)}<br>`;
 html += `<b>Total: R$ ${final.toFixed(2)}</b>`;

 resumo.innerHTML = html;
}

// ================= PIX =================
function gerarPix(){

 if(itens.length===0) return alert("Adicione item");

 let total = itens.reduce((s,i)=>s+i.valor,0);
 let final = total - total*0.05;

 if(final < 15) final = 15;

 fetch("https://pix-romer-art.onrender.com/pix",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   valor: final,
   email: email.value
 })
 })
 .then(r=>r.json())
 .then(d=>{

 resumo.innerHTML += `
 <br><br>
 <img src="data:image/png;base64,${d.qr_code_base64}" width="200"><br>
 <textarea>${d.qr_code}</textarea>
 <br><b id="status">Aguardando pagamento...</b>
 `;

 verificar(d.id);

 });
}

// ================= STATUS =================
function verificar(id){

 let t=setInterval(()=>{

 fetch("https://pix-romer-art.onrender.com/status/"+id)
 .then(r=>r.json())
 .then(d=>{

 if(d.status==="approved"){
   status.innerHTML="✅ Pagamento aprovado";
   btnWhats.style.display="block";
   pago=true;
   clearInterval(t);
 }

 });

 },3000);

}

// ================= WHATS =================
function enviarWhats(){

 if(!pago) return alert("Pagamento não confirmado");

 let txt = resumo.innerText;

 window.open("https://wa.me/"+WHATS+"?text="+encodeURIComponent(txt));

}

</script>

</body>
</html>
