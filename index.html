<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt • Sistema NF</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:#e2e8f0;}
header{background:#020617;padding:15px;display:flex;justify-content:space-between;}
.btn{background:#3b82f6;padding:8px 14px;border-radius:8px;cursor:pointer;}
.container{padding:15px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.card{background:#020617;padding:15px;border-radius:12px;text-align:center;}
.badge{padding:5px 10px;border-radius:999px;font-size:11px;font-weight:bold;}
.emitido{background:#22c55e;color:#000;}
.pendente{background:#f59e0b;color:#000;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #1e293b;}
.menu-popup{position:absolute;background:#020617;border-radius:10px;padding:8px;display:none;z-index:999;}
.menu-popup button{background:none;border:none;color:white;padding:10px;width:100%;text-align:left;}
</style>
</head>

<body>

<header>
🚀 Sistema Notas
<div class="btn" onclick="carregar()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
<div class="card"><h2 id="total">0</h2>Total</div>
<div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
<div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
</div>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API="https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
let pedidos=[],menuAtual=null;

function status(s){return (s||"").toLowerCase()=="emitido"?"emitido":"pendente";}

async function carregar(){
 const res=await fetch(API);
 pedidos=await res.json();
 render();cards();
}

function cards(){
 total.innerText=pedidos.length;
 pendentes.innerText=pedidos.filter(p=>status(p["Status NF"])=="pendente").length;
 emitidos.innerText=pedidos.filter(p=>status(p["Status NF"])=="emitido").length;
}

function render(){
 tabela.innerHTML="";
 pedidos.forEach((p,i)=>{
 const st=status(p["Status NF"]);
 tabela.innerHTML+=`
 <tr>
 <td>${p["ID Pedido"]}</td>
 <td>${p["Nome"]}</td>
 <td>R$ ${p["Valor"]}</td>
 <td><span class="badge ${st}">${st.toUpperCase()}</span></td>
 <td><button onclick="menu(${i},this)">⋮</button></td>
 </tr>`;
 });
}

/* 🔥 NOTA INTERNA */
function verNota(p){
 const url=`nota.html?nome=${encodeURIComponent(p["Nome"])}&valor=${p["Valor"]}&servico=${encodeURIComponent(p["Serviço"])}`;
 window.open(url,"_blank");
}

/* 🔥 NOTA OFICIAL */
function notaOficial(p){
 if(p["Link Nota"]) return window.open(p["Link Nota"]);
 if(p["Chave NF"]) return window.open(`https://www.nfse.gov.br/EmissorNacional/Notas/Visualizar/Index/${p["Chave NF"]}`);
 alert("Sem nota vinculada");
}

/* 🔥 DECLARAÇÃO BONITA + PDF */
function declaracao(p){

const html=`
<html>
<head>
<style>
body{font-family:Arial;padding:20px}
.box{border:2px solid #000;padding:20px;max-width:600px;margin:auto}
h2{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #000;padding:8px}
</style>
</head>
<body>

<div class="box">
<h2>DECLARAÇÃO DE CONTEÚDO</h2>

<p><b>Remetente:</b> RomerArt<br>
CNPJ: 66.252.416/0001-05</p>

<p><b>Destinatário:</b> ${p["Nome"]}</p>

<table>
<tr><th>Descrição</th><th>Valor</th></tr>
<tr><td>${p["Serviço"]}</td><td>R$ ${p["Valor"]}</td></tr>
</table>

<p><b>Total:</b> R$ ${p["Valor"]}</p>

<br><br>
_________________________<br>
Assinatura

</div>

<script>window.print()<\/script>

</body>
</html>
`;

const w=window.open("");
w.document.write(html);
}

/* 🔥 EMITIR */
function emitir(i){
 pedidos[i]["Status NF"]="emitido";
 render();cards();
 alert("Nota marcada como emitida");
}

/* MENU */
function menu(i,el){
 if(menuAtual) menuAtual.remove();

 const p=pedidos[i];
 const m=document.createElement("div");
 m.className="menu-popup";

 m.innerHTML=`
 <button onclick="emitir(${i})">📄 Emitir</button>
 <button onclick='verNota(${JSON.stringify(p)})'>👁 Nota Sistema</button>
 <button onclick='notaOficial(${JSON.stringify(p)})'>🧾 Nota Oficial</button>
 <button onclick='declaracao(${JSON.stringify(p)})'>📦 Declaração</button>
 `;

 document.body.appendChild(m);
 const r=el.getBoundingClientRect();
 m.style.top=r.bottom+"px";
 m.style.left=r.left+"px";
 m.style.display="block";
 menuAtual=m;
}

document.addEventListener("click",e=>{
 if(!e.target.closest("button")) if(menuAtual) menuAtual.remove();
});

carregar();

</script>

</body>
</html>
