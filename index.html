<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  font-weight: bold;
  cursor: pointer;
}

.btn-add { background: orange; }
.btn-pix { background: green; color: white; }
.btn-send { background: #22c55e; color: white; }

.resumo {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>

<select id="servico">
  <option value="Corte">Corte</option>
  <option value="Gravação">Gravação</option>
</select>

<select id="material">
  <option value="MDF">MDF</option>
  <option value="Acrílico">Acrílico</option>
</select>

<input id="largura" type="number" placeholder="Largura (mm)">
<input id="altura" type="number" placeholder="Altura (mm)">
<input id="qtd" type="number" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button id="btnPix" class="btn-pix" onclick="gerarPix()" disabled>Gerar PIX</button>
<button id="btnEnviar" class="btn-send" onclick="enviarPedido()" disabled>Enviar Pedido</button>

<div class="resumo" id="resumo"></div>

</div>

<script>

let itens = []
let total = 0
let pagamentoId = null

// CEP automático
cep.addEventListener("blur", async () => {
  if (!cep.value) return
  const res = await fetch(`https://viacep.com.br/ws/${cep.value}/json/`)
  const data = await res.json()

  rua.value = data.logradouro || ""
  bairro.value = data.bairro || ""
  cidade.value = data.localidade || ""
})

// adicionar item
function addItem() {

  if (!largura.value || !altura.value || !qtd.value) {
    alert("Preencha largura, altura e quantidade")
    return
  }

  const item = {
    servico: servico.value,
    material: material.value,
    largura: Number(largura.value),
    altura: Number(altura.value),
    qtd: Number(qtd.value)
  }

  item.preco = ((item.largura * item.altura) / 1000) * item.qtd

  itens.push(item)
  total += item.preco

  atualizarResumo()

  btnPix.disabled = false
}

// resumo completo
function atualizarResumo() {

  let html = `<b>📋 RESUMO DO PEDIDO</b><br><br>`

  html += `<b>👤 Cliente:</b> ${nome.value || "-"}<br>`
  html += `<b>📧 Email:</b> ${email.value || "-"}<br>`
  html += `<b>📍 Endereço:</b><br>`
  html += `${rua.value || ""}, ${numero.value || ""}<br>`
  html += `${bairro.value || ""} - ${cidade.value || ""}<br>`
  html += `CEP: ${cep.value || ""}<br><br>`

  html += `<b>📦 Itens:</b><br><br>`

  itens.forEach((i, index) => {
    html += `
    ${index + 1}) ${i.servico}<br>
    Material: ${i.material}<br>
    Tamanho: ${i.largura}x${i.altura} mm<br>
    Quantidade: ${i.qtd}<br>
    Subtotal: R$ ${i.preco.toFixed(2)}<br><br>
    `
  })

  html += `<b>💰 TOTAL: R$ ${total.toFixed(2)}</b><br>`

  resumo.innerHTML = html
}

// validação
function validarFormulario() {
  return nome.value && email.value && cep.value && rua.value && cidade.value && itens.length > 0
}

// gerar PIX
async function gerarPix() {

  if (!validarFormulario()) {
    alert("Preencha tudo antes")
    return
  }

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ valor: total })
  })

  const data = await res.json()

  pagamentoId = data.id

  resumo.innerHTML += `
  <br><br>
  <img src="data:image/png;base64,${data.qr_code_base64}" width="200"><br>
  <small>${data.copiaecola}</small>
  <br id="statusPix">⏳ Aguardando pagamento...
  `

  verificarPagamento()
}

// verificar pagamento
function verificarPagamento() {

  const interval = setInterval(async () => {

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
    const data = await res.json()

    if (data.status === "approved") {
      clearInterval(interval)

      document.getElementById("statusPix").innerHTML = "✅ Pagamento aprovado"

      btnEnviar.disabled = false
    }

  }, 3000)
}

// enviar pedido + WhatsApp
async function enviarPedido() {

  const pedido = {
    id: Date.now(),
    cliente: {
      nome: nome.value,
      email: email.value,
      cidade: cidade.value
    },
    total,
    itens
  }

  // salvar na planilha
  await fetch("https://script.google.com/macros/s/AKfycbwor6wiV4noo8eysSyl4_nsdN2O897SiaErtuy00RlMVU6zBIHYIpqhsLakagnvjbls/exec", {
    method: "POST",
    body: JSON.stringify(pedido)
  })

  // mensagem completa WhatsApp
  let msg = `🧾 *NOVO PEDIDO - ROMERART*\n\n`

  msg += `👤 Cliente: ${nome.value}\n`
  msg += `📧 Email: ${email.value}\n`
  msg += `📍 Endereço:\n${rua.value}, ${numero.value}\n${bairro.value} - ${cidade.value}\nCEP: ${cep.value}\n\n`

  msg += `📦 *ITENS:*\n\n`

  itens.forEach((i, index) => {
    msg += `${index + 1}) ${i.servico}\n`
    msg += `Material: ${i.material}\n`
    msg += `Tamanho: ${i.largura}x${i.altura} mm\n`
    msg += `Qtd: ${i.qtd}\n`
    msg += `Subtotal: R$ ${i.preco.toFixed(2)}\n\n`
  })

  msg += `💰 *TOTAL: R$ ${total.toFixed(2)}*`

  const numero = "5511946447040"

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`)

  alert("Pedido enviado com sucesso 🚀")
}

</script>

</body>
</html>
