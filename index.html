<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento Laser</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}
.btn-add { background: orange; }
.btn-pix { background: green; color: white; }
</style>

</head>
<body>

<div class="card">
  <h3>Cliente</h3>
  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="Email">
</div>

<div class="card">
  <h3>Pedido</h3>

  <select id="servico">
    <option>Corte</option>
    <option>Gravação</option>
  </select>

  <select id="material">
    <option>MDF</option>
    <option>ACRILICO</option>
  </select>

  <input id="largura" placeholder="Largura (mm)">
  <input id="altura" placeholder="Altura (mm)">
  <input id="qtd" placeholder="Quantidade">

  <button class="btn-add" onclick="adicionar()">Adicionar</button>
  <button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
</div>

<div class="card" id="resumo"></div>
<div class="card" id="pix"></div>

<script>
// 🔥 SUA API DO RENDER
const API = "https://pix-romer-art.onrender.com";

let pedido = [];
let total = 0;
let pedidoId = Math.floor(Math.random() * 999999);

// =======================
// ➕ ADICIONAR ITEM
// =======================
async function adicionar() {

  const servico = document.getElementById("servico").value;
  const material = document.getElementById("material").value;
  const largura = document.getElementById("largura").value;
  const altura = document.getElementById("altura").value;
  const quantidade = document.getElementById("qtd").value;

  if (!largura || !altura || !quantidade) {
    alert("Preencha os campos");
    return;
  }

  const res = await fetch(`${API}/calcular`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      servico,
      material,
      largura,
      altura,
      quantidade
    })
  });

  const data = await res.json();

  if (data.erro) {
    alert(data.erro);
    return;
  }

  pedido.push({
    servico,
    material,
    largura,
    altura,
    quantidade,
    valor: data.valor
  });

  atualizarResumo();
}

// =======================
// 📊 RESUMO
// =======================
function atualizarResumo() {

  total = pedido.reduce((s, i) => s + i.valor, 0);

  let html = `<h3>Pedido #${pedidoId}</h3>`;

  pedido.forEach((p, i) => {
    html += `
      <p>${i+1}) ${p.servico} - ${p.material}</p>
      <p>${p.largura}x${p.altura} Qtd:${p.quantidade}</p>
      <p>R$ ${p.valor}</p>
      <hr>
    `;
  });

  html += `<h2>Total: R$ ${total.toFixed(2)}</h2>`;

  document.getElementById("resumo").innerHTML = html;
}

// =======================
// 💳 PIX
// =======================
async function gerarPix() {
  try {

    if (total <= 0) {
      alert("Adicione itens");
      return;
    }

    const email = document.getElementById("email").value;

    const res = await fetch(`${API}/pix`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        valor: total,
        descricao: "Pedido #" + pedidoId,
        email: email
      })
    });

    const data = await res.json();

    if (data.erro) {
      alert("Erro PIX");
      return;
    }

    document.getElementById("pix").innerHTML = `
      <h3>💳 PIX</h3>
      <img src="data:image/png;base64,${data.qr_code_base64}" width="200"/>
      <p>Copie:</p>
      <textarea>${data.qr_code}</textarea>
    `;

  } catch (e) {
    alert("Erro ao gerar PIX");
  }
}
</script>

</body>
</html>
