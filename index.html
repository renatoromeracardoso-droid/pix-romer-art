<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px;
  display:flex;
  justify-content:space-between;
}

.container { padding:15px; }

.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card {
  background:#020617;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

table { width:100%; margin-top:15px; }

td, th {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.badge {
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.emitido { background:#22c55e; color:#000; }
.pendente { background:#f59e0b; color:#000; }

.menu-popup {
  position:absolute;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:10px;
  display:none;
  flex-direction:column;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  opacity:0;
}

.toast.show { opacity:1; }
</style>
</head>

<body>

<header>
Sistema Notas
<button onclick="carregar()">Atualizar</button>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
</div>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

/* 🔥 SEU SCRIPT NOVO */
const API_SCRIPT = "https://script.google.com/macros/s/AKfycby9fdrGR3SEC2jDzIzZAtVAsYzF3fPNSaWoPslklG84LgPFSOThPzauFrU0VnpkdSQY_A/exec";

let pedidos = [];
let menuAtual = null;

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function status(s){
  return (s||"").toLowerCase()=="emitido" ? "emitido" : "pendente";
}

async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();

  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>status(p["Status NF"])=="pendente").length;
  emitidos.innerText = pedidos.filter(p=>status(p["Status NF"])=="emitido").length;

  render();
}

function render(){
  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const st = status(p["Status NF"]);

    tabela.innerHTML += `
    <tr>
      <td>${p["ID Pedido"]}</td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td><span class="badge ${st}">${st}</span></td>
      <td><button onclick="menu(${i},this)">⋮</button></td>
    </tr>
    `;
  });
}

/* MENU */
function menu(i, el){

  if(menuAtual) menuAtual.remove();

  const p = pedidos[i];

  const m = document.createElement("div");
  m.className = "menu-popup";

  /* emitir */
  const e = document.createElement("button");
  e.innerText="Emitir Nota";
  e.onclick = ()=>emitir(i);
  m.appendChild(e);

  /* envio */
  const env = document.createElement("button");
  env.innerText="Gerar Envio";
  env.onclick = ()=>gerarEnvio(p);
  m.appendChild(env);

  document.body.appendChild(m);

  const r = el.getBoundingClientRect();
  m.style.top = r.bottom+"px";
  m.style.left = r.left+"px";
  m.style.display="flex";

  menuAtual = m;
}

/* EMITIR */
async function emitir(i){

  const p = pedidos[i];

  showToast("Emitindo...");

  await fetch(API_SCRIPT + "?acao=emitir&id=" + p["ID Pedido"]);

  showToast("Emitido ✔");

  setTimeout(carregar,1000);
}

/* ENVIO */
async function gerarEnvio(p){

  showToast("Gerando envio...");

  await fetch(API_SCRIPT + "?acao=envio&id=" + p["ID Pedido"]);

  showToast("Envio gerado 🚀");

  setTimeout(carregar,1000);
}

carregar();

</script>

</body>
</html>
