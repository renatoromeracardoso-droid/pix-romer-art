<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Notas Fiscais</title>

  <style>
    body {
      background: #1e293b;
      color: #fff;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #334155;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #475569;
      text-align: left;
    }

    th {
      background: #1e293b;
    }

    button {
      padding: 6px 10px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Serviço</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody id="tabela"></tbody>
</table>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

async function carregarPedidos() {
  try {
    const res = await fetch(API);
    const dados = await res.json();

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach(p => {
      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Servico"] || "-"}</td>
          <td>${p["Valor"] || "-"}</td>
          <td>${p["Status"] || "-"}</td>
          <td>
            <button onclick="emitir('${p["ID Pedido"]}')">
              Emitir
            </button>
          </td>
        </tr>
      `;
    });

  } catch (err) {
    alert("Erro ao carregar dados");
    console.error(err);
  }
}

function emitir(id) {
  alert("Emitindo nota do pedido " + id);
}

carregarPedidos();

</script>

</body>
</html>
