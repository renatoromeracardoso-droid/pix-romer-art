<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.add { background: orange; }
.pix { background: green; color: white; }
.enviar { background: #22c55e; color: white; }

.card {
  background: #1e293b;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<h3>Pedido</h3>
<select id="produto">
  <option>Corte</option>
</select>

<select id="material">
  <option>MDF</option>
</select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="quantidade" placeholder="Quantidade">

<button class="add" onclick="adicionar()">Adicionar</button>

<button class="pix" onclick="gerarPix()">Gerar PIX</button>

<button id="btnEnviar" class="enviar" disabled>Enviar Pedido</button>

<div class="card">
  <h3>Resumo</h3>
  <div id="resumo"></div>
  <h3 id="total">R$ 0.00</h3>

  <img id="qrcode" width="200">
  <p id="pixCopiaCola"></p>
  <p id="status"></p>
</div>

</div>

<script>

let itens = []
let total = 0
let pagamentoId = null
let intervalo = null

function adicionar() {

  const produto = document.getElementById("produto").value
  const material = document.getElementById("material").value
  const largura = document.getElementById("largura").value
  const altura = document.getElementById("altura").value
  const qtd = Number(document.getElementById("quantidade").value)

  const valor = qtd * 0.10

  itens.push({ produto, material, largura, altura, qtd, valor })

  atualizarResumo()
}

function atualizarResumo() {

  let html = ""
  total = 0

  itens.forEach((item, i) => {
    html += `
      <p>${i+1}) ${item.produto} - ${item.material}<br>
      ${item.largura}x${item.altura} mm | Qtd: ${item.qtd}<br>
      R$ ${item.valor.toFixed(2)}</p>
    `
    total += item.valor
  })

  document.getElementById("resumo").innerHTML = html
  document.getElementById("total").innerText = "R$ " + total.toFixed(2)
}


// ---------------- PIX ----------------
async function gerarPix() {

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      valor: total
    })
  })

  const data = await res.json()

  pagamentoId = data.id

  document.getElementById("qrcode").src =
    "data:image/png;base64," + data.qr_code_base64

  document.getElementById("pixCopiaCola").innerText = data.copiaecola
  document.getElementById("status").innerText = "⏳ Aguardando pagamento..."

  intervalo = setInterval(verificarStatus, 3000)
}


// ---------------- STATUS ----------------
async function verificarStatus() {

  if (!pagamentoId) return

  const res = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
  const data = await res.json()

  console.log("STATUS:", data)

  if (data.status === "approved") {

    clearInterval(intervalo)

    document.getElementById("status").innerText = "✅ Pagamento aprovado!"

    document.getElementById("btnEnviar").disabled = false
  }
}

</script>

</body>
</html>
