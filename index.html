<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{font-weight:bold}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>Teste Sistema</h2>

<div class="card">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
</div>

<div class="card">
<select id="tipoServico"></select>
<select id="material"></select>
<select id="produto"></select>
<select id="espessura"></select>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKYsZW6vJntpqhsdo0S7pnbwMnK3tTvosWMkANOhKj4YcVrMr3KjLWpzVKzDudKgYV/exec"

let config=[]

// 🔥 TESTE CONFIG
async function carregar(){

 try{

  console.log("Carregando config...")

  let r = await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({tipo:"config"})
  })

  let txt = await r.text()

  console.log("RESPOSTA:", txt)

  config = JSON.parse(txt)

  if(!config.length){
    alert("Config vazia")
    return
  }

  tipoServico.innerHTML = [...new Set(config.map(i=>i.tipo_servico))]
    .map(i=>`<option>${i}</option>`).join("")

  atualizarMaterial()

 }catch(e){
  console.error("ERRO CONFIG:", e)
  alert("Erro ao carregar config")
 }

}

// SELECTS
function atualizarMaterial(){

 material.innerHTML = [...new Set(config
  .filter(i=>i.tipo_servico==tipoServico.value)
  .map(i=>i.material))]
  .map(i=>`<option>${i}</option>`).join("")

 atualizarProduto()
}

function atualizarProduto(){

 produto.innerHTML = [...new Set(config
  .filter(i=>i.tipo_servico==tipoServico.value && i.material==material.value)
  .map(i=>i.produto))]
  .map(i=>`<option>${i}</option>`).join("")

 atualizarEsp()
}

function atualizarEsp(){

 espessura.innerHTML = config
  .filter(i=>i.tipo_servico==tipoServico.value && i.material==material.value && i.produto==produto.value)
  .map(i=>i.espessura)
  .filter(e=>e && e!="-")
  .map(e=>`<option>${e}</option>`).join("")
}

// 🔥 CEP CORRIGIDO
cep.addEventListener("blur", async ()=>{

 try{

  let c = cep.value.replace(/\D/g,'')

  if(c.length !== 8){
    console.log("CEP inválido")
    return
  }

  console.log("Buscando CEP...")

  let r = await fetch(`https://viacep.com.br/ws/${c}/json/`)
  let d = await r.json()

  console.log("CEP:", d)

  if(d.erro){
    alert("CEP não encontrado")
    return
  }

  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""

 }catch(e){
  console.error("Erro CEP:", e)
 }

})

// EVENTOS
tipoServico.onchange = atualizarMaterial
material.onchange = atualizarProduto
produto.onchange = atualizarEsp

carregar()

</script>

</body>
</html>
