<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Romer Art</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:15px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{width:100%;padding:12px;margin-top:5px;border:none;border-radius:6px;font-weight:bold}
.add{background:orange}
.pix{background:green;color:#fff}
.send{background:#22c55e;color:#fff}
</style>
</head>

<body>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome" required>
<input id="email" placeholder="Email" required>
<input id="cep" placeholder="CEP" required>
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número" required>
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipo">
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
</select>

<select id="esp">
<option>3mm</option>
</select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="add()">Adicionar</button>
<button class="pix" onclick="pix()">Gerar PIX</button>
<button class="send" id="enviar" disabled>Enviar Pedido</button>

</div>

<div class="card" id="resumo"></div>

<script>

let itens = []
let total = 0
let pedidoId = null

// 🔥 CEP AUTOMÁTICO
cep.addEventListener("blur", async () => {

 const c = cep.value.replace(/\D/g,'');

 if(c.length !== 8) return;

 try{
  const res = await fetch(`https://viacep.com.br/ws/${c}/json/`);
  const data = await res.json();

  rua.value = data.logradouro || "";
  bairro.value = data.bairro || "";
  cidade.value = data.localidade || "";

 }catch(e){
  console.log("Erro CEP", e);
 }

});


// ➕ ADD ITEM
function add(){

 if(!largura.value || !altura.value || !qtd.value){
  alert("Preencha largura, altura e quantidade");
  return;
 }

 if(largura.value>400 || altura.value>400){
  alert("Máx 400mm");
  return;
 }

 let valor = qtd.value * 0.20;

 itens.push({
  tipo: tipo.value,
  material: material.value,
  esp: esp.value,
  largura: largura.value,
  altura: altura.value,
  qtd: qtd.value,
  valor: valor
 });

 atualizar();
}


// 🔄 ATUALIZAR RESUMO
function atualizar(){

 total = 0
 let html = "<b>Pedido:</b><br><br>"

 itens.forEach((i,index)=>{
  total += i.valor

  html += `
  ${index+1}) ${i.tipo}<br>
  ${i.material} ${i.esp}<br>
  ${i.largura}x${i.altura}mm | Qtd:${i.qtd}<br>
  R$ ${i.valor.toFixed(2)}<br><br>
  `
 })

 html += `<b>Total: R$ ${total.toFixed(2)}</b>`

 resumo.innerHTML = html
}


// 💰 GERAR PIX
async function pix(){

 if(!nome.value || !email.value || !cep.value || !numero.value){
  alert("Preencha os dados do cliente");
  return;
 }

 if(itens.length === 0){
  alert("Adicione um item");
  return;
 }

 try{

  pedidoId = Date.now();

  const res = await fetch("https://pix-romer-art.onrender.com/pix",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      valor: total,
      pedidoId: pedidoId
    })
  });

  const data = await res.json();

  if(!data.qr){
    alert("Erro ao gerar PIX");
    console.log(data);
    return;
  }

  resumo.innerHTML += `
  <br><br><b>PIX:</b><br>
  <img src="data:image/png;base64,${data.qr}" style="width:250px"><br><br>

  <input value="${data.copia}" style="width:100%;padding:10px" readonly>
  <br><small>Copia e cola PIX</small>

  <br><br>Aguardando pagamento...
  `;

  verificar();

 }catch(e){
  alert("Erro conexão PIX");
  console.log(e);
 }
}


// 🔎 VERIFICAR STATUS REAL
function verificar(){

 const intervalo = setInterval(async()=>{

  const res = await fetch(`https://pix-romer-art.onrender.com/status/${pedidoId}`)
  const data = await res.json()

  if(data.status=="approved"){
    resumo.innerHTML += "<br>✅ PAGAMENTO APROVADO"
    enviar.disabled = false
    clearInterval(intervalo)
  }

 },3000)
}

</script>

</body>
</html>
