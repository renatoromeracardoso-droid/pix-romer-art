<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container { padding: 15px; }

.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.filtros{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.filtros input, .filtros select{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

.table-container {
  margin-top:15px;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-size:13px;
}

.badge {
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido { background:#22c55e; color:#000; }
.pendente { background:#f59e0b; color:#000; }

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2><span>Total</span></div>
  <div class="card"><h2 id="pendentes">0</h2><span>Pendentes</span></div>
  <div class="card"><h2 id="emitidos">0</h2><span>Emitidos</span></div>
  <div class="card"><h2 id="envios">0</h2><span>Envios</span></div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwXb_yo5m0zagS4NvEOLhcpUI-yUljh70bAo2iZLWO7Se0k39Z7FgXTUSmTj_kTb5TFdw/exec";

let pedidos = [];
let menuAtual = null;

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function fecharMenu(){
  if(menuAtual){
    menuAtual.remove();
    menuAtual = null;
  }
}

/* 🔥 CARREGAR SEGURO */
async function carregar(){
  try{
    const res = await fetch(API + "?t=" + new Date().getTime());
    const text = await res.text();

    try{
      pedidos = JSON.parse(text);
    }catch{
      console.error("Resposta inválida:", text);
      toast("Erro na API ❌");
      pedidos = [];
    }

    atualizarCards();
    render();

  }catch(e){
    console.error(e);
    toast("Erro ao carregar ❌");
  }
}

function atualizarManual(){
  toast("Atualizando...");
  carregar();
}

function statusNF(s){
  s = (s || "").toLowerCase();
  if(s === "emitido") return "emitido";
  return "pendente";
}

function atualizarCards(){
  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>statusNF(p["Status NF"])==="pendente").length;
  emitidos.innerText = pedidos.filter(p=>statusNF(p["Status NF"])==="emitido").length;
  envios.innerText = pedidos.filter(p=>p["Frete"]).length;
}

function render(){

  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const status = statusNF(p["Status NF"]);

    if(filtro !== "todos" && status !== filtro) return;
    if(busca && !(p["Nome"]||"").toLowerCase().includes(busca)) return;

    tabela.innerHTML+=`
    <tr>
      <td>
        <button onclick="menu(${i},this)">⋮</button>
        ${p["ID Pedido"] || "-"}
      </td>
      <td>${p["Nome"] || "-"}</td>
      <td>R$ ${p["Valor"] || "0.00"}</td>
      <td><span class="badge ${status}">${status}</span></td>
      <td>${p["Frete"]?"📦":"-"}</td>
    </tr>`;
  });
}

function menu(i,el){
  fecharMenu();

  const m = document.createElement("div");
  m.className="menu-popup";

  m.innerHTML=`
    <button onclick="emitir(${i})">📄 Emitir Nota</button>
    <button onclick="envio(${i})">📦 Gerar Envio</button>
    <button onclick="etiqueta(${i})">🏷 Etiqueta</button>
    <button onclick="nota(${i})">👁 Nota</button>
    <button onclick="pdf(${i})">📥 PDF</button>
  `;

  document.body.appendChild(m);

  const r=el.getBoundingClientRect();
  m.style.top=r.bottom+"px";
  m.style.left=r.left+"px";
  m.style.display="flex";

  menuAtual=m;
}

document.addEventListener("click", (e)=>{
  if(!e.target.closest(".menu-popup") && !e.target.closest("button")){
    fecharMenu();
  }
});

async function emitir(i){
  fecharMenu();
  await fetch(API+"?acao=emitir&id="+pedidos[i]["ID Pedido"]);
  carregar();
}

async function envio(i){
  fecharMenu();
  await fetch(API+"?acao=envio&id="+pedidos[i]["ID Pedido"]);
  carregar();
}

async function etiqueta(i){
  fecharMenu();
  const res = await fetch(API+"?acao=etiqueta&id="+pedidos[i]["ID Pedido"]);
  const txt = await res.text();

  try{
    const data = JSON.parse(txt);
    if(data.etiqueta) window.open(data.etiqueta);
  }catch{
    toast("Erro etiqueta ❌");
  }

  carregar();
}

function nota(i){
  fecharMenu();
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}`);
}

function pdf(i){
  fecharMenu();
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}&pdf=1`);
}

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtro").addEventListener("change", render);

carregar();

</script>

</body>
</html>
