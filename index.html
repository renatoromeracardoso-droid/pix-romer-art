<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>

:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#f97316;
  --green:#22c55e;
  --yellow:#f59e0b;
}

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(180deg,#020617,#020617,#0f172a);
  color:#e2e8f0;
}

/* HEADER */
header{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn-refresh{
  background:var(--accent);
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#0f172a;
  padding:18px;
  border-radius:16px;
  text-align:center;
}

.card h2{
  margin:0;
  color:var(--accent);
}

/* FILTRO */
.filtros{
  padding:10px;
  display:flex;
  gap:10px;
}

input,select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

/* TABELA */
.table-container{
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:12px;
  border-bottom:1px solid #1e293b;
}

.badge{
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido{background:var(--green);color:#000;}
.pendente{background:var(--yellow);color:#000;}

/* MENU */
.menu-popup{
  position:absolute;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:8px;
  display:flex;
  flex-direction:column;
  z-index:999;
  animation:fade .2s;
}

.menu-popup button{
  background:none;
  border:none;
  color:white;
  padding:12px;
  text-align:left;
  cursor:pointer;
  border-radius:10px;
}

.menu-popup button:hover{
  background:#1e293b;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}

</style>
</head>

<body>

<header>
🚀 RomerArt • Sistema
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
  <div class="card"><h2 id="envios">0</h2>Envios</div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-container">
<table>
<tbody id="tabela"></tbody>
</table>
</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwEY9Ybci7rULdNEiS49_vcXPi2_vsPtwk-R5s1ndNjSn3qx4Y4o7GWpVpXAxDm_8LwZQ/exec";
const API_ETIQUETA = "https://script.google.com/macros/s/AKfycbzQeZfOaSKql1r7NrsLcEs6wMO5knXEZWQBxHdopu7K5wk2NSQPdg5_C-3OUiJ4x_7qxA/exec";

let pedidos=[];
let menuAtual=null;

function toast(msg,erro=false){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.background=erro?"#ef4444":"#22c55e";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function fecharMenu(){
  if(menuAtual){menuAtual.remove();menuAtual=null;}
}

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu-popup") && !e.target.closest("button")){
    fecharMenu();
  }
});

async function carregar(){
  const r=await fetch(API);
  pedidos=await r.json();
  atualizarCards();
  render();
}

function atualizarCards(){
  total.innerText=pedidos.length;
  pendentes.innerText=pedidos.filter(p=>p["Status NF"]!=="emitido").length;
  emitidos.innerText=pedidos.filter(p=>p["Status NF"]==="emitido").length;
  envios.innerText=pedidos.filter(p=>p["Frete"]||p["Rastreio"]).length;
}

function render(){
  tabela.innerHTML="";
  pedidos.forEach((p,i)=>{
    tabela.innerHTML+=`
    <tr>
      <td>
        <button onclick="menu(${i},this)">⋮</button>
        ${p["ID Pedido"]}
      </td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td>
        <span class="badge ${p["Status NF"]==="emitido"?"emitido":"pendente"}">
        ${p["Status NF"]}
        </span>
      </td>
      <td>${(p["Frete"]||p["Rastreio"])?"📦":"-"}</td>
    </tr>`;
  });
}

function menu(i,el){

  fecharMenu();

  const p=pedidos[i];
  const m=document.createElement("div");
  m.className="menu-popup";

  m.innerHTML=`
    <button onclick="nota(${i})">👁 Ver Nota</button>
    <button onclick="pdf(${i})">📄 PDF</button>
    <button onclick="emitir(${i})">📄 Emitir Nota</button>
    <button onclick="envio(${i})">📦 Gerar Envio</button>
    <button onclick="etiqueta(${i})">🏷 Etiqueta</button>
    <button onclick="declaracao(${i})">📦 Declaração</button>
  `;

  document.body.appendChild(m);

  const r=el.getBoundingClientRect();
  m.style.top=r.bottom+"px";
  m.style.left=r.left+"px";

  menuAtual=m;
}

/* FUNÇÕES */

async function atualizarManual(){
  toast("Atualizando...");
  await carregar();
}

async function emitir(i){
  fecharMenu();
  await fetch(API+"?acao=emitir&id="+pedidos[i]["ID Pedido"]);
  toast("Nota emitida");
  carregar();
}

async function envio(i){
  fecharMenu();
  await fetch(API+"?acao=envio&id="+pedidos[i]["ID Pedido"]);
  toast("Envio criado");
  carregar();
}

async function etiqueta(i){
  fecharMenu();
  const r=await fetch(API_ETIQUETA+"?id="+pedidos[i]["ID Pedido"]);
  const t=await r.text();

  if(t.startsWith("http")){
    window.open(t);
    toast("Etiqueta pronta");
  }else{
    toast(t,true);
  }
}

function nota(i){
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}`);
}

function pdf(i){
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}&pdf=1`);
}

function declaracao(i){
  const p=pedidos[i];
  window.open(`declaracao.html?nome=${p["Nome"]}&valor=${p["Valor"]}`);
}

document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtro").addEventListener("change",render);

carregar();

</script>

</body>
</html>
