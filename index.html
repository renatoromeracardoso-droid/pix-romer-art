<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

button {
  background: #22c55e;
  border: none;
  padding: 8px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
  <thead>
    <tr>
      <th>Pedido</th>
      <th>Cliente</th>
      <th>CPF/CNPJ</th>
      <th>Email</th>
      <th>Serviço</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Ação</th>
    </tr>
  </thead>

  <tbody id="tabela"></tbody>
</table>

<script>
const API = "https://pix-romer-art.onrender.com"; // ⚠️ CONFERE ISSO

async function carregarPedidos() {
  try {
    const res = await fetch(`${API}/pedidos`);
    const dados = await res.json();

    console.log(dados); // 🔍 debug

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach(p => {
      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Servico"] || "-"}</td>
          <td>${p["Valor"] || "-"}</td>
          <td>${p["Status"] || "-"}</td>
          <td>
            <button onclick="emitirNota('${p["ID Pedido"]}')">
              Emitir Nota
            </button>
          </td>
        </tr>
      `;
    });

  } catch (erro) {
    console.log("Erro ao carregar pedidos:", erro);
    alert("Erro ao carregar dados");
  }
}

async function emitirNota(id) {
  try {
    const res = await fetch(`${API}/emitir/${id}`, {
      method: "POST"
    });

    const data = await res.json();

    if (data.sucesso) {
      alert("Nota emitida com sucesso!");
    } else {
      alert("Erro ao emitir nota");
    }

  } catch (e) {
    alert("Erro no servidor");
  }
}

carregarPedidos();
</script>

</body>
</html>
