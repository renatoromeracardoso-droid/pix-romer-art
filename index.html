<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas Fiscais</title>

<style>
body {
  background: #1e293b;
  color: #fff;
  font-family: Arial;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #334155;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #475569;
  text-align: left;
}

th {
  background: #0f172a;
}

.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.pago {
  background: #16a34a;
}

.emitido {
  background: #2563eb;
}

button {
  padding: 6px 10px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.btn-emitir {
  background: #22c55e;
}

.btn-disabled {
  background: #64748b;
  cursor: not-allowed;
}
</style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>CPF/CNPJ</th>
  <th>Email</th>
  <th>Serviço</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

// SUA API DO GOOGLE SCRIPT (ATUALIZADA)
const API_EMITIR = "https://script.google.com/macros/s/AKfycbzSnyWol8f3D2U1sapo5YTypaEcShDeyWnMJHS_v1J12-rltxkXxsI3fvzUrlzEmkDtcw/exec";

let pedidos = [];

async function carregarPedidos() {
  try {
    const res = await fetch(API);
    const dados = await res.json();

    pedidos = dados;

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach((p, index) => {

      const status = (p["Status NF"] || "").toLowerCase();
      const pago = status === "pago" || status === "paid";
      const emitido = status === "emitido";

      let badge = `<span class="badge">${status || "-"}</span>`;

      if (pago) {
        badge = `<span class="badge pago">PAGO</span>`;
      }

      if (emitido) {
        badge = `<span class="badge emitido">EMITIDO</span>`;
      }

      let botao = `<button class="btn-disabled">Aguardando</button>`;

      if (pago && !emitido) {
        botao = `<button class="btn-emitir" onclick="emitir(${index})">Emitir</button>`;
      }

      if (emitido) {
        botao = `<button class="btn-disabled">Emitido</button>`;
      }

      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"] || "-"}</td>
          <td>${p["Nome"] || "-"}</td>
          <td>${p["CPF/CNPJ"] || "-"}</td>
          <td>${p["Email"] || "-"}</td>
          <td>${p["Serviço"] || "-"}</td>
          <td>R$ ${p["Valor"] || "-"}</td>
          <td>${badge}</td>
          <td>${botao}</td>
        </tr>
      `;
    });

  } catch (err) {
    alert("Erro ao carregar dados");
    console.error(err);
  }
}

async function emitir(index) {
  const pedido = pedidos[index];

  if (!confirm("Emitir nota do pedido " + pedido["ID Pedido"] + "?")) return;

  try {

    const url = API_EMITIR + "?id=" + pedido["ID Pedido"];

    const res = await fetch(url);
    const data = await res.json();

    if (data.ok) {
      alert("Nota emitida com sucesso!");
      carregarPedidos();
    } else {
      alert("Erro: " + (data.erro || "Erro desconhecido"));
    }

  } catch (err) {
    alert("Erro real: " + err.message);
    console.error(err);
  }
}

carregarPedidos();

</script>

</body>
</html>
