<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px }
.container { max-width:500px; margin:auto }
input, select, button {
  width:100%; padding:10px; margin:5px 0;
  border-radius:8px; border:none
}
button:disabled { opacity:0.5 }
.btn-add { background:orange }
.btn-pix { background:green; color:white }
.btn-send { background:#22c55e; color:white }
.resumo { background:#1e293b; padding:15px; border-radius:10px; margin-top:15px }
</style>
</head>

<body>

<div class="container">

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>
<select id="servico">
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
<option>Acrílico</option>
</select>

<input id="largura" type="number" placeholder="Largura (máx 400)">
<input id="altura" type="number" placeholder="Altura (máx 400)">
<input id="qtd" type="number" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button id="btnPix" class="btn-pix" onclick="gerarPix()" disabled>Gerar PIX</button>
<button id="btnEnviar" class="btn-send" onclick="enviarPedido()" disabled>Enviar Pedido</button>

<div id="resumo" class="resumo"></div>

</div>

<script>

let itens = []
let total = 0
let frete = 0
let desconto = 0
let pagamentoId = null
let pedidoNumero = "PED-" + Date.now()

cep.onblur = async () => {
  const res = await fetch(`https://viacep.com.br/ws/${cep.value}/json/`)
  const d = await res.json()

  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""

  frete = cep.value.startsWith("03822") ? 0 : 15
}

// ---------------- ADD ITEM ----------------
function addItem() {

  if (largura.value > 400 || altura.value > 400) {
    alert("Máx 400mm")
    return
  }

  if (!largura.value || !altura.value || !qtd.value) {
    alert("Preencha tudo")
    return
  }

  const item = {
    servico: servico.value,
    material: material.value,
    largura: Number(largura.value),
    altura: Number(altura.value),
    qtd: Number(qtd.value)
  }

  item.preco = ((item.largura * item.altura) / 1000) * item.qtd

  itens.push(item)
  total += item.preco

  atualizarResumo()
  btnPix.disabled = false
}

// ---------------- RESUMO ----------------
function atualizarResumo() {

  desconto = (total + frete) * 0.05
  const totalFinal = total + frete - desconto

  let html = `<b>Pedido: ${pedidoNumero}</b><br><br>`

  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `<b>Email:</b> ${email.value}<br>`
  html += `<b>Endereço:</b><br>${rua.value}, ${numero.value}<br>${bairro.value} - ${cidade.value}<br><br>`

  html += `<b>Itens:</b><br><br>`

  itens.forEach((i, index) => {
    html += `${index+1}) ${i.servico} - ${i.material}<br>`
    html += `${i.largura}x${i.altura} mm | Qtd: ${i.qtd}<br>`
    html += `R$ ${i.preco.toFixed(2)}<br><br>`
  })

  html += `<b>Subtotal: R$ ${total.toFixed(2)}</b><br>`
  html += `<b>Frete: ${frete === 0 ? "Grátis" : "R$ " + frete}</b><br>`
  html += `<b>Desconto (5%): -R$ ${desconto.toFixed(2)}</b><br>`
  html += `<b>Total Final: R$ ${(totalFinal).toFixed(2)}</b><br>`

  resumo.innerHTML = html
}

// ---------------- PIX ----------------
async function gerarPix() {

  const totalFinal = total + frete - desconto

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ valor: Number(totalFinal.toFixed(2)) })
  })

  const data = await res.json()

  if (!data.qr_code_base64) {
    alert("Erro ao gerar PIX")
    return
  }

  pagamentoId = data.id

  resumo.innerHTML += `
    <br><img src="data:image/png;base64,${data.qr_code_base64}" width="200">
    <br><small>${data.copiaecola}</small>
    <br id="statusPix">⏳ Aguardando pagamento...
  `

  verificarPagamento()
}

// ---------------- STATUS ----------------
function verificarPagamento() {

  const interval = setInterval(async () => {

    try {

      const res = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
      const data = await res.json()

      console.log("STATUS:", data)

      if (data.status === "approved") {

        clearInterval(interval)

        document.getElementById("statusPix").innerHTML = "✅ Pagamento aprovado"
        document.getElementById("btnEnviar").disabled = false

      } else {
        document.getElementById("btnEnviar").disabled = true
      }

    } catch (e) {
      console.log("Erro status:", e)
      document.getElementById("btnEnviar").disabled = true
    }

  }, 3000)
}

// ---------------- ENVIAR ----------------
async function enviarPedido() {

  const resStatus = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
  const dataStatus = await resStatus.json()

  if (dataStatus.status !== "approved") {
    alert("Pagamento não confirmado")
    return
  }

  const pedido = {
    id: pedidoNumero,
    cliente: {
      nome: nome.value,
      email: email.value,
      cidade: cidade.value
    },
    total: total + frete - desconto,
    itens
  }

  // 🔥 SALVAR PLANILHA
  await fetch("https://script.google.com/macros/s/AKfycbyoE1fckemtWTKY6KNkrvnsZWUXkvDsmmjpPe2AKoZK1Vk52YzdDLvdDz6UVpqoYPDr/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(pedido)
  })

  // 🔥 WHATSAPP
  window.open(`https://wa.me/5511946447040?text=Pedido%20${pedidoNumero}`)

  alert("Pedido enviado com sucesso 🚀")
}

</script>

</body>
</html>
