<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RomerArt</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#22c55e;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
.hidden{display:none;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="endereco" placeholder="Rua" readonly>
<input id="bairro" placeholder="Bairro" readonly>
<input id="cidade" placeholder="Cidade" readonly>
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Pedido</h3>

<select id="servico"></select>
<select id="material"></select>
<select id="espessura"></select>
<select id="produto"></select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>
<div id="pix" class="box"></div>

</div>

<script>

// ===== LINKS =====
const URL_SERVICOS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=51228853&output=csv";
const URL_PRODUTOS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=189072882&output=csv";
const URL_MATERIAIS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=0&output=csv";
const URL_CONFIG="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=170544498&output=csv";

const API="https://pix-romer-art.onrender.com/pix";

let servicos=[],produtos=[],materiais=[],config={};
let itens=[];

// ===== CSV =====
function csvToJson(csv){
 let linhas=csv.trim().split("\n");
 let headers=linhas[0].split(",");
 return linhas.slice(1).map(l=>{
  let values=l.split(",");
  let obj={};
  headers.forEach((h,i)=>obj[h.trim()]=(values[i]||"").trim());
  return obj;
 });
}

// ===== NUMERO =====
function n(v){
 if(!v) return 0;
 v=v.toString().replace(",",".");
 return isNaN(parseFloat(v))?0:parseFloat(v);
}

// ===== NORMALIZAR =====
function norm(t){
 return t?.toString().trim().toLowerCase();
}

// ===== CARREGAR =====
async function carregar(){

 servicos=csvToJson(await fetch(URL_SERVICOS).then(r=>r.text()));
 produtos=csvToJson(await fetch(URL_PRODUTOS).then(r=>r.text()));
 materiais=csvToJson(await fetch(URL_MATERIAIS).then(r=>r.text()));
 let conf=csvToJson(await fetch(URL_CONFIG).then(r=>r.text()));

 conf.forEach(c=>config[c.tipo]=n(c.valor));

 servico.innerHTML='<option>Serviço</option>'+servicos.map(x=>`<option>${x.nome}</option>`).join("");
 produto.innerHTML='<option>Produto</option>'+produtos.map(x=>`<option>${x.nome}</option>`).join("");
 material.innerHTML='<option>Material</option>'+materiais.map(x=>`<option>${x.nome}</option>`).join("");

 material.onchange=()=>{
  let lista=materiais.filter(x=>norm(x.nome)==norm(material.value));
  let esp=[...new Set(lista.map(x=>x.espessura))];
  espessura.innerHTML='<option>Espessura</option>'+esp.map(e=>`<option>${e}</option>`).join("");
 };

}

carregar();

// ===== CONTROLE =====
servico.onchange=()=>{
 if(servico.value==="Gravação"){
  material.classList.add("hidden");
  espessura.classList.add("hidden");
  produto.classList.remove("hidden");
 }else{
  material.classList.remove("hidden");
  espessura.classList.remove("hidden");
  produto.classList.add("hidden");
 }
};

// ===== LIMITE =====
largura.oninput=()=>{if(largura.value>400)largura.value=400;}
altura.oninput=()=>{if(altura.value>400)altura.value=400;}

// ===== CEP =====
cep.onblur=async()=>{
 let d=await fetch(`https://viacep.com.br/ws/${cep.value}/json/`).then(r=>r.json());
 endereco.value=d.logradouro;
 bairro.value=d.bairro;
 cidade.value=d.localidade;
};

// ===== CALCULO =====
function calcular(){

 let q=n(qtd.value);

 if(produto.value){
  let p=produtos.find(x=>norm(x.nome)==norm(produto.value));
  return n(p?.preco)*q;
 }

 let mat=materiais.find(x=>
  norm(x.nome)==norm(material.value)&&
  norm(x.espessura)==norm(espessura.value)
 );

 let serv=servicos.find(x=>norm(x.nome)==norm(servico.value));

 if(!mat||!serv) return 0;

 let area=(n(largura.value)*n(altura.value))/100;

 return area*n(mat.valor_base)*n(serv.multiplicador)*q;
}

// ===== ADD =====
function addItem(){

 let valor=calcular();

 if(valor<=0){
  alert("Erro no cálculo - verifique planilha");
  return;
 }

 itens.push({
  servico:servico.value,
  material:material.value,
  espessura:espessura.value,
  produto:produto.value,
  l:largura.value,
  a:altura.value,
  q:qtd.value,
  valor
 });

 render();
}

// ===== RESUMO =====
function render(){

 let total=0;
 let html="";

 itens.forEach((i,x)=>{
  total+=i.valor;

  html+=`${x+1}) ${i.servico}<br>
  ${i.material} ${i.espessura}<br>
  ${i.produto||""}<br>
  ${i.l}x${i.a} Qtd:${i.q}<br>
  R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let desconto=(config.desconto_pix||5)/100;
 let final=total-(total*desconto);

 if(final<(config.minimo||0)) final=config.minimo;

 html+=`
 Subtotal: R$ ${total.toFixed(2)}<br>
 Desconto PIX: -R$ ${(total*desconto).toFixed(2)}<br>
 <b>Total: R$ ${final.toFixed(2)}</b>`;

 resumo.innerHTML=html;
}

// ===== PIX =====
async function gerarPix(){

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let desconto=(config.desconto_pix||5)/100;
 let final=total-(total*desconto);

 if(final<(config.minimo||0)) final=config.minimo;

 let r=await fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({valor:Number(final.toFixed(2))})
 });

 let d=await r.json();

 if(!d || !d.qr){
  pix.innerHTML="Erro PIX";
  return;
 }

 pix.innerHTML=`<img src="data:image/png;base64,${d.qr}" width="200"><br><textarea>${d.copia}</textarea>`;
}

// ===== WHATS =====
function enviarWhats(){
 window.open("https://wa.me/5511946447040?text="+encodeURIComponent(resumo.innerText));
}

</script>

</body>
</html>
