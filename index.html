<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {padding:15px;}

.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card {
  background:#020617;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.filtros {
  margin-top:15px;
  display:flex;
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:none;
  background:#020617;
  color:white;
}

table {width:100%;margin-top:15px;}

td,th {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.badge {
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.emitido {background:#22c55e;color:#000;}
.pendente {background:#f59e0b;color:#000;}

.menu-popup {
  position:absolute;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:10px;
  display:none;
  flex-direction:column;
  z-index:999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  opacity:0;
}

.toast.show {opacity:1;}

.loading {
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<header>
Sistema Notas
<button onclick="atualizarManual()">Atualizar</button>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
  <div class="card"><h2 id="envios">0</h2>Envios</div>
</div>

<div class="filtros">
  <input type="date" id="filtroData">
  <select id="filtroEnvio">
    <option value="todos">Envio: Todos</option>
    <option value="com">Com envio</option>
    <option value="sem">Sem envio</option>
  </select>
</div>

<div id="loading" class="loading">Carregando...</div>

<table>
<thead>
<tr>
<th></th>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_SCRIPT = "https://script.google.com/macros/s/AKfycbwO1J85bxJyKFPdk9n9hgpKHFVHd_wVrP7NOZb098mdzlzvIr6fmWrbUDco-u08sB4/exec";

let pedidos = [];
let menuAtual = null;

/* 🔥 TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* 🔥 STATUS */
function status(s){
  return (s||"").toLowerCase()=="emitido" ? "emitido" : "pendente";
}

/* 🔥 CACHE */
function salvarCache(data){
  localStorage.setItem("cache", JSON.stringify(data));
}

function carregarCache(){
  const cache = localStorage.getItem("cache");
  if(cache){
    pedidos = JSON.parse(cache);
    atualizarUI();
  }
}

/* 🔥 CARREGAR */
async function carregar(){

  document.getElementById("loading").style.display = "block";

  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(Array.isArray(data)){
      pedidos = data;
      salvarCache(data);
    }

  }catch(e){
    console.log("erro api, usando cache");
    carregarCache();
  }

  atualizarUI();
  document.getElementById("loading").style.display = "none";
}

/* 🔥 ATUALIZAR */
function atualizarManual(){
  showToast("Atualizando...");
  carregar();
}

/* 🔥 UI */
function atualizarUI(){

  total.innerText = pedidos.length || 0;
  pendentes.innerText = pedidos.filter(p=>status(p["Status NF"])=="pendente").length || 0;
  emitidos.innerText = pedidos.filter(p=>status(p["Status NF"])=="emitido").length || 0;
  envios.innerText = pedidos.filter(p=>p["Frete"]).length || 0;

  render();
}

/* 🔥 TABELA */
function render(){

  tabela.innerHTML="";

  const dataFiltro = document.getElementById("filtroData").value;
  const envioFiltro = document.getElementById("filtroEnvio").value;

  pedidos.forEach((p,i)=>{

    const st = status(p["Status NF"]);

    if(envioFiltro=="com" && !p["Frete"]) return;
    if(envioFiltro=="sem" && p["Frete"]) return;

    if(dataFiltro && p["Data"]){
      if(!p["Data"].startsWith(dataFiltro)) return;
    }

    tabela.innerHTML += `
    <tr>
      <td><button onclick="abrirMenu(${i},this)">⋮</button></td>
      <td>${p["ID Pedido"] || "-"}</td>
      <td>${p["Nome"] || "-"}</td>
      <td>R$ ${p["Valor"] || 0}</td>
      <td><span class="badge ${st}">${st}</span></td>
      <td>${p["Frete"] || "-"}</td>
    </tr>
    `;
  });
}

/* 🔥 MENU COMPLETO */
function abrirMenu(i, el){

  if(menuAtual) menuAtual.remove();

  const p = pedidos[i];
  const m = document.createElement("div");
  m.className = "menu-popup";

  if(status(p["Status NF"]) !== "emitido"){
    const e = document.createElement("button");
    e.innerText="📄 Emitir Nota";
    e.onclick = ()=>emitir(p);
    m.appendChild(e);
  }

  m.innerHTML += `
    <button onclick="window.open('nota.html?id=${p["ID Pedido"]}')">👁 Nota Sistema</button>
    <button onclick="window.open('${p["Link Nota"] || "#"}')">🧾 Nota Oficial</button>
    <button onclick="window.open('nota.html?id=${p["ID Pedido"]}&pdf=1')">📥 PDF</button>
    <button onclick="window.open('declaracao.html?nome=${encodeURIComponent(p["Nome"])}&cpf=${p["CPF/CNPJ"]}&servico=${encodeURIComponent(p["Serviço"])}&valor=${p["Valor"]}')">📦 Declaração</button>
    <button onclick="window.open('https://rastreamento.correios.com.br/app/index.php?objetos=${p["Rastreio"] || ""}')">🚚 Rastrear</button>
  `;

  const env = document.createElement("button");
  env.innerText="📦 Gerar Envio";
  env.onclick = ()=>gerarEnvio(p);
  m.appendChild(env);

  document.body.appendChild(m);

  const r = el.getBoundingClientRect();
  m.style.top = r.bottom+"px";
  m.style.left = r.left+"px";
  m.style.display="flex";

  menuAtual = m;
}

/* 🔥 AÇÕES */
async function emitir(p){
  showToast("Emitindo...");
  await fetch(API_SCRIPT + "?acao=emitir&id=" + p["ID Pedido"]);
  carregar();
}

async function gerarEnvio(p){
  showToast("Gerando envio...");
  await fetch(API_SCRIPT + "?acao=envio&id=" + p["ID Pedido"]);
  carregar();
}

/* FILTROS */
document.getElementById("filtroData").addEventListener("change", render);
document.getElementById("filtroEnvio").addEventListener("change", render);

/* INIT */
carregarCache();
carregar();

</script>

</body>
</html>
