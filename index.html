<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

.container {
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card h2 {
  margin: 0;
  font-size: 26px;
}

.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1e293b;
  font-size: 13px;
}

th {
  text-align: left;
  color: #94a3b8;
}

.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.pago { background: #16a34a; }
.emitido { background: #2563eb; }
.pendente { background: #475569; }

button {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.btn-emitir {
  background: #22c55e;
  color: white;
}

.btn-disabled {
  background: #334155;
  color: #94a3b8;
  cursor: not-allowed;
}
</style>
</head>

<body>

<header>🚀 Sistema SaaS • Notas Fiscais</header>

<div class="container">

<div class="cards">
  <div class="card">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card">
    <h2 id="pendentes">0</h2>
    <span>Pendentes</span>
  </div>
  <div class="card">
    <h2 id="emitidos">0</h2>
    <span>Emitidos</span>
  </div>
</div>

<div class="filtros">
  <input type="text" id="busca" placeholder="Buscar cliente ou pedido...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pago">Pagos</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>CPF/CNPJ</th>
  <th>Email</th>
  <th>Serviço</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

// 🔥 NOVO LINK CORRETO
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];

function statusNormalizado(s) {
  if (!s) return "";
  s = s.toLowerCase().trim();

  if (s === "paid") return "pago";
  if (s === "emitido") return "emitido";

  return s;
}

async function carregar() {
  const res = await fetch(API);
  pedidos = await res.json();

  atualizarCards();
  render();
}

function atualizarCards() {

  document.getElementById("total").innerText = pedidos.length;

  const pendentes = pedidos.filter(p => {
    const status = statusNormalizado(p["Status NF"]);
    return status !== "emitido";
  }).length;

  const emitidos = pedidos.filter(p => 
    statusNormalizado(p["Status NF"]) === "emitido"
  ).length;

  document.getElementById("pendentes").innerText = pendentes;
  document.getElementById("emitidos").innerText = emitidos;
}

function render() {
  const tabela = document.getElementById("tabela");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML = "";

  pedidos.forEach((p, i) => {

    const texto = (p["Nome"] + p["ID Pedido"]).toLowerCase();
    if (!texto.includes(busca)) return;

    const status = statusNormalizado(p["Status NF"]);

    if (filtro !== "todos" && status !== filtro) return;

    let badge = `<span class="badge pendente">-</span>`;
    let btn = `<button class="btn-disabled">Aguardando</button>`;

    if (status === "pago") {
      badge = `<span class="badge pago">PAGO</span>`;
      btn = `<button class="btn-emitir" onclick="emitir(${i}, this)">Emitir</button>`;
    }

    if (status === "emitido") {
      badge = `<span class="badge emitido">EMITIDO</span>`;
      btn = `<button class="btn-disabled">Emitido</button>`;
    }

    tabela.innerHTML += `
      <tr>
        <td>${p["ID Pedido"]}</td>
        <td>${p["Nome"]}</td>
        <td>${p["CPF/CNPJ"]}</td>
        <td>${p["Email"]}</td>
        <td>${p["Serviço"]}</td>
        <td>R$ ${p["Valor"]}</td>
        <td>${badge}</td>
        <td>${btn}</td>
      </tr>
    `;
  });
}

async function emitir(i, btn) {
  const pedido = pedidos[i];

  btn.innerText = "Emitindo...";

  try {
    const res = await fetch(API_EMITIR + "?id=" + pedido["ID Pedido"]);
    const data = await res.json();

    if (data.ok) {
      carregar();
    } else {
      alert(data.erro || "Erro ao emitir");
    }

  } catch (e) {
    alert("Erro real: " + e.message);
  }

  btn.innerText = "Emitir";
}

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtro").addEventListener("change", render);

carregar();

</script>

</body>
</html>
