<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.add{background:#f97316;}
.pix{background:#22c55e;}
.enviar{background:#16a34a;}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome*" required>
<input id="email" placeholder="Email*" required>
<input id="cep" placeholder="CEP*" required>
<input id="numero" placeholder="Número*" required>
<input id="rua" placeholder="Rua" disabled>
<input id="bairro" placeholder="Bairro" disabled>
<input id="cidade" placeholder="Cidade" disabled>
</div>

<div class="card">
<h3>Pedido</h3>

<select id="servico"></select>
<select id="material"></select>
<select id="produto"></select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" id="btnEnviar" disabled onclick="enviarPedido()">Enviar Pedido</button>
</div>

<div class="card">
<h3>Resumo</h3>
<div id="resumo"></div>
<div id="total"></div>
<div id="pix"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
