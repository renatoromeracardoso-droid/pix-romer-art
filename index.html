<script>

let itens = []
let pixId = null
let pedidoId = "PED-" + Date.now()

// 🔥 VALIDAÇÃO FORTE
function validar() {

  if (!nome.value || !email.value || !cep.value || !numero.value) {
    alert("Preencha todos os campos obrigatórios")
    return false
  }

  if (itens.length === 0) {
    alert("Adicione pelo menos 1 item")
    return false
  }

  return true
}

// 🔥 ADD ITEM (CORRIGIDO)
function addItem() {

  const l = Number(largura.value)
  const a = Number(altura.value)
  const q = Number(qtd.value)

  if (!l || !a || !q) {
    alert("Preencha todos os campos do item")
    return
  }

  if (l > 400 || a > 400) {
    alert("Limite máximo 400mm")
    return
  }

  // 🔥 REGRA MELHORADA
  const area = (l * a) / 10000
  const valorUnit = 0.10 // base temporária
  const valor = area * valorUnit * q

  itens.push({
    largura: l,
    altura: a,
    qtd: q,
    valor
  })

  atualizarResumo()
}

// 🔥 TOTAL
function total() {
  return itens.reduce((s,i)=>s+i.valor,0)
}

// 🔥 RESUMO COMPLETO
function atualizarResumo(status="Aguardando pagamento") {

  let html = `<b>Pedido:</b> ${pedidoId}<br>`
  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `<b>Email:</b> ${email.value}<br>`
  html += `<b>Endereço:</b> ${rua.value}, ${numero.value} - ${bairro.value} - ${cidade.value}<br><br>`

  itens.forEach((i,idx)=>{
    html += `${idx+1}) ${i.largura}x${i.altura} | Qtd: ${i.qtd} | R$ ${i.valor.toFixed(2)}<br>`
  })

  html += `<br><b>Total: R$ ${total().toFixed(2)}</b><br>`
  html += `<b>Status:</b> ${status}<br>`

  html += `<img id="qrcode" width="200"><br>`
  html += `<p id="pixCopia"></p>`

  resumo.innerHTML = html
}

// 🔥 PIX
async function gerarPix() {

  if (!validar()) return

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ valor: total() })
  })

  const data = await res.json()

  if (!data.id) {
    alert("Erro ao gerar PIX")
    return
  }

  pixId = data.id

  atualizarResumo()

  qrcode.src = "data:image/png;base64," + data.qr_code_base64
  pixCopia.innerText = data.copiaecola

  monitorar()
}

// 🔥 MONITORAMENTO
function monitorar() {

  const loop = setInterval(async ()=>{

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pixId}`)
    const data = await res.json()

    if (data.status === "approved") {
      atualizarResumo("Pagamento aprovado ✅")
      clearInterval(loop)
    }

  }, 4000)
}

// 🔥 ENVIO GARANTIDO (COM LOG)
async function enviarPedido() {

  if (!validar()) return

  const dados = {
    pedido: pedidoId,
    nome: nome.value,
    email: email.value,
    cep: cep.value,
    rua: rua.value,
    bairro: bairro.value,
    cidade: cidade.value,
    numero: numero.value,
    total: total(),
    itens,
    status: "Novo"
  }

  try {

    const res = await fetch("https://script.google.com/macros/s/AKfycbyoE1fckemtWTKY6KNkrvnsZWUXkvDsmmjpPe2AKoZK1Vk52YzdDLvdDz6UVpqoYPDr/exec", {
      method:"POST",
      body: JSON.stringify(dados)
    })

    const result = await res.json()
    console.log("PLANILHA:", result)

  } catch (err) {
    console.log("ERRO PLANILHA:", err)
    alert("Erro ao salvar na planilha")
  }

  // 🔥 WHATSAPP COMPLETO
  let msg = `Pedido ${pedidoId}%0A`
  msg += `Cliente: ${nome.value}%0A`
  msg += `Endereço: ${rua.value}, ${numero.value}%0A`

  itens.forEach((i,idx)=>{
    msg += `${idx+1}) ${i.largura}x${i.altura} Qtd:${i.qtd} R$${i.valor.toFixed(2)}%0A`
  })

  msg += `Total: R$ ${total().toFixed(2)}`

  window.open(`https://wa.me/5511946447040?text=${msg}`)

  alert("Pedido enviado 🚀")
}

</script>
