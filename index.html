<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container { padding: 15px; }

.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.table-container {
  margin-top:15px;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-size:13px;
}

.badge {
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido { background:#22c55e; color:#000; }
.pendente { background:#f59e0b; color:#000; }

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2><span>Total</span></div>
  <div class="card"><h2 id="pendentes">0</h2><span>Pendentes</span></div>
  <div class="card"><h2 id="emitidos">0</h2><span>Emitidos</span></div>
  <div class="card"><h2 id="envios">0</h2><span>Envios</span></div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="toast" class="toast"></div>

    <script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_SCRIPT = "https://script.google.com/macros/s/AKfycbwO1J85bxJyKFPdk9n9hgpKHFVHd_wVrP7NOZb098mdzlzvIr6fmWrbUDco-u08sB4/exec";

let pedidos = [];
let menuAtual = null;

/* 🔥 NORMALIZAR OBJETO (RESOLVE TUDO) */
function limparObjeto(obj){
  let novo = {};
  for(let k in obj){
    let key = k.trim().replace(/\s+/g," ");
    novo[key] = obj[k];
  }
  return novo;
}

/* STATUS */
function normalizarStatus(s){
  s = (s || "").toLowerCase();
  if(s === "emitido") return "emitido";
  if(s === "paid") return "pendente";
  return "pendente";
}

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* CARREGAR */
async function carregar(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    let data = await res.json();

    if(!Array.isArray(data)){
      data = Object.values(data);
    }

    // 🔥 limpa todas as chaves
    pedidos = data.map(limparObjeto);

    atualizarCards();
    render();

  }catch(e){
    console.error(e);
    showToast("Erro ao carregar ❌");
  }
}

/* CARDS */
function atualizarCards(){
  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>normalizarStatus(p["Status NF"])==="pendente").length;
  emitidos.innerText = pedidos.filter(p=>normalizarStatus(p["Status NF"])==="emitido").length;
  envios.innerText = pedidos.filter(p=>p["Frete"]).length;
}

/* RENDER */
function render(){
  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const id = p["ID Pedido"] || "-";
    const nome = p["Nome"] || "-";
    const valor = p["Valor"] || "0.00";
    const status = normalizarStatus(p["Status NF"]);
    const envio = p["Frete"] ? "📦" : "-";

    tabela.innerHTML += `
    <tr>
      <td>
        <button onclick="abrirMenu(${i}, this)">⋮</button>
        ${id}
      </td>
      <td>${nome}</td>
      <td>R$ ${valor}</td>
      <td><span class="badge ${status}">${status}</span></td>
      <td>${envio}</td>
    </tr>
    `;
  });
}

/* MENU */
function abrirMenu(i, el){

  if(menuAtual) menuAtual.remove();

  const p = pedidos[i];
  const menu = document.createElement("div");
  menu.className = "menu-popup";

  let html = "";

  if(normalizarStatus(p["Status NF"]) !== "emitido"){
    html += `<button onclick="emitir(${i})">📄 Emitir Nota</button>`;
  }

  if(!p["Frete"]){
    html += `<button onclick="gerarEnvio(${i})">📦 Gerar Envio</button>`;
  }

  html += `<button onclick="gerarDeclaracao(${i})">📦 Declaração</button>`;
  html += `<button onclick="verNota(${i})">👁 Nota</button>`;
  html += `<button onclick="pdf(${i})">📥 PDF</button>`;

  menu.innerHTML = html;

  document.body.appendChild(menu);

  const rect = el.getBoundingClientRect();
  menu.style.top = rect.bottom+"px";
  menu.style.left = rect.left+"px";
  menu.style.display = "flex";

  menuAtual = menu;
}

/* FECHAR MENU */
document.addEventListener("click", (e) => {
  if (!e.target.closest(".menu-popup") && !e.target.closest("button")) {
    if(menuAtual) menuAtual.remove();
  }
});

/* AÇÕES */
function verNota(i){
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}`);
}

function pdf(i){
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}&pdf=1`);
}

function gerarDeclaracao(i){
  const p = pedidos[i];
  window.open(`declaracao.html?nome=${encodeURIComponent(p["Nome"])}&cpf=${p["CPF/CNPJ"]}&servico=${encodeURIComponent(p["Serviço"])}&valor=${p["Valor"]}`);
}

/* EMITIR */
async function emitir(i){
  showToast("Emitindo...");
  await fetch(API_SCRIPT + "?acao=emitir&id=" + pedidos[i]["ID Pedido"]);
  if(menuAtual) menuAtual.remove();
  showToast("Nota emitida ✅");
  setTimeout(carregar, 800);
}

/* ENVIO */
async function gerarEnvio(i){
  showToast("Gerando envio...");
  await fetch(API_SCRIPT + "?acao=envio&id=" + pedidos[i]["ID Pedido"]);
  if(menuAtual) menuAtual.remove();
  showToast("Envio gerado 🚀");
  setTimeout(carregar, 800);
}

/* INIT */
carregar();

    </script>

</body>
</html>
