<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#22c55e;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
.hidden{display:none;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome *" required>
<input id="email" placeholder="Email *" required>
<input id="cep" placeholder="CEP *" required>
<input id="endereco" placeholder="Rua" readonly>
<input id="bairro" placeholder="Bairro" readonly>
<input id="cidade" placeholder="Cidade" readonly>
<input id="numero" placeholder="Número *" required>
</div>

<div class="card">
<h3>Pedido</h3>

<select id="servico"></select>
<select id="material"></select>
<select id="espessura"></select>
<select id="produto"></select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>
<div id="pix" class="box"></div>

</div>

<script>

// ===== LINKS PLANILHA =====
const URL_SERVICOS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=51228853&output=csv";
const URL_PRODUTOS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=189072882&output=csv";
const URL_MATERIAIS="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=0&output=csv";

const API="https://pix-romer-art.onrender.com/pix";

let servicos=[],produtos=[],materiais=[];
let itens=[];

// ===== CSV =====
function csvToJson(csv){
 let linhas=csv.trim().split("\n");
 let headers=linhas[0].split(",");

 return linhas.slice(1).map(l=>{
  let values=l.split(",");
  let obj={};
  headers.forEach((h,i)=>obj[h.trim()]=(values[i]||"").trim());
  return obj;
 });
}

// ===== CARREGAR =====
async function carregar(){

 let s=await fetch(URL_SERVICOS).then(r=>r.text());
 let p=await fetch(URL_PRODUTOS).then(r=>r.text());
 let m=await fetch(URL_MATERIAIS).then(r=>r.text());

 servicos=csvToJson(s);
 produtos=csvToJson(p);
 materiais=csvToJson(m);

 servico.innerHTML='<option value="">Serviço</option>'+servicos.map(x=>`<option>${x.nome}</option>`).join("");
 produto.innerHTML='<option value="">Produto</option>'+produtos.map(x=>`<option>${x.nome}</option>`).join("");
 material.innerHTML='<option value="">Material</option>'+materiais.map(x=>`<option>${x.nome}</option>`).join("");

 material.onchange=()=>{
  let lista=materiais.filter(x=>x.nome===material.value);
  let esp=[...new Set(lista.map(x=>x.espessura))];

  espessura.innerHTML='<option value="">Espessura</option>'+esp.map(e=>`<option>${e}</option>`).join("");
 };

}

carregar();

// ===== CONTROLE =====
servico.onchange=()=>{
 if(servico.value==="Gravação"){
  material.classList.add("hidden");
  espessura.classList.add("hidden");
  produto.classList.remove("hidden");
 }else{
  material.classList.remove("hidden");
  espessura.classList.remove("hidden");
  produto.classList.add("hidden");
 }
};

// ===== LIMITE =====
largura.oninput=()=>{if(largura.value>400)largura.value=400;}
altura.oninput=()=>{if(altura.value>400)altura.value=400;}

// ===== CEP =====
cep.onblur=async()=>{
 let r=await fetch(`https://viacep.com.br/ws/${cep.value}/json/`);
 let d=await r.json();
 endereco.value=d.logradouro;
 bairro.value=d.bairro;
 cidade.value=d.localidade;
};

// ===== CALCULO =====
function calcular(){

 let q=Number(qtd.value)||1;

 if(produto.value){
  let p=produtos.find(x=>x.nome===produto.value);
  return Number(p?.preco||0)*q;
 }

 let mat = materiais.find(x =>
   x.nome===material.value && x.espessura===espessura.value
 );

 let serv = servicos.find(x=>x.nome===servico.value);

 if(!mat || !serv) return 0;

 let l=Number(largura.value)||0;
 let a=Number(altura.value)||0;

 if(l<=0 || a<=0) return 0;

 let area=(l*a)/100;

 return area * Number(mat.preco) * Number(serv.multiplicador) * q;
}

// ===== ADD =====
function addItem(){

 let valor=calcular();
 if(valor<=0){alert("Preencha corretamente");return;}

 itens.push({
  servico:servico.value,
  material:material.value,
  espessura:espessura.value,
  produto:produto.value,
  l:largura.value,
  a:altura.value,
  q:qtd.value,
  valor
 });

 render();
}

// ===== RESUMO =====
function render(){

 let total=0;
 let html="";

 itens.forEach((i,x)=>{
  total+=i.valor;

  html+=`
  <b>${x+1}) ${i.servico}</b><br>
  ${i.material||""} ${i.espessura||""}<br>
  ${i.produto||""}<br>
  ${i.l}x${i.a} Qtd:${i.q}<br>
  R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let desconto=total*0.05;
 let final=total-desconto;

 html+=`
 <hr>
 Subtotal: R$ ${total.toFixed(2)}<br>
 Desconto PIX: -R$ ${desconto.toFixed(2)}<br>
 <b>Total: R$ ${final.toFixed(2)}</b>`;

 resumo.innerHTML=html;
}

// ===== PIX =====
async function gerarPix(){

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let final=total-(total*0.05);

 if(final<1){
  pix.innerHTML="Valor inválido";
  return;
 }

 try{
  let r=await fetch(API,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({valor:Number(final.toFixed(2))})
  });

  let d=await r.json();

  if(!d || !d.qr){
   pix.innerHTML="Erro ao gerar PIX";
   return;
  }

  pix.innerHTML=`
  <img src="data:image/png;base64,${d.qr}" width="200"><br>
  <textarea>${d.copia}</textarea>`;

 }catch(e){
  pix.innerHTML="Erro servidor PIX";
 }

}

// ===== WHATS =====
function enviarWhats(){

 let texto=`Pedido:\n${resumo.innerText}`;

 window.open("https://wa.me/5511946447040?text="+encodeURIComponent(texto));
}

</script>

</body>
</html>
