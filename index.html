<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container { padding: 15px; }

.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:15px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-size:13px;
}

.badge {
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido { background:#22c55e; color:#000; }
.pendente { background:#f59e0b; color:#000; }

.novo {
  background: #1e293b;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from { background:#1e293b; }
  to { background:#334155; }
}

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2><span>Total</span></div>
  <div class="card"><h2 id="pendentes">0</h2><span>Pendentes</span></div>
  <div class="card"><h2 id="emitidos">0</h2><span>Emitidos</span></div>
  <div class="card"><h2 id="envios">0</h2><span>Envios</span></div>
</div>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_SCRIPT = "https://script.google.com/macros/s/AKfycbwO1J85bxJyKFPdk9n9hgpKHFVHd_wVrP7NOZb098mdzlzvIr6fmWrbUDco-u08sB4/exec";

let pedidos = [];
let menuAtual = null;
let pedidosAntigos = JSON.parse(localStorage.getItem("pedidos_ids") || "[]");

/* STATUS */
function normalizarStatus(s){
  s = (s || "").toLowerCase();
  if(s === "emitido") return "emitido";
  return "pendente";
}

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* CARREGAR */
async function carregar(){
  try{
    const res = await fetch(API + "?t=" + Date.now());

    if(!res.ok){
      throw new Error("Erro na API");
    }

    const data = await res.json();

    // 🔥 GARANTE QUE SEMPRE É ARRAY
    pedidos = Array.isArray(data) ? data : [];

    atualizarCards();
    render();

  }catch(e){
    console.error(e);

    // 🔥 NÃO QUEBRA A TELA
    pedidos = [];

    total.innerText = 0;
    pendentes.innerText = 0;
    emitidos.innerText = 0;
    envios.innerText = 0;

    tabela.innerHTML = "<tr><td colspan='5'>Erro ao carregar dados</td></tr>";

    showToast("Erro ao carregar ❌");
  }
}

/* SALVAR IDS */
function salvarIDs(){
  const ids = pedidos.map(p=>p["ID Pedido"]);
  localStorage.setItem("pedidos_ids", JSON.stringify(ids));
}

/* CARDS */
function atualizarCards(){
  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>normalizarStatus(p["Status NF"])==="pendente").length;
  emitidos.innerText = pedidos.filter(p=>normalizarStatus(p["Status NF"])==="emitido").length;
  envios.innerText = pedidos.filter(p=>p["Frete"]).length;
}

/* TABELA */
function render(){
  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const status = normalizarStatus(p["Status NF"]);
    const envio = p["Frete"] ? "📦" : "-";

    const novo = !pedidosAntigos.includes(p["ID Pedido"]);

    tabela.innerHTML += `
    <tr class="${novo ? "novo" : ""}">
      <td>
        <button onclick="abrirMenu(${i}, this)">⋮</button>
        ${p["ID Pedido"]}
      </td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td><span class="badge ${status}">${status}</span></td>
      <td>${envio}</td>
    </tr>
    `;
  });
}

/* MENU */
function abrirMenu(i, el){

  if(menuAtual) menuAtual.remove();

  const p = pedidos[i];
  const menu = document.createElement("div");
  menu.className = "menu-popup";

  let html = "";

  if(normalizarStatus(p["Status NF"]) !== "emitido"){
    html += `<button onclick="emitir(${i})">📄 Emitir Nota</button>`;
  }

  if(!p["Frete"]){
    html += `<button onclick="gerarEnvio(${i})">📦 Gerar Envio</button>`;
  }

  html += `
    <button onclick="gerarDeclaracao(${i})">📦 Declaração</button>
    <button onclick="verNota(${i})">👁 Nota</button>
  `;

  if(p["Frete"]){
    html += `<button onclick="window.open('${p["Frete"]}')">🏷️ Etiqueta</button>`;
  }

  menu.innerHTML = html;

  document.body.appendChild(menu);

  const rect = el.getBoundingClientRect();
  menu.style.top = rect.bottom+"px";
  menu.style.left = rect.left+"px";
  menu.style.display = "flex";

  menuAtual = menu;
}

/* FECHAR MENU */
document.addEventListener("click", (e) => {
  if (!e.target.closest(".menu-popup") && !e.target.closest("button")) {
    if(menuAtual) menuAtual.remove();
  }
});

/* AÇÕES */
function verNota(i){
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}`);
}

function gerarDeclaracao(i){
  const p = pedidos[i];
  window.open(`declaracao.html?nome=${encodeURIComponent(p["Nome"])}&cpf=${p["CPF/CNPJ"]}&servico=${encodeURIComponent(p["Serviço"])}&valor=${p["Valor"]}`);
}

async function emitir(i){
  const p = pedidos[i];
  await fetch(API_SCRIPT + "?acao=emitir&id=" + p["ID Pedido"]);
  showToast("Nota emitida");
  carregar();
}

async function gerarEnvio(i){
  const p = pedidos[i];
  await fetch(API_SCRIPT + "?acao=envio&id=" + p["ID Pedido"]);
  showToast("Envio gerado");
  carregar();
}

/* AUTO UPDATE (EMPRESA) */
setInterval(carregar, 15000);

/* INIT */
carregar();

</script>

</body>
</html>
