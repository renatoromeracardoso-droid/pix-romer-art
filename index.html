<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt</title>

<style>
body{
  background:#0f1b2d;
  font-family:Arial;
  color:#fff;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
}
input,select{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.add{background:orange;}
.pix{background:green;color:#fff;}
.enviar{background:#2ecc71;color:#fff;}
.card{
  background:#1e2a3a;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>🚀 RomerArt</h2>

<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">

<input id="cep" placeholder="CEP *">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<hr>

<select id="tipo"></select>
<select id="material"></select>
<select id="produto"></select>
<select id="espessura"></select>

<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

<div id="resumo" class="card"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbySieWPENR4fuSFyWxJprDE-w-9_V6MbM-o7jNb3sMoHaMFTrqWou69kPJNZh4Si0e2/exec"

let config = []
let itens = []

// 🔥 CARREGAR CONFIG
async function carregarConfig(){
  const res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify({ tipo:"config" })
  })
  config = await res.json()
  montarSelects()
}

// 🔥 SELECTS
function montarSelects(){

  const tipos = [...new Set(config.map(i=>i.tipo_servico))]
  document.getElementById("tipo").innerHTML =
    tipos.map(v=>`<option>${v}</option>`)

  atualizarMaterial()
}

function atualizarMaterial(){
  const tipo = document.getElementById("tipo").value
  const materiais = config.filter(i=>i.tipo_servico==tipo)

  const lista = [...new Set(materiais.map(i=>i.material))]
  document.getElementById("material").innerHTML =
    lista.map(v=>`<option>${v}</option>`)

  atualizarProduto()
}

function atualizarProduto(){
  const tipo = document.getElementById("tipo").value
  const material = document.getElementById("material").value

  const produtos = config.filter(i=>
    i.tipo_servico==tipo && i.material==material)

  const lista = [...new Set(produtos.map(i=>i.produto))]
  document.getElementById("produto").innerHTML =
    lista.map(v=>`<option>${v}</option>`)

  atualizarEspessura()
}

function atualizarEspessura(){
  const tipo = document.getElementById("tipo").value
  const material = document.getElementById("material").value
  const produto = document.getElementById("produto").value

  const lista = config.filter(i=>
    i.tipo_servico==tipo &&
    i.material==material &&
    i.produto==produto)

  document.getElementById("espessura").innerHTML =
    lista.map(v=>`<option>${v.espessura}</option>`)
}

// 🔥 EVENTOS
document.getElementById("tipo").onchange = atualizarMaterial
document.getElementById("material").onchange = atualizarProduto
document.getElementById("produto").onchange = atualizarEspessura

// 🔥 CEP
document.getElementById("cep").addEventListener("blur", async ()=>{
  const cep = document.getElementById("cep").value
  const res = await fetch(`https://viacep.com.br/ws/${cep}/json`)
  const data = await res.json()

  document.getElementById("rua").value = data.logradouro
  document.getElementById("bairro").value = data.bairro
  document.getElementById("cidade").value = data.localidade
})

// 🔥 ADICIONAR ITEM
function addItem(){

  let largura = parseFloat(largura.value)
  let altura = parseFloat(altura.value)
  let qtd = parseInt(qtd.value)

  if(largura>400 || altura>400){
    alert("Máx 400mm")
    return
  }

  let area = (largura*altura)/1000000

  const itemConfig = config.find(i=>
    i.tipo_servico==tipo.value &&
    i.material==material.value &&
    i.produto==produto.value &&
    i.espessura==espessura.value
  )

  let valor = area * itemConfig.preco_m2 * qtd

  itens.push({
    largura,altura,qtd,valor
  })

  atualizarResumo()
}

// 🔥 RESUMO
function atualizarResumo(){

  let total = itens.reduce((s,i)=>s+i.valor,0)

  let html = itens.map((i,idx)=>
    `${idx+1}) ${i.largura}x${i.altura} | Qtd:${i.qtd} | R$ ${i.valor.toFixed(2)}`
  ).join("<br>")

  document.getElementById("resumo").innerHTML = `
    ${html}
    <hr>
    <b>Total: R$ ${total.toFixed(2)}</b>
  `
}

// 🔥 PIX (simples)
function gerarPix(){
  alert("PIX gerado (simulação)")
}

// 🔥 ENVIAR
async function enviarPedido(){

  const total = itens.reduce((s,i)=>s+i.valor,0)

  const pedido = {
    tipo:"pedido",
    pedido:"PED-"+Date.now(),
    nome:nome.value,
    email:email.value,
    cep:cep.value,
    rua:rua.value,
    bairro:bairro.value,
    cidade:cidade.value,
    numero:numero.value,
    total:total,
    itens:itens
  }

  await fetch(URL,{
    method:"POST",
    body: JSON.stringify(pedido)
  })

  // WhatsApp
  let texto = `Pedido\nTotal: R$ ${total.toFixed(2)}`
  window.open(`https://wa.me/5511946447040?text=${encodeURIComponent(texto)}`)

  alert("Pedido enviado!")
}

// INIT
carregarConfig()

</script>

</body>
</html>
