<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* CARDS */
.cards {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.card-metric {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  min-width: 120px;
  text-align: center;
}

.card-metric h2 {
  margin: 0;
  font-size: 22px;
}

.card-metric span {
  font-size: 12px;
  color: #94a3b8;
}

/* FILTROS */
.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: white;
}

select {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: white;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  font-size: 13px;
}

th {
  color: #94a3b8;
}

/* BADGES */
.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.pago { background: #16a34a; }
.emitido { background: #2563eb; }
.pendente { background: #475569; }

/* BOTÕES */
button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.btn-emitir {
  background: #22c55e;
  color: white;
}

.btn-disabled {
  background: #334155;
  color: #94a3b8;
  cursor: not-allowed;
}

/* MOBILE */
@media (max-width: 768px) {
  table {
    display: block;
    overflow-x: auto;
  }
}
</style>
</head>

<body>

<header>🚀 Sistema de Notas Fiscais</header>

<div class="container">

<!-- MÉTRICAS -->
<div class="cards">
  <div class="card-metric">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card-metric">
    <h2 id="pagos">0</h2>
    <span>Pagos</span>
  </div>
  <div class="card-metric">
    <h2 id="emitidos">0</h2>
    <span>Emitidos</span>
  </div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <input type="text" id="busca" placeholder="Buscar cliente ou pedido...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pago">Pagos</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<!-- TABELA -->
<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbzSnyWol8f3D2U1sapo5YTypaEcShDeyWnMJHS_v1J12-rltxkXxsI3fvzUrlzEmkDtcw/exec";

let pedidos = [];

async function carregarPedidos() {
  const res = await fetch(API);
  pedidos = await res.json();

  atualizarDashboard();
  renderizar();
}

function atualizarDashboard() {
  document.getElementById("total").innerText = pedidos.length;

  const pagos = pedidos.filter(p => (p["Status NF"] || "").toLowerCase() === "pago").length;
  const emitidos = pedidos.filter(p => (p["Status NF"] || "").toLowerCase() === "emitido").length;

  document.getElementById("pagos").innerText = pagos;
  document.getElementById("emitidos").innerText = emitidos;
}

function renderizar() {
  const tabela = document.getElementById("tabela");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML = "";

  pedidos
    .filter(p => {
      const texto = (p["Nome"] + p["ID Pedido"]).toLowerCase();
      return texto.includes(busca);
    })
    .filter(p => {
      const status = (p["Status NF"] || "").toLowerCase();
      if (filtro === "pago") return status === "pago";
      if (filtro === "emitido") return status === "emitido";
      return true;
    })
    .forEach((p, index) => {

      const status = (p["Status NF"] || "").toLowerCase();

      let badge = `<span class="badge pendente">-</span>`;
      let botao = `<button class="btn-disabled">Aguardando</button>`;

      if (status === "pago") {
        badge = `<span class="badge pago">PAGO</span>`;
        botao = `<button class="btn-emitir" onclick="emitir(${index}, this)">Emitir</button>`;
      }

      if (status === "emitido") {
        badge = `<span class="badge emitido">EMITIDO</span>`;
        botao = `<button class="btn-disabled">Emitido</button>`;
      }

      tabela.innerHTML += `
        <tr>
          <td>${p["ID Pedido"]}</td>
          <td>${p["Nome"]}</td>
          <td>R$ ${p["Valor"]}</td>
          <td>${badge}</td>
          <td>${botao}</td>
        </tr>
      `;
    });
}

async function emitir(index, btn) {
  const pedido = pedidos[index];

  btn.innerText = "Emitindo...";

  try {
    const res = await fetch(API_EMITIR + "?id=" + pedido["ID Pedido"]);
    const data = await res.json();

    if (data.ok) {
      carregarPedidos();
    } else {
      alert(data.erro);
    }

  } catch (err) {
    alert("Erro: " + err.message);
  }

  btn.innerText = "Emitir";
}

document.getElementById("busca").addEventListener("input", renderizar);
document.getElementById("filtro").addEventListener("change", renderizar);

carregarPedidos();

</script>

</body>
</html>
