<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;font-weight:bold;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#25d366;display:none;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="cliente" placeholder="Nome" required>
<input id="email" placeholder="Email" required>
<input id="cep" placeholder="CEP" required>
<input id="endereco" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número" required>
</div>

<div class="card">
<h3>Pedido</h3>

<select id="servico" onchange="ajustarCampos()">
<option>Corte</option>
<option>Gravação</option>
<option>Corte + Gravação</option>
</select>

<select id="material">
<option>MDF</option>
<option>ACRILICO</option>
</select>

<select id="esp">
<option>3mm</option>
<option>6mm</option>
</select>

<select id="produto" style="display:none;">
<option>Chaveiro</option>
<option>Placa</option>
<option>Quadro</option>
</select>

<input id="larg" placeholder="Largura mm (máx 400)">
<input id="alt" placeholder="Altura mm (máx 400)">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

// ================= VAR =================
let itens = [];
let pago = false;
let mpId = null;
const WHATS = "5511946447040";

// ================= AJUSTE CAMPOS =================
function ajustarCampos(){

 let s = document.getElementById("servico").value;

 if(s === "Gravação"){
   document.getElementById("produto").style.display = "block";
   document.getElementById("material").style.display = "none";
   document.getElementById("esp").style.display = "none";
 } else {
   document.getElementById("produto").style.display = "none";
   document.getElementById("material").style.display = "block";
   document.getElementById("esp").style.display = "block";
 }

}

// ================= CEP =================
document.getElementById("cep").addEventListener("blur", function() {

  let c = this.value.replace(/\D/g,'');

  if(c.length !== 8) return;

  fetch("https://viacep.com.br/ws/" + c + "/json/")
  .then(r => r.json())
  .then(d => {
    document.getElementById("endereco").value = d.logradouro || "";
    document.getElementById("bairro").value = d.bairro || "";
    document.getElementById("cidade").value = d.localidade || "";
  });

});

// ================= ADD =================
function addItem(){

 let l = Number(document.getElementById("larg").value);
 let a = Number(document.getElementById("alt").value);
 let q = Number(document.getElementById("qtd").value);
 let s = document.getElementById("servico").value;

 if(!l || !a || !q){
   alert("Preencha corretamente");
   return;
 }

 if(l > 400 || a > 400){
   alert("Limite máximo 400mm");
   return;
 }

 let valor = ((l*a)/100)*0.1*q + 2;

 let item = {
   servico: s,
   l,a,q,valor
 };

 if(s === "Gravação"){
   item.produto = document.getElementById("produto").value;
 } else {
   item.material = document.getElementById("material").value;
   item.esp = document.getElementById("esp").value;
 }

 itens.push(item);

 render();

}

// ================= RENDER =================
function render(){

 let total = 0;
 let html = "📦 Pedido " + Date.now() + "<br><br>";

 html += "<b>Cliente:</b><br>" +
 document.getElementById("cliente").value + "<br>" +
 document.getElementById("email").value + "<br>" +
 document.getElementById("endereco").value + ", " +
 document.getElementById("numero").value + "<br>" +
 document.getElementById("bairro").value + " - " +
 document.getElementById("cidade").value + "<br><br>";

 itens.forEach(function(i,x){

   total += i.valor;

   html += (x+1) + ") " + i.servico + "<br>";

   if(i.servico === "Gravação"){
     html += "Produto: " + i.produto + "<br>";
   } else {
     html += i.material + " | Esp:" + i.esp + "<br>";
   }

   html += i.l + "x" + i.a + " mm | Qtd:" + i.q + "<br>";
   html += "R$ " + i.valor.toFixed(2) + "<br><br>";

 });

 let desc = total * 0.05;
 let final = total - desc;

 html += "Subtotal: R$ " + total.toFixed(2) + "<br>";
 html += "Desconto PIX: -R$ " + desc.toFixed(2) + "<br>";
 html += "<b>Total: R$ " + final.toFixed(2) + "</b><br><br>";

 document.getElementById("resumo").innerHTML = html;

}

// ================= PIX =================
function gerarPix(){

 if(itens.length === 0){
   alert("Adicione item");
   return;
 }

 let total = 0;
 itens.forEach(i => total += i.valor);

 let final = Number((total - total*0.05).toFixed(2));

 document.getElementById("resumo").innerHTML += "<br>Gerando PIX...";

 fetch("https://pix-romer-art.onrender.com/pix",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     valor: final,
     email: document.getElementById("email").value
   })
 })
 .then(r => r.json())
 .then(data => {

   mpId = data.id;

   document.getElementById("resumo").innerHTML +=
   "<br><img src='data:image/png;base64,"+data.qr_code_base64+"' width='200'><br>" +
   "<textarea style='width:100%'>"+data.qr_code+"</textarea><br>" +
   "<b id='status'>Aguardando pagamento...</b>";

   verificar();

 });

}

// ================= STATUS =================
function verificar(){

 let t = setInterval(function(){

   fetch("https://pix-romer-art.onrender.com/status/"+mpId)
   .then(r => r.json())
   .then(d => {

     if(d.status === "approved"){
       document.getElementById("status").innerHTML = "✅ PAGAMENTO APROVADO";
       document.getElementById("btnWhats").style.display = "block";
       pago = true;
       clearInterval(t);
     }

   });

 },3000);

}

// ================= WHATS =================
function enviarWhats(){

 if(!pago){
   alert("Pagamento não confirmado");
   return;
 }

 let txt = document.getElementById("resumo").innerText;

 window.open("https://wa.me/"+WHATS+"?text="+encodeURIComponent(txt));

}

</script>

</body>
</html>
