<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento Laser</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}
.btn-add { background: orange; }
.btn-pix { background: green; color: white; }
</style>

</head>
<body>

<div class="card">
  <h3>Cliente</h3>
  <input id="nome" placeholder="Nome *">
  <input id="email" placeholder="Email *">
</div>

<div class="card">
  <h3>Pedido</h3>

  <select id="servico">
    <option value="">Serviço</option>
    <option>Corte</option>
    <option>Gravação</option>
  </select>

  <select id="material">
    <option>MDF</option>
    <option>ACRILICO</option>
  </select>

  <input id="largura" placeholder="Largura (mm)">
  <input id="altura" placeholder="Altura (mm)">
  <input id="qtd" placeholder="Quantidade">

  <button class="btn-add" onclick="adicionarItem()">Adicionar</button>
  <button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
</div>

<div class="card" id="resumo"></div>
<div class="card" id="pixStatus"></div>

<script>
// 🔥 BACKEND (CONFERE SE É ESSE MESMO)
const API = "https://pix-romer-art.onrender.com";

let itens = [];
let total = 0;
let pedidoId = Math.floor(Math.random() * 999999);

// =====================
// ADICIONAR ITEM
// =====================
async function adicionarItem() {

  const servico = document.getElementById("servico").value;
  const material = document.getElementById("material").value;
  const largura = document.getElementById("largura").value;
  const altura = document.getElementById("altura").value;
  const qtd = document.getElementById("qtd").value;

  if (!servico || !largura || !altura || !qtd) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  try {
    const res = await fetch(`${API}/calcular`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        servico,
        material,
        largura,
        altura,
        quantidade: qtd
      })
    });

    const data = await res.json();

    if (data.erro) {
      alert(data.erro);
      return;
    }

    itens.push({
      servico,
      material,
      largura,
      altura,
      qtd,
      valor: data.valor
    });

    atualizarResumo();

  } catch (e) {
    alert("Erro ao calcular");
  }
}

// =====================
// RESUMO
// =====================
function atualizarResumo() {

  total = itens.reduce((s, i) => s + i.valor, 0);

  let html = `<h3>Pedido #${pedidoId}</h3>`;

  itens.forEach((i, idx) => {
    html += `
      <p><b>${idx+1}) ${i.servico}</b></p>
      <p>${i.material} - ${i.largura}x${i.altura} Qtd:${i.qtd}</p>
      <p>R$ ${i.valor.toFixed(2)}</p>
      <hr>
    `;
  });

  html += `<h2>Total: R$ ${total.toFixed(2)}</h2>`;

  document.getElementById("resumo").innerHTML = html;
}

// =====================
// PIX
// =====================
async function gerarPix() {

  if (total <= 0) {
    alert("Adicione itens primeiro");
    return;
  }

  const email = document.getElementById("email").value;

  try {
    const res = await fetch(`${API}/pix`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        valor: total,
        descricao: "Pedido #" + pedidoId,
        email: email
      })
    });

    const data = await res.json();

    if (data.erro) {
      throw new Error();
    }

    document.getElementById("pixStatus").innerHTML = `
      <h3>💳 PIX</h3>
      <img src="data:image/png;base64,${data.qr_code_base64}" width="200"/>
      <p>Copie o código:</p>
      <textarea style="width:100%">${data.qr_code}</textarea>
    `;

  } catch (e) {
    document.getElementById("pixStatus").innerHTML =
      "⚠ PIX indisponível no momento";
  }
}
</script>

</body>
</html>
