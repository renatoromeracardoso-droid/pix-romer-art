<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • SaaS</title>

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.btn-top {
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  padding:10px 16px;
  border-radius:10px;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* CONTAINER */
.container {
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:20px;
}

.card {
  background:#020617;
  padding:22px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 0 0 1px #1e293b;
}

.card h2 {
  margin:0;
  font-size:28px;
}

/* FILTROS */
.filtros {
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

input, select {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

/* TABELA */
.table-box {
  background:#020617;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1e293b;
}

table {
  width:100%;
  border-collapse:collapse;
}

thead {
  background:#020617;
}

th {
  text-align:left;
  padding:14px;
  font-size:12px;
  color:#94a3b8;
}

td {
  padding:14px;
  border-top:1px solid #1e293b;
}

tr:hover {
  background:#0f172a;
}

/* STATUS */
.badge {
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.pago { background:#16a34a; }
.emitido { background:#2563eb; }
.pendente { background:#475569; }

/* AÇÕES */
.acoes {
  display:flex;
  gap:8px;
}

button {
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.btn-emitir { background:#22c55e; color:white; }
.btn-disabled { background:#334155; color:#94a3b8; }

.btn-view { background:#0ea5e9; color:white; }
.btn-pdf { background:#a855f7; color:white; }

/* RESPONSIVO */
@media(max-width:768px){
  .cards {
    grid-template-columns:1fr;
  }

  .filtros {
    flex-direction:column;
  }

  td:nth-child(3),
  th:nth-child(3) {
    display:none;
  }
}
</style>
</head>

<body>

<header>
  🚀 Sistema SaaS • Notas
  <button class="btn-top" onclick="carregar()">🔄 Atualizar</button>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente ou pedido...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-box">
<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>
const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];

function statusNormalizado(s){
  if(!s) return "";
  s=s.toLowerCase();
  if(s==="paid") return "pago";
  if(s==="emitido") return "emitido";
  return "pendente";
}

async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

function atualizarCards(){
  document.getElementById("total").innerText = pedidos.length;

  const pendentes = pedidos.filter(p => statusNormalizado(p["Status NF"]) !== "emitido").length;
  const emitidos = pedidos.filter(p => statusNormalizado(p["Status NF"]) === "emitido").length;

  document.getElementById("pendentes").innerText = pendentes;
  document.getElementById("emitidos").innerText = emitidos;
}

function render(){
  const tabela = document.getElementById("tabela");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const texto=(p["Nome"]+p["ID Pedido"]).toLowerCase();
    if(!texto.includes(busca)) return;

    const status = statusNormalizado(p["Status NF"]);

    if(filtro==="pendente" && status==="emitido") return;
    if(filtro==="emitido" && status!=="emitido") return;

    let badge = `<span class="badge pendente">PENDENTE</span>`;
    let btn = `<button class="btn-disabled">Aguardando</button>`;

    if(status==="pago" || status==="pendente"){
      badge = `<span class="badge pago">PAGO</span>`;
      btn = `<button class="btn-emitir" onclick="emitir(${i},this)">Emitir</button>`;
    }

    if(status==="emitido"){
      badge = `<span class="badge emitido">EMITIDO</span>`;
      btn = `<button class="btn-disabled">Emitido</button>`;
    }

    tabela.innerHTML += `
    <tr>
      <td>${p["ID Pedido"]}</td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td>${badge}</td>
      <td>
        <div class="acoes">
          ${btn}
          <button class="btn-view" onclick="verNota('${p["Link NF"]}')">👁</button>
          <button class="btn-pdf" onclick="gerarPDF('${p["ID Pedido"]}')">PDF</button>
        </div>
      </td>
    </tr>`;
  });
}

async function emitir(i,btn){
  const pedido = pedidos[i];
  btn.innerText="Emitindo...";
  btn.disabled=true;

  const res = await fetch(API_EMITIR+"?id="+pedido["ID Pedido"]);
  const data = await res.json();

  if(data.ok){
    pedido["Status NF"]="emitido";
    render();
    atualizarCards();
  }
}

function verNota(link){
  if(link) window.open(link);
}

function gerarPDF(){
  alert("PDF em breve");
}

document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtro").addEventListener("change",render);

carregar();
</script>

</body>
</html>
