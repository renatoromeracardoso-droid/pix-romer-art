<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  font-weight: bold;
  cursor: pointer;
}

.btn-add { background: orange; }
.btn-pix { background: green; color: white; }
.btn-send { background: #22c55e; color: white; }

.resumo {
  margin-top: 20px;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>

<select id="servico">
  <option value="Corte">Corte</option>
  <option value="Gravação">Gravação</option>
</select>

<select id="material">
  <option value="MDF">MDF</option>
  <option value="Acrílico">Acrílico</option>
</select>

<input id="largura" type="number" placeholder="Largura">
<input id="altura" type="number" placeholder="Altura">
<input id="qtd" type="number" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnEnviar" class="btn-send" disabled onclick="enviarPedido()">Enviar Pedido</button>

<div class="resumo" id="resumo"></div>

</div>

<script>

let itens = []
let total = 0
let pagamentoId = null

// CEP automático
document.getElementById("cep").addEventListener("blur", async () => {
  const cep = document.getElementById("cep").value

  const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
  const data = await res.json()

  document.getElementById("rua").value = data.logradouro
  document.getElementById("bairro").value = data.bairro
  document.getElementById("cidade").value = data.localidade
})

// adicionar item
function addItem() {

  const servico = document.getElementById("servico").value
  const material = document.getElementById("material").value
  const largura = Number(document.getElementById("largura").value)
  const altura = Number(document.getElementById("altura").value)
  const qtd = Number(document.getElementById("qtd").value)

  const preco = ((largura * altura) / 1000) * qtd

  itens.push({ servico, material, largura, altura, qtd, preco })

  total += preco

  atualizarResumo()
}

// resumo
function atualizarResumo() {

  let html = ""

  itens.forEach((i, index) => {
    html += `
    ${index + 1}) ${i.servico}<br>
    Material: ${i.material}<br>
    ${i.largura}x${i.altura} | Qtd: ${i.qtd}<br>
    R$ ${i.preco.toFixed(2)}<br><br>
    `
  })

  html += `<b>Total: R$ ${total.toFixed(2)}</b><br>`

  document.getElementById("resumo").innerHTML = html
}

// gerar PIX
async function gerarPix() {

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ valor: total })
  })

  const data = await res.json()

  pagamentoId = data.id

  document.getElementById("resumo").innerHTML += `
    <br><img src="data:image/png;base64,${data.qr_code_base64}" width="200"><br>
    <small>${data.copiaecola}</small>
    <br>⏳ Aguardando pagamento...
  `

  verificarPagamento()
}

// verificar pagamento
function verificarPagamento() {

  const interval = setInterval(async () => {

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pagamentoId}`)
    const data = await res.json()

    if (data.status === "approved") {
      clearInterval(interval)

      document.getElementById("resumo").innerHTML += "<br>✅ Pagamento aprovado"

      liberarEnvio()
    }

  }, 3000)
}

// liberar botão
function liberarEnvio() {
  const btn = document.getElementById("btnEnviar")
  btn.disabled = false
  btn.style.opacity = "1"
}

// enviar pedido (Google Sheets)
async function enviarPedido() {

  const pedido = {
    id: Date.now(),
    cliente: {
      nome: nome.value,
      email: email.value,
      cidade: cidade.value
    },
    total,
    itens
  }

  await fetch("https://script.google.com/macros/s/AKfycbwor6wiV4noo8eysSyl4_nsdN2O897SiaErtuy00RlMVU6zBIHYIpqhsLakagnvjbls/exec", {
    method: "POST",
    body: JSON.stringify(pedido)
  })

  alert("Pedido enviado com sucesso 🚀")
}

</script>

</body>
</html>
