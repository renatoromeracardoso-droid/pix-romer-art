<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

button {
  padding: 8px 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>CPF/CNPJ</th>
  <th>Email</th>
  <th>Serviço</th>
  <th>Valor</th>
  <th>Ação</th>
</tr>
</thead>

<tbody id="tabela">
</tbody>
</table>

<script>

const API_URL = "https://pix-romer-art.onrender.com/pedidos";

async function carregarDados() {
  try {
    const resposta = await fetch(API_URL);
    const dados = await resposta.json();

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach(item => {

      console.log("DADO REAL:", item);

      // 🔥 Inteligente: tenta vários nomes possíveis
      const id = item["ID Pedido"] || item["id"] || item["Pedido"] || "-";
      const nome = item["Nome"] || item["Cliente"] || item["cliente"] || "-";
      const cpf = item["CPF/CNPJ"] || item["cpf"] || "-";
      const email = item["Email"] || item["email"] || "-";
      const servico = item["Serviço"] || item["Material"] || "-";
      const valor = item["Valor"] || item["Preço"] || item["preco"] || "-";

      const linha = `
        <tr>
          <td>${id}</td>
          <td>${nome}</td>
          <td>${cpf}</td>
          <td>${email}</td>
          <td>${servico}</td>
          <td>R$ ${valor}</td>
          <td>
            <button onclick="emitirNota('${id}', '${nome}', '${cpf}', '${email}', '${servico}', '${valor}')">
              Emitir Nota
            </button>
          </td>
        </tr>
      `;

      tabela.innerHTML += linha;
    });

  } catch (erro) {
    console.error("Erro:", erro);
    alert("Erro ao carregar dados");
  }
}

function emitirNota(id, nome, cpf, email, servico, valor) {

  const url = "https://hook.us2.make.com/nuq3e37vp5tkkpxtef51nqf51n63rssa";

  fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id_pedido: id,
      nome: nome,
      cpf_cnpj: cpf,
      email: email,
      servico: servico,
      valor: valor
    })
  })
  .then(() => {
    alert("✅ Nota enviada!");
  })
  .catch(() => {
    alert("❌ Erro ao enviar");
  });

}

carregarDados();

</script>

</body>
</html>
