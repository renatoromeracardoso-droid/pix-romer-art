<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}
button {
  font-weight: bold;
}
.add { background: orange }
.pix { background: green; color: white }
.enviar { background: #22c55e; color: white }
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">

<h3>Pedido</h3>
<select id="tipo">
  <option>Corte</option>
</select>

<select id="material">
  <option>MDF</option>
</select>

<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

<div class="card" id="resumo"></div>

<script>

let itens = []
let pixId = null

// 🔥 CEP AUTOMÁTICO
document.getElementById("cep").addEventListener("blur", async () => {
  const cep = document.getElementById("cep").value.replace(/\D/g, "")
  if (cep.length !== 8) return

  const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
  const data = await res.json()

  document.getElementById("rua").value = data.logradouro
  document.getElementById("bairro").value = data.bairro
  document.getElementById("cidade").value = data.localidade
})

// 🔥 ADD ITEM
function addItem() {

  const largura = Number(document.getElementById("largura").value)
  const altura = Number(document.getElementById("altura").value)
  const qtd = Number(document.getElementById("qtd").value)

  if (!largura || !altura || !qtd) {
    alert("Preencha tudo")
    return
  }

  if (largura > 400 || altura > 400) {
    alert("Limite máximo 400mm")
    return
  }

  const valor = (largura * altura * qtd) / 10000

  itens.push({
    largura, altura, qtd, valor
  })

  atualizarResumo()
}

// 🔥 TOTAL
function calcularTotal() {
  return itens.reduce((s, i) => s + i.valor, 0)
}

// 🔥 RESUMO
function atualizarResumo(status = "Aguardando pagamento") {

  const nome = document.getElementById("nome").value
  const email = document.getElementById("email").value
  const rua = document.getElementById("rua").value
  const numero = document.getElementById("numero").value
  const bairro = document.getElementById("bairro").value
  const cidade = document.getElementById("cidade").value

  let html = `<b>Cliente:</b> ${nome}<br>${email}<br>
  <b>Endereço:</b> ${rua}, ${numero} - ${bairro} - ${cidade}<br><br>`

  itens.forEach((i, index) => {
    html += `${index+1}) ${i.largura}x${i.altura} | Qtd: ${i.qtd} | R$ ${i.valor.toFixed(2)}<br>`
  })

  const total = calcularTotal()

  html += `<br><b>Total: R$ ${total.toFixed(2)}</b><br>`
  html += `<b>Status:</b> ${status}<br>`

  html += `<img id="qrcode" width="200"><br>`
  html += `<p id="pixCopia"></p>`

  document.getElementById("resumo").innerHTML = html
}

// 🔥 GERAR PIX
async function gerarPix() {

  const total = calcularTotal()

  const res = await fetch("https://pix-romer-art.onrender.com/pix", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ valor: total })
  })

  const data = await res.json()

  pixId = data.id

  atualizarResumo()

  document.getElementById("qrcode").src =
    "data:image/png;base64," + data.qr_code_base64

  document.getElementById("pixCopia").innerText =
    data.copiaecola

  verificarPagamento()
}

// 🔥 VERIFICAR STATUS
function verificarPagamento() {

  const interval = setInterval(async () => {

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pixId}`)
    const data = await res.json()

    if (data.status === "approved") {
      atualizarResumo("Pagamento aprovado ✅")
      clearInterval(interval)
    }

  }, 5000)
}

// 🔥 ENVIAR PEDIDO
async function enviarPedido() {

  const dados = {
    nome: document.getElementById("nome").value,
    email: document.getElementById("email").value,
    cep: document.getElementById("cep").value,
    rua: document.getElementById("rua").value,
    bairro: document.getElementById("bairro").value,
    cidade: document.getElementById("cidade").value,
    numero: document.getElementById("numero").value,
    total: calcularTotal(),
    itens: itens,
    status: "Pedido enviado"
  }

  await fetch("https://script.google.com/macros/s/AKfycbyoE1fckemtWTKY6KNkrvnsZWUXkvDsmmjpPe2AKoZK1Vk52YzdDLvdDz6UVpqoYPDr/exec", {
    method: "POST",
    body: JSON.stringify(dados)
  })

  // 🔥 WHATSAPP
  const texto = encodeURIComponent(
    `Pedido RomerArt\nCliente: ${dados.nome}\nTotal: R$ ${dados.total}`
  )

  window.open(`https://wa.me/5511946447040?text=${texto}`)

  alert("Pedido enviado 🚀")
}

</script>

</body>
</html>
