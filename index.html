<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;font-weight:bold;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#25d366;display:none;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="cliente" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="endereco" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Serviço</h3>

<select id="tipo">
<option value="">Selecione</option>
<option>Corte</option>
<option>Gravação</option>
<option>Corte + Gravação</option>
</select>

<select id="item"></select>
<select id="esp"></select>

<input id="larg" placeholder="Largura mm (máx 400)">
<input id="alt" placeholder="Altura mm (máx 400)">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

// ================= CONFIG =================
const WHATS = "5511946447040";

const materiais = {
 MDF:{preco:0.1, esp:[3,6]},
 ACRILICO:{preco:0.15, esp:[2,3,5]},
 COMPENSADO:{preco:0.08, esp:[3,4]},
 MADEIRA:{preco:0.12, esp:[3,5]}
};

const produtos = {
 COPO:8, TACA:10, GARRAFA:15,
 CHAVEIRO:3, CANETA:2, LAPIS:1
};

let itens=[];
let pago=false;

// ================= LIMITES =================
larg.oninput=()=>{if(larg.value>400)larg.value=400;}
alt.oninput=()=>{if(alt.value>400)alt.value=400;}

// ================= CEP =================
cep.onblur=async()=>{
 let c=cep.value.replace(/\D/g,'');
 if(c.length!==8)return;
 let d=await (await fetch("https://viacep.com.br/ws/"+c+"/json/")).json();
 endereco.value=d.logradouro||"";
 bairro.value=d.bairro||"";
 cidade.value=d.localidade||"";
}

// ================= CARREGAR ITENS =================
tipo.onchange=()=>{

 item.innerHTML="<option value=''>Selecione</option>";
 esp.style.display="none";

 if(tipo.value==="Corte"){
   Object.keys(materiais).forEach(i=>item.innerHTML+=`<option>${i}</option>`);
 }

 if(tipo.value==="Gravação"){
   Object.keys(produtos).forEach(i=>item.innerHTML+=`<option>${i}</option>`);
 }

 if(tipo.value==="Corte + Gravação"){
   [...Object.keys(materiais),...Object.keys(produtos)]
   .forEach(i=>item.innerHTML+=`<option>${i}</option>`);
 }
}

// ================= ESPESSURA =================
item.onchange=()=>{

 esp.innerHTML="";
 esp.style.display="none";

 if(materiais[item.value] && tipo.value!=="Gravação"){
   esp.style.display="block";
   materiais[item.value].esp.forEach(e=>{
     esp.innerHTML+=`<option>${e}mm</option>`;
   });
 }
}

// ================= VALIDAÇÃO =================
function validar(){
 if(!cliente.value) return alert("Nome obrigatório");
 if(!email.value) return alert("Email obrigatório");
 if(!cep.value) return alert("CEP obrigatório");
 if(!numero.value) return alert("Número obrigatório");
 if(!tipo.value) return alert("Selecione serviço");
 if(!item.value) return alert("Selecione item");
 return true;
}

// ================= ADD =================
function addItem(){

 if(!validar()) return;

 let l=+larg.value,a=+alt.value,q=+qtd.value;

 if(!l||!a||!q) return alert("Informe medidas");

 let valor;

 if(produtos[item.value]){
   valor = produtos[item.value]*q;
 }else{
   valor=((l*a)/100)*materiais[item.value].preco*q;
 }

 itens.push({tipo:tipo.value,item:item.value,esp:esp.value||"-",l,a,q,valor});

 render();
}

// ================= RESUMO =================
function render(){

 let total=0;
 let html=`<b>Pedido ${Date.now()}</b><br><br>`;

 html+=`${cliente.value}<br>${email.value}<br>${endereco.value}, ${numero.value}<br>${bairro.value} - ${cidade.value}<br><br>`;

 itens.forEach((i,x)=>{
 total+=i.valor;

 html+=`${x+1}) ${i.tipo}<br>
 ${i.item} | Esp:${i.esp}<br>
 ${i.l}x${i.a} Qtd:${i.q}<br>
 R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let frete=cep.value.startsWith("03822")?0:15;
 total+=frete;

 let desc=total*0.05;
 let final=total-desc;

 html+=`Frete:${frete===0?"Grátis":"R$"+frete}<br>
 Subtotal:R$${total.toFixed(2)}<br>
 Desconto:-R$${desc.toFixed(2)}<br>
 <b>Total:R$${final.toFixed(2)}</b>`;

 resumo.innerHTML=html;
}

// ================= PIX =================
function gerarPix(){

 if(itens.length===0) return alert("Adicione item");

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let final=Number((total-total*0.05).toFixed(2));

 if(final<=0) return alert("Erro valor");

 fetch("https://pix-romer-art.onrender.com/pix",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({valor:final,email:email.value})
 })
 .then(r=>r.json())
 .then(d=>{

 if(!d.qr_code) return alert("Erro PIX");

 resumo.innerHTML+=`<br><img src="data:image/png;base64,${d.qr_code_base64}" width="200"><br>
 <textarea>${d.qr_code}</textarea><br>
 <b id="status">Aguardando...</b>`;

 verificar(d.id);

 });
}

// ================= STATUS =================
function verificar(id){

 let t=setInterval(()=>{

 fetch("https://pix-romer-art.onrender.com/status/"+id)
 .then(r=>r.json())
 .then(d=>{

 if(d.status==="approved"){
   status.innerHTML="✅ Pago";
   btnWhats.style.display="block";
   pago=true;
   clearInterval(t);
 }

 });

 },3000);
}

// ================= WHATS =================
function enviarWhats(){
 if(!pago) return alert("Pague primeiro");
 window.open("https://wa.me/"+WHATS+"?text="+encodeURIComponent(resumo.innerText));
}

</script>

</body>
</html>
