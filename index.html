<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema SaaS</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

/* HEADER */
header {
  background:#020617;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1e293b;
}

.btn-top {
  background:#2563eb;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* CONTAINER */
.container { padding:20px; }

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card {
  background:#020617;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card h2 { margin:0; }

/* FILTROS */
.filtros {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

/* TABELA */
table {
  width:100%;
  border-collapse:collapse;
  background:#020617;
  border-radius:10px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

/* BADGES */
.badge {
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.pago { background:#16a34a; }
.emitido { background:#2563eb; }
.pendente { background:#475569; }

/* BOTÕES */
button {
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.btn-emitir { background:#22c55e; color:white; }
.btn-disabled { background:#334155; color:#94a3b8; }

.btn-view { background:#0ea5e9; color:white; }
.btn-pdf { background:#a855f7; color:white; }

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<header>
  🚀 Sistema SaaS • Notas Fiscais
  <button class="btn-top" onclick="carregar()">🔄 Atualizar</button>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente ou pedido...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"),2000);
}

/* STATUS */
function statusNormalizado(s){
  if(!s) return "";
  s = s.toLowerCase().trim();
  if(s === "paid") return "pago";
  if(s === "emitido") return "emitido";
  return "pendente";
}

/* CARREGAR */
async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

/* CARDS */
function atualizarCards(){
  document.getElementById("total").innerText = pedidos.length;

  const pendentes = pedidos.filter(p => statusNormalizado(p["Status NF"]) !== "emitido").length;
  const emitidos = pedidos.filter(p => statusNormalizado(p["Status NF"]) === "emitido").length;

  document.getElementById("pendentes").innerText = pendentes;
  document.getElementById("emitidos").innerText = emitidos;
}

/* RENDER */
function render(){
  const tabela = document.getElementById("tabela");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML = "";

  pedidos.forEach((p,i)=>{

    const texto = (p["Nome"] + p["ID Pedido"]).toLowerCase();
    if(!texto.includes(busca)) return;

    const status = statusNormalizado(p["Status NF"]);

    if(filtro==="pendente" && status==="emitido") return;
    if(filtro==="emitido" && status!=="emitido") return;

    let badge = `<span class="badge pendente">PENDENTE</span>`;
    let btnEmitir = `<button class="btn-disabled">Aguardando</button>`;

    if(status==="pago" || status==="pendente"){
      badge = `<span class="badge pago">PAGO</span>`;
      btnEmitir = `<button class="btn-emitir" onclick="emitir(${i},this)">Emitir</button>`;
    }

    if(status==="emitido"){
      badge = `<span class="badge emitido">EMITIDO</span>`;
      btnEmitir = `<button class="btn-disabled">Emitido</button>`;
    }

    tabela.innerHTML += `
    <tr>
      <td>${p["ID Pedido"]}</td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td>${badge}</td>
      <td>
        ${btnEmitir}
        <button class="btn-view" onclick="verNota('${p["Link NF"]}')">👁</button>
        <button class="btn-pdf" onclick="gerarPDF('${p["ID Pedido"]}')">PDF</button>
      </td>
    </tr>`;
  });
}

/* EMITIR */
async function emitir(i,btn){
  const pedido = pedidos[i];

  btn.innerText = "Emitindo...";
  btn.disabled = true;

  try{
    const res = await fetch(API_EMITIR+"?id="+pedido["ID Pedido"]);
    const data = await res.json();

    if(data.ok){

      pedido["Status NF"] = "emitido";
      pedido["Link NF"] = data.link || ("NF-"+pedido["ID Pedido"]);

      render();
      atualizarCards();

      toast("✅ Nota emitida com sucesso!");

    }else{
      toast("Erro ao emitir");
      btn.disabled=false;
      btn.innerText="Emitir";
    }

  }catch(e){
    toast("Erro: "+e.message);
    btn.disabled=false;
    btn.innerText="Emitir";
  }
}

/* OUTROS */
function verNota(link){
  if(!link){ toast("Nota não disponível"); return; }
  window.open(link,"_blank");
}

function gerarPDF(id){
  toast("📄 Gerando PDF em breve...");
}

/* EVENTOS */
document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtro").addEventListener("change",render);

/* AUTO REFRESH */
setInterval(carregar,30000);

carregar();

</script>

</body>
</html>
