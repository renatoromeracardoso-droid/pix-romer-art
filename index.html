<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Romer Art</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:5px}
button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:5px}
.btn-add{background:orange}
.btn-pix{background:green;color:white}
.btn-send{background:#22c55e}
#qrcode{width:200px;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número">
</div>

<div class="card">
<h3>Pedido</h3>

<input id="largura" placeholder="Largura">
<input id="altura" placeholder="Altura">
<input id="quantidade" placeholder="Quantidade">

<button class="btn-add" onclick="addItem()">Adicionar</button>
<button class="btn-pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnEnviar" class="btn-send" onclick="enviarPedido()" disabled>Enviar Pedido</button>
</div>

<div class="card">
<div id="resumo"></div>
<div id="total"></div>

<img id="qrcode">
<input id="copiaPix">
<div id="statusPagamento"></div>
</div>

<script>

let itens=[]
let total=0
let statusPagamento="pending"
let pedidoId=null

function addItem(){
 const largura=Number(larguraEl.value)
 const altura=Number(alturaEl.value)
 const qtd=Number(quantidadeEl.value)

 const preco=qtd*0.20

 itens.push({largura,altura,qtd,preco})
 atualizarResumo()
}

const larguraEl=document.getElementById("largura")
const alturaEl=document.getElementById("altura")
const quantidadeEl=document.getElementById("quantidade")

function atualizarResumo(){
 const div=document.getElementById("resumo")
 const totalDiv=document.getElementById("total")

 div.innerHTML=""
 total=0

 itens.forEach((i,idx)=>{
  total+=i.preco
  div.innerHTML+=`${idx+1}) ${i.largura}x${i.altura} Qtd:${i.qtd} R$ ${i.preco}<br>`
 })

 totalDiv.innerHTML=`Total: R$ ${total.toFixed(2)}`
}

async function gerarPix(){

 pedidoId="PED_"+Date.now()

 const res=await fetch("https://pix-romer-art.onrender.com/pix",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({valor:total,pedidoId})
 })

 const data=await res.json()

 qrcode.src="data:image/png;base64,"+data.qr
 copiaPix.value=data.copia

 statusPagamento="pending"
 atualizarStatus()
 verificarPagamento()
}

function verificarPagamento(){

 const intervalo=setInterval(async()=>{

  const res=await fetch(`https://pix-romer-art.onrender.com/status/${pedidoId}`)
  const data=await res.json()

  if(data.status==="approved"){
   statusPagamento="approved"
   atualizarStatus()
   clearInterval(intervalo)
  }

 },3000)
}

function atualizarStatus(){

 if(statusPagamento==="pending"){
  statusPagamentoDiv.innerHTML="Aguardando pagamento..."
  btnEnviar.disabled=true
 }

 if(statusPagamento==="approved"){
  statusPagamentoDiv.innerHTML="Pagamento aprovado"
  btnEnviar.disabled=false
 }
}

async function enviarPedido(){

 if(statusPagamento!=="approved"){
  alert("Aguardando pagamento")
  return
 }

 const pedido={
  id:pedidoId,
  cliente:{nome:nome.value,email:email.value},
  itens,
  total
 }

 await fetch("https://pix-romer-art.onrender.com/pedido",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify(pedido)
 })

 alert("Pedido enviado 🚀")
}

const statusPagamentoDiv=document.getElementById("statusPagamento")
const btnEnviar=document.getElementById("btnEnviar")

</script>

</body>
</html>
