<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1e293b;
}

.btn-refresh{
  background:#3b82f6;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card h2 {
  margin: 0;
}

/* FILTROS */
.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input, select {
  flex:1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1e293b;
  font-size: 13px;
}

/* STATUS */
.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.pago { background:#16a34a; }
.emitido { background:#2563eb; }
.pendente { background:#475569; }

/* MENU */
.menu-btn {
  background:#1e293b;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
}

.dropdown {
  position:absolute;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:8px;
  display:none;
  flex-direction:column;
  z-index:999;
}

.dropdown button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>
  🚀 Sistema SaaS • Notas Fiscais
  <button class="btn-refresh" onclick="carregar()">Atualizar</button>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2><span>Total</span></div>
  <div class="card"><h2 id="pendentes">0</h2><span>Pendentes</span></div>
  <div class="card"><h2 id="emitidos">0</h2><span>Emitidos</span></div>
</div>

<div class="filtros">
  <input type="text" id="busca" placeholder="Buscar...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>Valor</th>
  <th>Status</th>
  <th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

<div class="toast" id="toast">NF emitida com sucesso</div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];

function statusNormalizado(s){
  if(!s) return "pendente";
  s=s.toLowerCase().trim();
  if(s==="paid") return "pendente";
  if(s==="emitido") return "emitido";
  return "pendente";
}

async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

function atualizarCards(){
  document.getElementById("total").innerText = pedidos.length;
  document.getElementById("emitidos").innerText =
    pedidos.filter(p=>statusNormalizado(p["Status NF"])==="emitido").length;

  document.getElementById("pendentes").innerText =
    pedidos.filter(p=>statusNormalizado(p["Status NF"])==="pendente").length;
}

function render(){
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  pedidos.forEach((p,i)=>{

    const status = statusNormalizado(p["Status NF"]);

    let badge = `<span class="badge pendente">PENDENTE</span>`;
    if(status==="emitido") badge = `<span class="badge emitido">EMITIDO</span>`;

    tabela.innerHTML += `
    <tr>
      <td>${p["ID Pedido"]}</td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td>${badge}</td>
      <td>
        <button class="menu-btn" onclick="toggleMenu(${i})">⋮</button>
        <div class="dropdown" id="menu-${i}">
          ${status==="pendente" ? `<button onclick="emitir(${i})">Emitir NF</button>` : ``}
          <button onclick="verNota(${i})">👁 Ver Nota</button>
        </div>
      </td>
    </tr>
    `;
  });
}

function toggleMenu(i){
  const el = document.getElementById("menu-"+i);
  el.style.display = el.style.display==="flex" ? "none" : "flex";
}

async function emitir(i){
  const pedido = pedidos[i];

  try{
    await fetch(API_EMITIR+"?id="+pedido["ID Pedido"]);

    pedidos[i]["Status NF"] = "emitido";

    atualizarCards();
    render();

    mostrarToast();

  }catch(e){
    alert("Erro ao emitir");
  }
}

function verNota(i){
  const p = pedidos[i];

  const url = "nota.html?id=" + p["ID Pedido"]
  + "&nome=" + encodeURIComponent(p["Nome"])
  + "&cpf=" + p["CPF/CNPJ"]
  + "&servico=" + encodeURIComponent(p["Serviço"])
  + "&valor=" + p["Valor"]
  + "&data=" + encodeURIComponent(p["Data"]);

  window.open(url,"_blank");
}

function mostrarToast(){
  const t = document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

carregar();

</script>

</body>
</html>
