<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt Pedidos</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
input, select, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button { font-weight:bold }
.add{background:orange}
.pix{background:green;color:white}
.enviar{background:#22c55e;color:white}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">

<h3>Pedido</h3>
<select id="tipo">
  <option value="Corte">Corte</option>
  <option value="Gravação">Gravação</option>
</select>

<select id="material">
  <option value="MDF">MDF</option>
  <option value="Acrílico">Acrílico</option>
</select>

<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

<div class="card" id="resumo"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCAeWy1XtDSe12sj89HF9gSiJId9IsVWbrTQPm4h3_OQJ39_rHUEglzVCFfVuJald2/exec"

let itens = []
let pixId = null
let pedidoId = "PED-" + Date.now()

// CEP automático
cep.addEventListener("blur", async () => {
  const c = cep.value.replace(/\D/g,"")
  if(c.length !== 8) return

  const res = await fetch(`https://viacep.com.br/ws/${c}/json/`)
  const d = await res.json()

  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""
})

// validação geral
function validar(){
  if(!nome.value || !email.value || !cep.value || !numero.value){
    alert("Preencha todos os campos obrigatórios (*)")
    return false
  }

  if(itens.length === 0){
    alert("Adicione pelo menos um item")
    return false
  }

  return true
}

// adicionar item
function addItem(){

  const l = Number(largura.value)
  const a = Number(altura.value)
  const q = Number(qtd.value)

  if(!l || !a || !q){
    alert("Preencha largura, altura e quantidade")
    return
  }

  if(l > 400 || a > 400){
    alert("Limite máximo 400mm")
    return
  }

  const area = (l*a)/10000
  const valor = area * 0.10 * q

  itens.push({
    tipo: tipo.value,
    material: material.value,
    l,a,q,valor
  })

  atualizarResumo()
}

// total
function total(){
  return itens.reduce((s,i)=>s+i.valor,0)
}

// resumo completo
function atualizarResumo(status="Aguardando pagamento"){

  let html = ""

  html += `<b>Pedido:</b> ${pedidoId}<br><br>`

  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `<b>Email:</b> ${email.value}<br>`
  html += `<b>Endereço:</b><br>`
  html += `${rua.value}, ${numero.value}<br>`
  html += `${bairro.value} - ${cidade.value}<br><br>`

  html += `<b>Itens:</b><br>`

  itens.forEach((i,idx)=>{
    html += `${idx+1}) ${i.tipo} - ${i.material}<br>`
    html += `${i.l}x${i.a} mm | Qtd: ${i.q}<br>`
    html += `R$ ${i.valor.toFixed(2)}<br><br>`
  })

  html += `<hr>`
  html += `<b>Total: R$ ${total().toFixed(2)}</b><br>`
  html += `<b>Status:</b> ${status}<br><br>`

  html += `<img id="qrcode" width="200"><br>`
  html += `<p id="pixCopia"></p>`

  resumo.innerHTML = html
}

// gerar PIX
async function gerarPix(){

  if(!validar()) return

  const res = await fetch("https://pix-romer-art.onrender.com/pix",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ valor: total() })
  })

  const data = await res.json()

  if(!data.id){
    alert("Erro ao gerar PIX")
    return
  }

  pixId = data.id

  atualizarResumo()

  document.getElementById("qrcode").src =
    "data:image/png;base64," + data.qr_code_base64

  document.getElementById("pixCopia").innerText =
    data.copiaecola

  monitorar()
}

// monitoramento pagamento
function monitorar(){

  const loop = setInterval(async ()=>{

    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pixId}`)
    const data = await res.json()

    if(data.status === "approved"){
      atualizarResumo("Pagamento aprovado ✅")
      clearInterval(loop)
    }

  },4000)
}

// enviar pedido
async function enviarPedido(){

  if(!validar()) return

  const dados = {
    pedido: pedidoId,
    nome: nome.value,
    email: email.value,
    cep: cep.value,
    rua: rua.value,
    bairro: bairro.value,
    cidade: cidade.value,
    numero: numero.value,
    total: total(),
    itens,
    status: "Novo"
  }

  try{

    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify(dados)
    })

    const json = await res.json()

    if(!json.ok){
      alert("Erro ao salvar: " + json.erro)
      return
    }

  }catch(e){
    alert("Erro conexão planilha")
    return
  }

  // WhatsApp
  let msg = `📦 Pedido ${pedidoId}%0A`
  msg += `👤 ${nome.value}%0A`
  msg += `📍 ${rua.value}, ${numero.value}%0A%0A`

  itens.forEach((i,idx)=>{
    msg += `🔹 ${i.tipo} ${i.material}%0A`
    msg += `${i.l}x${i.a} | Qtd:${i.q} | R$${i.valor.toFixed(2)}%0A`
  })

  msg += `%0A💰 Total: R$ ${total().toFixed(2)}`

  window.open(`https://wa.me/5511946447040?text=${msg}`)

  alert("Pedido enviado com sucesso 🚀")
}

</script>

</body>
</html>
