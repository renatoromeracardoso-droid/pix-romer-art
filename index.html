<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* BOTÃO */
.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card h2 { margin:0 }

/* FILTROS */
.filtros {
  margin-top:15px;
  display:flex;
  gap:10px;
}

input, select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

/* TABELA */
.table-container {
  margin-top:15px;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

/* BADGES */
.badge {
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido { background:#2563eb; }
.pendente { background:#475569; }

/* MENU */
.acoes button {
  background:#1e293b;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="atualizarManual()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card">
    <h2 id="pendentes">0</h2>
    <span>Pendentes</span>
  </div>
  <div class="card">
    <h2 id="emitidos">0</h2>
    <span>Emitidos</span>
  </div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";
const API_EMITIR = "https://script.google.com/macros/s/AKfycbyTLu9rYTVUAxxaXKq6NMQBFd2-Ud-sPn7sVjaKXL8kdJw8joJlAv9uPpzEy72e8duBEg/exec";

let pedidos = [];
let menuAtual = null;

/* STATUS */
function statusNormalizado(s) {
  if (!s) return "pendente";
  s = s.toLowerCase();
  if (s === "emitido") return "emitido";
  return "pendente";
}

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2500);
}

/* CARREGAR */
async function carregar() {
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

/* ATUALIZAR */
function atualizarManual() {
  const btn = document.querySelector(".btn-refresh");
  btn.innerText = "Atualizando...";
  carregar();

  setTimeout(() => {
    btn.innerText = "Atualizar";
  }, 1000);
}

/* CARDS */
function atualizarCards() {
  document.getElementById("total").innerText = pedidos.length;

  document.getElementById("pendentes").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"]) === "pendente").length;

  document.getElementById("emitidos").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"]) === "emitido").length;
}

/* RENDER */
function render() {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  pedidos.forEach((p, i) => {

    const status = statusNormalizado(p["Status NF"]);

    let badge = `<span class="badge pendente">PENDENTE</span>`;
    if (status === "emitido") {
      badge = `<span class="badge emitido">EMITIDO</span>`;
    }

    tabela.innerHTML += `
      <tr>
        <td>${p["ID Pedido"]}</td>
        <td>${p["Nome"]}</td>
        <td>R$ ${p["Valor"]}</td>
        <td>${badge}</td>
        <td>
          <div class="acoes">
            <button onclick="abrirMenu(${i}, this)">⋮</button>
          </div>
        </td>
      </tr>
    `;
  });
}

/* MENU */
function abrirMenu(i, el) {
  fecharMenu();

  const p = pedidos[i];
  const menu = document.createElement("div");
  menu.className = "menu-popup";

  if (statusNormalizado(p["Status NF"]) !== "emitido") {
    const btnEmitir = document.createElement("button");
    btnEmitir.innerHTML = "📄 Emitir Nota";
    btnEmitir.onclick = () => emitir(i);
    menu.appendChild(btnEmitir);
  }

  const ver = document.createElement("button");
  ver.innerHTML = "👁 Ver Nota";
  ver.onclick = () => window.open(p["Link NF"] || "#");
  menu.appendChild(ver);

  const pdf = document.createElement("button");
  pdf.innerHTML = "📥 Gerar PDF";
  pdf.onclick = () => gerarPDF(p["ID Pedido"]);
  menu.appendChild(pdf);

  document.body.appendChild(menu);

  const rect = el.getBoundingClientRect();
  menu.style.top = rect.bottom + "px";
  menu.style.left = rect.left + "px";
  menu.style.display = "flex";

  menuAtual = menu;
}

function fecharMenu() {
  if (menuAtual) menuAtual.remove();
}

document.addEventListener("click", e => {
  if (!e.target.closest(".acoes")) fecharMenu();
});

/* EMITIR */
async function emitir(i) {
  const pedido = pedidos[i];

  pedido["Status NF"] = "emitido";
  render();
  atualizarCards();

  showToast("Nota emitida com sucesso 🚀");

  try {
    await fetch(API_EMITIR + "?id=" + pedido["ID Pedido"]);
    setTimeout(() => carregar(), 1500);
  } catch (e) {
    showToast("Erro ao emitir ❌");
  }
}

/* PDF */
function gerarPDF(id) {
  showToast("Gerando PDF...");
}

/* INIT */
carregar();

</script>

</body>
</html>
