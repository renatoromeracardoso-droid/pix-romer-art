<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomerArt Pedidos</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px }
input, select, button {
  width:100%; padding:12px; margin:6px 0;
  border-radius:8px; border:none
}
button { font-weight:bold }
.add{background:orange}
.pix{background:green;color:white}
.enviar{background:#22c55e;color:white}
.card{
  background:#1e293b; padding:15px;
  border-radius:10px; margin-top:15px
}
</style>
</head>

<body>

<h2>🚀 RomerArt Pedidos</h2>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">

<h3>Pedido</h3>

<select id="tipoServico"></select>
<select id="material"></select>
<select id="produto"></select>
<select id="espessura"></select>

<input id="largura" placeholder="Largura (mm)">
<input id="altura" placeholder="Altura (mm)">
<input id="qtd" placeholder="Quantidade">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

<div class="card" id="resumo"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCAeWy1XtDSe12sj89HF9gSiJId9IsVWbrTQPm4h3_OQJ39_rHUEglzVCFfVuJald2/exec"

let config = []
let itens = []
let pixId = null
let pedidoId = "PED-" + Date.now()

// CEP AUTO
cep.addEventListener("blur", async ()=>{
  const c = cep.value.replace(/\D/g,"")
  if(c.length !== 8) return
  const r = await fetch(`https://viacep.com.br/ws/${c}/json/`)
  const d = await r.json()
  rua.value = d.logradouro || ""
  bairro.value = d.bairro || ""
  cidade.value = d.localidade || ""
})

// CARREGAR CONFIG
async function carregarConfig(){
  const res = await fetch(SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify({ tipo:"config" })
  })
  config = await res.json()
  preencherTipoServico()
}

// SELECTS
function preencherTipoServico(){
  const lista = [...new Set(config.map(i=>i.tipo_servico))]
  tipoServico.innerHTML = lista.map(i=>`<option>${i}</option>`).join("")
  atualizarMaterial()
}

function atualizarMaterial(){
  const lista = config
    .filter(i=>i.tipo_servico === tipoServico.value)
    .map(i=>i.material)

  material.innerHTML =
    [...new Set(lista)].map(i=>`<option>${i}</option>`).join("")

  atualizarProduto()
}

function atualizarProduto(){
  const lista = config
    .filter(i =>
      i.tipo_servico === tipoServico.value &&
      i.material === material.value
    )
    .map(i=>i.produto)

  produto.innerHTML =
    [...new Set(lista)].map(i=>`<option>${i}</option>`).join("")

  atualizarEspessura()
}

function atualizarEspessura(){

  if(tipoServico.value === "Gravação"){
    espessura.style.display = "none"
    return
  }

  espessura.style.display = "block"

  const lista = config.filter(i =>
    i.tipo_servico === tipoServico.value &&
    i.material === material.value &&
    i.produto === produto.value
  )

  espessura.innerHTML =
    lista.map(i=>`<option>${i.espessura}</option>`).join("")
}

// PREÇO
function getPreco(){
  const item = config.find(i =>
    i.tipo_servico === tipoServico.value &&
    i.material === material.value &&
    i.produto === produto.value &&
    (tipoServico.value === "Gravação" || i.espessura === espessura.value)
  )
  return item ? item.preco_m2 : 0
}

// VALIDAR
function validar(){
  if(!nome.value || !email.value || !cep.value || !numero.value){
    alert("Preencha os campos obrigatórios")
    return false
  }
  if(itens.length === 0){
    alert("Adicione itens")
    return false
  }
  return true
}

// ADD ITEM
function addItem(){

  const l = Number(largura.value)
  const a = Number(altura.value)
  const q = Number(qtd.value)

  if(!l || !a || !q){
    alert("Preencha medidas")
    return
  }

  if(l > 400 || a > 400){
    alert("Máximo 400mm")
    return
  }

  const preco = getPreco()
  if(!preco){
    alert("Preço não encontrado")
    return
  }

  const area = (l*a)/1000000
  const valor = area * preco * q

  itens.push({
    tipoServico: tipoServico.value,
    material: material.value,
    produto: produto.value,
    espessura: espessura.value || "-",
    l,a,q,valor
  })

  atualizarResumo()
}

// TOTAL
function total(){
  return itens.reduce((s,i)=>s+i.valor,0)
}

// RESUMO
function atualizarResumo(status="Aguardando pagamento"){

  let html = `<b>Pedido:</b> ${pedidoId}<br><br>`

  html += `<b>Cliente:</b> ${nome.value}<br>`
  html += `${rua.value}, ${numero.value}<br>`
  html += `${bairro.value} - ${cidade.value}<br><br>`

  itens.forEach((i,idx)=>{
    html += `${idx+1}) ${i.tipoServico} - ${i.material} - ${i.produto}<br>`
    html += `${i.l}x${i.a} mm | Qtd:${i.q}<br>`
    html += `R$ ${i.valor.toFixed(2)}<br><br>`
  })

  html += `<hr><b>Total: R$ ${total().toFixed(2)}</b><br>`
  html += `<b>Status:</b> ${status}<br><br>`
  html += `<img id="qrcode" width="200"><br>`
  html += `<p id="pixCopia"></p>`

  resumo.innerHTML = html
}

// PIX
async function gerarPix(){
  if(!validar()) return

  const res = await fetch("https://pix-romer-art.onrender.com/pix",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ valor: total() })
  })

  const data = await res.json()

  pixId = data.id

  atualizarResumo()

  document.getElementById("qrcode").src =
    "data:image/png;base64," + data.qr_code_base64

  document.getElementById("pixCopia").innerText =
    data.copiaecola

  monitorar()
}

// STATUS
function monitorar(){
  const loop = setInterval(async ()=>{
    const res = await fetch(`https://pix-romer-art.onrender.com/status/${pixId}`)
    const data = await res.json()

    if(data.status === "approved"){
      atualizarResumo("Pagamento aprovado ✅")
      clearInterval(loop)
    }
  },4000)
}

// ENVIAR
async function enviarPedido(){

  if(!validar()) return

  const dados = {
    tipo:"pedido",
    pedido: pedidoId,
    nome: nome.value,
    email: email.value,
    cep: cep.value,
    rua: rua.value,
    bairro: bairro.value,
    cidade: cidade.value,
    numero: numero.value,
    total: total(),
    itens,
    status: "Novo"
  }

  try{
    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify(dados)
    })

    const json = await res.json()

    if(!json.ok){
      alert("Erro ao salvar: " + json.erro)
      return
    }

  }catch(e){
    alert("Erro conexão planilha")
    return
  }

  let msg = `📦 Pedido ${pedidoId}%0A`
  msg += `👤 ${nome.value}%0A`
  msg += `📍 ${rua.value}, ${numero.value}%0A%0A`

  itens.forEach(i=>{
    msg += `🔹 ${i.tipoServico} ${i.material} ${i.produto}%0A`
    msg += `${i.l}x${i.a} | Qtd:${i.q} | R$${i.valor.toFixed(2)}%0A`
  })

  msg += `%0A💰 Total: R$ ${total().toFixed(2)}`

  window.open(`https://wa.me/5511946447040?text=${msg}`)

  alert("Pedido enviado 🚀")
}

// EVENTOS
tipoServico.onchange = atualizarMaterial
material.onchange = atualizarProduto
produto.onchange = atualizarEspessura

// INIT
carregarConfig()

</script>

</body>
</html>
