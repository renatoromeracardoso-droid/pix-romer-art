<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{font-weight:bold}
.add{background:#f97316}
.pix{background:#16a34a}
.whats{background:#25d366;display:none}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>🚀 RomerArt Pedidos</h2>

<div class="card">
<h3>Cliente</h3>
<input id="nome" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipoServico"></select>
<select id="material"></select>
<select id="produto"></select>
<select id="espessura"></select>

<select id="tamanho" style="display:none">
<option value="">Tamanho</option>
<option>P</option><option>M</option><option>G</option><option>GG</option>
</select>

<select id="cor" style="display:none">
<option value="">Cor</option>
<option>Branco</option><option>Preto</option><option>Colorido</option>
</select>

<input id="largura" placeholder="Largura mm">
<input id="altura" placeholder="Altura mm">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnEnviar" class="whats" onclick="enviarPedido()">Enviar Pedido</button>

</div>

<div id="resumo" class="card"></div>

<script>

// LINKS
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCAeWy1XtDSe12sj89HF9gSiJId9IsVWbrTQPm4h3_OQJ39_rHUEglzVCFfVuJald2/exec"
const CONFIG_GERAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=1418164853&single=true&output=csv"
const API_PIX = "https://pix-romer-art.onrender.com"
const WHATS = "5511946447040"

let config=[], configGeral={}, itens=[], pixId=null, pago=false
let pedidoId="PED-"+Date.now()

// CSV
function csvToJson(csv){
 let linhas=csv.split("\n")
 let headers=linhas[0].split(",")
 let res=[]
 for(let i=1;i<linhas.length;i++){
  let obj={}
  let atual=linhas[i].split(",")
  headers.forEach((h,j)=>obj[h.trim()]=atual[j]?.trim())
  res.push(obj)
 }
 return res
}

// CONFIG GERAL
async function carregarConfigGeral(){
 let r=await fetch(CONFIG_GERAL_URL)
 let txt=await r.text()
 let dados=csvToJson(txt)
 dados.forEach(i=>configGeral[i.chave]=Number(i.valor))
}

// CONFIG
async function carregar(){
 await carregarConfigGeral()
 let r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({tipo:"config"})})
 config=await r.json()
 tipoServico.innerHTML=[...new Set(config.map(i=>i.tipo_servico))].map(i=>`<option>${i}</option>`).join("")
 atualizarMaterial()
}

// CEP
cep.onblur=async()=>{
 let c=cep.value.replace(/\D/g,'')
 if(c.length!=8)return
 let r=await fetch(`https://viacep.com.br/ws/${c}/json/`)
 let d=await r.json()
 rua.value=d.logradouro||""
 bairro.value=d.bairro||""
 cidade.value=d.localidade||""
}

// SELECTS
function atualizarMaterial(){
 material.innerHTML=[...new Set(config.filter(i=>i.tipo_servico==tipoServico.value).map(i=>i.material))].map(i=>`<option>${i}</option>`).join("")
 atualizarProduto()
}
function atualizarProduto(){
 produto.innerHTML=[...new Set(config.filter(i=>i.tipo_servico==tipoServico.value && i.material==material.value).map(i=>i.produto))].map(i=>`<option>${i}</option>`).join("")
 atualizarExtras()
}
function atualizarExtras(){

 if(produto.value=="Camiseta"){
  tamanho.style.display="block"
  cor.style.display="block"
 }else{
  tamanho.style.display="none"
  cor.style.display="none"
 }

 if(tipoServico.value=="Gravação"){
  espessura.style.display="none"
 }else{
  espessura.style.display="block"
  espessura.innerHTML=config
   .filter(i=>i.tipo_servico==tipoServico.value && i.material==material.value && i.produto==produto.value)
   .map(i=>`<option>${i.espessura}</option>`).join("")
 }
}

// VALIDAÇÃO
function validar(){
 if(!nome.value||!email.value||!cep.value||!numero.value){
  alert("Preencha os campos obrigatórios")
  return false
 }
 return true
}

// PREÇO
function getPreco(){
 let item=config.find(i=>
  i.tipo_servico==tipoServico.value &&
  i.material==material.value &&
  i.produto==produto.value &&
  (tipoServico.value=="Gravação"||i.espessura==espessura.value)
 )
 return item?Number(item.preco_m2):0
}

// ADD
function addItem(){

 if(!validar()) return

 let q=Number(qtd.value||1)
 let preco=getPreco()
 if(!preco){alert("Preço não encontrado");return}

 let valor=0

 if(produto.value=="Camiseta"){
  if(!tamanho.value||!cor.value){alert("Selecione tamanho e cor");return}
  valor=preco*q
  if(cor.value=="Colorido") valor+=5*q
 }else{
  let l=Number(largura.value||0)
  let a=Number(altura.value||0)
  if(!l||!a){alert("Informe medidas");return}
  if(l>400||a>400){alert("Máx 400mm");return}
  let area=(l*a)/1000000
  valor=area*preco*q
 }

 itens.push({
  tipo:tipoServico.value,
  material:material.value,
  produto:produto.value,
  esp:espessura.value||"-",
  tamanho:tamanho.value||"-",
  cor:cor.value||"-",
  l:largura.value||"-",
  a:altura.value||"-",
  q:q,
  valor:valor
 })

 render()
}

// TOTAL
function total(){return itens.reduce((s,i)=>s+i.valor,0)}

// FRETE
function frete(){
 let c=cep.value.replace(/\D/g,'')
 if(c.startsWith("03822")) return 0
 return configGeral.frete_base||15
}

// RESUMO
function render(status="Aguardando pagamento"){

 let desc=total()*(configGeral.desconto_pix||0.05)
 let final=total()-desc+frete()

 let html=`<b>Pedido:</b> ${pedidoId}<br><br>`
 html+=`${nome.value}<br>${rua.value}, ${numero.value}<br>${bairro.value} - ${cidade.value}<br><br>`

 itens.forEach((i,x)=>{
  html+=`${x+1}) ${i.tipo} | ${i.material} | ${i.produto}<br>`
  if(i.produto=="Camiseta"){
   html+=`Tam:${i.tamanho} | Cor:${i.cor}<br>`
  }else{
   html+=`${i.l}x${i.a}mm | Esp:${i.esp}<br>`
  }
  html+=`Qtd:${i.q} - R$${i.valor.toFixed(2)}<br><br>`
 })

 html+=`Subtotal: R$ ${total().toFixed(2)}<br>`
 html+=`Desconto: -R$ ${desc.toFixed(2)}<br>`
 html+=`Frete: ${frete()==0?"Grátis":"R$ "+frete()}<br>`
 html+=`<b>Total: R$ ${final.toFixed(2)}</b><br>`
 html+=`Status: ${status}<br><br>`
 html+=`<img id="qr" width="200"><br><textarea id="pix"></textarea>`

 resumo.innerHTML=html
}

// PIX
async function gerarPix(){

 if(itens.length==0){alert("Adicione item");return}

 let final=total()-(total()*(configGeral.desconto_pix||0.05))+frete()

 let r=await fetch(API_PIX+"/pix",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({valor:final,email:email.value})
 })

 let d=await r.json()
 if(!d.qr_code){alert("Erro PIX");return}

 pixId=d.id
 pago=false

 render()

 qr.src="data:image/png;base64,"+d.qr_code_base64
 pix.value=d.qr_code

 monitorar()
}

// STATUS
function monitorar(){
 let t=setInterval(async()=>{
  let r=await fetch(API_PIX+"/status/"+pixId)
  let d=await r.json()
  if(d.status==="approved"){
   pago=true
   btnEnviar.style.display="block"
   render("Pagamento aprovado ✅")
   clearInterval(t)
  }
 },3000)
}

// ENVIAR
async function enviarPedido(){

 if(!pago){alert("Pagamento não confirmado");return}

 let dados={
  tipo:"pedido",
  pedido:pedidoId,
  nome:nome.value,
  email:email.value,
  cep:cep.value,
  rua:rua.value,
  bairro:bairro.value,
  cidade:cidade.value,
  numero:numero.value,
  total:total(),
  itens
 }

 await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(dados)})

 let msg=`📦 Pedido ${pedidoId}%0A👤 ${nome.value}%0A📍 ${rua.value}, ${numero.value}%0A%0A`
 itens.forEach(i=>{
  msg+=`${i.tipo} ${i.material} ${i.produto}%0AQtd:${i.q} R$${i.valor.toFixed(2)}%0A`
 })
 window.open(`https://wa.me/${WHATS}?text=${msg}`)
}

// EVENTOS
tipoServico.onchange=atualizarMaterial
material.onchange=atualizarProduto
produto.onchange=atualizarExtras

carregar()

</script>

</body>
</html>
