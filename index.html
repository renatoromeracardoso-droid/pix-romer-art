<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

button {
  background: #22c55e;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>CPF/CNPJ</th>
  <th>Email</th>
  <th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

async function carregarPedidos() {

  const url = "https://pix-romer-art.onrender.com/pedidos";

  const resposta = await fetch(url);
  const dados = await resposta.json();

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  dados.forEach(p => {

    tabela.innerHTML += `
      <tr>
        <td>${p["ID Pedido"] || "-"}</td>
        <td>${p["Nome"] || "-"}</td>
        <td>${p["CPF/CNPJ"] || "-"}</td>
        <td>${p["Email"] || "-"}</td>
        <td>
          <button onclick="emitirNota(
            '${p["ID Pedido"]}',
            '${p["Nome"]}',
            '${p["CPF/CNPJ"]}',
            '${p["Email"]}'
          )">
            Emitir Nota
          </button>
        </td>
      </tr>
    `;
  });
}

function emitirNota(id, nome, cpf, email) {

  fetch("https://hook.us2.make.com/nuq3e37vp5tkkpxtef51nqf51n63rssa", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      id_pedido: id,
      nome,
      cpf_cnpj: cpf,
      email
    })
  });

  alert("Nota enviada!");
}

carregarPedidos();

</script>

</body>
</html>
