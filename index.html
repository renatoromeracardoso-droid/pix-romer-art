<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt</title>

<style>
body{
 background:#0f172a;
 font-family:Arial;
 color:#fff;
 margin:0;
}

.header{
 background:#020617;
 padding:15px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
}

.app{
 max-width:420px;
 margin:auto;
 padding:15px;
}

.card{
 background:#1e293b;
 padding:15px;
 border-radius:14px;
 margin-bottom:12px;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

input,select{
 width:100%;
 padding:12px;
 margin-top:8px;
 border-radius:10px;
 border:none;
 font-size:14px;
}

button{
 width:100%;
 padding:14px;
 margin-top:10px;
 border:none;
 border-radius:12px;
 color:#fff;
 font-weight:bold;
 font-size:15px;
 transition:.2s;
}

button:active{transform:scale(.97);}

.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#22c55e;}

.box{
 background:#1e293b;
 padding:15px;
 border-radius:14px;
 margin-top:10px;
}

.status{
 padding:10px;
 border-radius:10px;
 font-weight:bold;
 text-align:center;
 margin-top:10px;
}

.ok{background:#16a34a;}
.wait{background:#f59e0b;}
</style>

<!-- FIREBASE (CORRETO CDN) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>
<body>

<div class="header">🚀 RomerArt</div>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="cliente" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="endereco" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Pedido</h3>

<select id="tipo">
<option value="">Selecione</option>
<option>Corte</option>
<option>Gravação</option>
</select>

<select id="material">
<option>MDF</option>
<option>ACRILICO</option>
</select>

<input id="larg" placeholder="Largura (máx 400)">
<input id="alt" placeholder="Altura (máx 400)">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="whats" onclick="enviarWhats()" disabled>Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

// 🔥 FIREBASE CONFIG (SEU)
var firebaseConfig = {
 apiKey: "AIzaSyCLvB0Eydzka9KU09w9lTou9CIF-oGiVHo",
 authDomain: "firestore-database-9b92d.firebaseapp.com",
 projectId: "firestore-database-9b92d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= VARS =================
let itens=[];
let pago=false;
let pedidoId=null;

// ================= CEP =================
cep.onblur=async()=>{
 let c=cep.value.replace(/\D/g,'');
 if(c.length!==8)return;

 let d=await (await fetch("https://viacep.com.br/ws/"+c+"/json/")).json();

 endereco.value=d.logradouro||"";
 bairro.value=d.bairro||"";
 cidade.value=d.localidade||"";
}

// ================= LIMITES =================
larg.oninput=()=>{if(larg.value>400)larg.value=400;}
alt.oninput=()=>{if(alt.value>400)alt.value=400;}

// ================= ADD =================
function addItem(){

 let l=Number(larg.value);
 let a=Number(alt.value);
 let q=Number(qtd.value);

 if(!l || !a || !q){
   alert("Preencha corretamente");
   return;
 }

 let valor=((l*a)/100)*0.1*q+2;

 itens.push({l,a,q,valor});
 render();
}

// ================= RENDER =================
function render(){

 let total=0;
 let html=`<b>📦 Pedido ${Date.now()}</b><br><br>`;

 html+=`
 <b>Cliente</b><br>
 ${cliente.value}<br>
 ${email.value}<br>
 ${endereco.value}, ${numero.value}<br>
 ${bairro.value} - ${cidade.value}<br><br>
 `;

 itens.forEach((i,x)=>{
 total+=i.valor;

 html+=`
 ${x+1}) ${i.l}x${i.a} mm | Qtd:${i.q}<br>
 R$ ${i.valor.toFixed(2)}<br><br>
 `;
 });

 let desc=total*0.05;
 let final=total-desc;

 html+=`
 <b>Subtotal:</b> R$ ${total.toFixed(2)}<br>
 <b>Desconto PIX:</b> -R$ ${desc.toFixed(2)}<br>
 <b>Total:</b> R$ ${final.toFixed(2)}
 `;

 resumo.innerHTML=html;
}

// ================= PIX =================
function gerarPix(){

 if(itens.length===0){
   alert("Adicione item");
   return;
 }

 pago=false;
 btnWhats.disabled=true;

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let final=Number((total-total*0.05).toFixed(2));

 resumo.innerHTML += "<br><br>Gerando PIX...";

 fetch("https://pix-romer-art.onrender.com/pix",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   valor: final,
   email: email.value
 })
 })
 .then(r=>r.json())
 .then(async d=>{

 if(!d.qr_code){
   alert("Erro ao gerar PIX");
   return;
 }

 resumo.innerHTML += `
 <br><br>
 <img src="data:image/png;base64,${d.qr_code_base64}" width="200"><br>
 <textarea style="width:100%">${d.qr_code}</textarea>
 <div id="status" class="status wait">Aguardando pagamento...</div>
 `;

 // 🔥 SALVA PEDIDO
 let doc = await db.collection("pedidos").add({
   cliente:cliente.value,
   email:email.value,
   total:final,
   status:"pendente",
   criado:new Date()
 });

 pedidoId = doc.id;

 verificar(d.id);

 });
}

// ================= STATUS =================
function verificar(id){

 let t=setInterval(()=>{

 fetch("https://pix-romer-art.onrender.com/status/"+id+"?t="+Date.now(),{
   cache:"no-store"
 })
 .then(r=>r.json())
 .then(async d=>{

 let s=String(d.status).toLowerCase();

 if(s==="approved"){

 document.getElementById("status").innerHTML="✅ PAGAMENTO APROVADO";
 document.getElementById("status").className="status ok";

 btnWhats.disabled=false;

 pago=true;
 clearInterval(t);

 // 🔥 ATUALIZA FIREBASE
 if(pedidoId){
   db.collection("pedidos").doc(pedidoId).update({
     status:"pago"
   });
 }

 }

 });

 },3000);
}

// ================= WHATS =================
function enviarWhats(){

 if(!pago){
   alert("Pagamento não confirmado");
   return;
 }

 window.open("https://wa.me/5511946447040?text="+encodeURIComponent(resumo.innerText));
}

</script>

</body>
</html>
