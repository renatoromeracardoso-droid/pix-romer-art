<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

header {
  background: #020617;
  padding: 15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.btn-refresh {
  background: #3b82f6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container { padding: 15px; }

.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.filtros {
  margin-top:15px;
  display:flex;
  gap:10px;
}

input, select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

.table-container {
  margin-top:15px;
  overflow-x:auto;
}

table { width:100%; border-collapse: collapse; }

th, td {
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.badge {
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.emitido { background:#22c55e; color:black; }
.pendente { background:#f59e0b; color:black; }

.acoes button {
  background:#1e293b;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

.menu-popup {
  position: absolute;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 8px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="carregar()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card">
    <h2 id="pendentes">0</h2>
    <span>Pendentes</span>
  </div>
  <div class="card">
    <h2 id="emitidos">0</h2>
    <span>Emitidos</span>
  </div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://opensheet.elk.sh/1rc7bmVfGwuSjrHTTYNxOdAWx9DPp5CdQetycT4EaGkM/Notas";

let pedidos = [];
let menuAtual = null;

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function statusNormalizado(s){
  return (s || "").toLowerCase() === "emitido" ? "emitido" : "pendente";
}

async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

function atualizarCards(){
  document.getElementById("total").innerText = pedidos.length;
  document.getElementById("pendentes").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"])==="pendente").length;
  document.getElementById("emitidos").innerText =
    pedidos.filter(p => statusNormalizado(p["Status NF"])==="emitido").length;
}

function render(){
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  pedidos.forEach((p,i)=>{

    const status = statusNormalizado(p["Status NF"]);

    if(filtro !== "todos" && status !== filtro) return;
    if(busca && !p["Nome"].toLowerCase().includes(busca)) return;

    const badge = status==="emitido"
      ? `<span class="badge emitido">EMITIDO</span>`
      : `<span class="badge pendente">PENDENTE</span>`;

    tabela.innerHTML += `
      <tr>
        <td>${p["ID Pedido"]}</td>
        <td>${p["Nome"]}</td>
        <td>R$ ${p["Valor"]}</td>
        <td>${badge}</td>
        <td><button onclick="abrirMenu(${i}, this)">⋮</button></td>
      </tr>
    `;
  });
}

/* 🔥 GERAR LINK AUTOMÁTICO */
function gerarLinkNota(chave){
  return `https://www.nfse.gov.br/EmissorNacional/Notas/Visualizar/Index/${chave}`;
}

/* 🔥 ABRIR NOTA */
function abrirNotaReal(p){
  if(p["Chave NF"]){
    window.open(gerarLinkNota(p["Chave NF"]), "_blank");
  } else {
    showToast("Sem chave da nota");
  }
}

/* 🔥 DECLARAÇÃO DE CONTEÚDO */
function declaracao(p){
  const texto = `
DECLARAÇÃO DE CONTEÚDO

Remetente:
ROMER ART
CNPJ: 66.252.416/0001-05

Destinatário:
${p["Nome"]}

Conteúdo:
${p["Serviço"]}

Valor: R$ ${p["Valor"]}

Declaro que o conteúdo não é proibido e está de acordo com as normas dos Correios.
`;

  const w = window.open();
  w.document.write("<pre>"+texto+"</pre>");
}

/* MENU */
function abrirMenu(i, el){
  fecharMenu();

  const p = pedidos[i];
  const menu = document.createElement("div");
  menu.className = "menu-popup";

  const emitir = document.createElement("button");
  emitir.innerHTML = "📄 Emitir Nota";
  emitir.onclick = () => showToast("Emitir manual no portal");
  menu.appendChild(emitir);

  const ver = document.createElement("button");
  ver.innerHTML = "👁 Ver Nota";
  ver.onclick = () => abrirNotaReal(p);
  menu.appendChild(ver);

  const declar = document.createElement("button");
  declar.innerHTML = "📦 Declaração Conteúdo";
  declar.onclick = () => declaracao(p);
  menu.appendChild(declar);

  document.body.appendChild(menu);

  const rect = el.getBoundingClientRect();
  menu.style.top = rect.bottom+"px";
  menu.style.left = rect.left+"px";
  menu.style.display = "flex";

  menuAtual = menu;
}

function fecharMenu(){
  if(menuAtual) menuAtual.remove();
}

document.addEventListener("click", e=>{
  if(!e.target.closest("button")) fecharMenu();
});

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtro").addEventListener("change", render);

carregar();

</script>

</body>
</html>
