<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RomerArt • Sistema NF</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0f172a;color:#e2e8f0;}
header {background:#020617;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
.btn-refresh {background:#3b82f6;padding:8px 14px;border-radius:8px;cursor:pointer;}
.container {padding:15px;}

.cards {display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card {background:#020617;padding:15px;border-radius:12px;text-align:center;}

.filtros {margin-top:15px;display:flex;gap:10px;}

input, select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

table {width:100%;border-collapse:collapse;margin-top:15px;}
th,td {padding:10px;border-bottom:1px solid #1e293b;font-size:13px;}

.badge {padding:5px 12px;border-radius:999px;font-size:11px;font-weight:bold;}
.emitido {background:#22c55e;color:#000;}
.pendente {background:#f59e0b;color:#000;}

.menu-popup {
  position:absolute;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:8px;
  display:none;
  flex-direction:column;
  z-index:999;
}

.menu-popup button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
.toast.show {opacity:1;}
</style>
</head>

<body>

<header>
🚀 Sistema SaaS • Notas
<div class="btn-refresh" onclick="carregar()">Atualizar</div>
</header>

<div class="container">

<div class="cards">
  <div class="card"><h2 id="total">0</h2>Total</div>
  <div class="card"><h2 id="pendentes">0</h2>Pendentes</div>
  <div class="card"><h2 id="emitidos">0</h2>Emitidos</div>
  <div class="card"><h2 id="envios">0</h2>Envios</div>
</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar cliente...">
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="emitido">Emitidos</option>
  </select>
</div>

<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Valor</th>
<th>Status</th>
<th>Envio</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwEY9Ybci7rULdNEiS49_vcXPi2_vsPtwk-R5s1ndNjSn3qx4Y4o7GWpVpXAxDm_8LwZQ/exec";

let pedidos = [];
let menuAtual = null;

/* STATUS */
function statusNF(s){
  s = (s || "").toLowerCase();
  if(s === "emitido") return "emitido";
  return "pendente";
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* FECHAR MENU */
function fecharMenu(){
  if(menuAtual){
    menuAtual.remove();
    menuAtual = null;
  }
}

/* CARREGAR */
async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  atualizarCards();
  render();
}

/* CARDS */
function atualizarCards(){
  total.innerText = pedidos.length;
  pendentes.innerText = pedidos.filter(p=>statusNF(p["Status NF"])==="pendente").length;
  emitidos.innerText = pedidos.filter(p=>statusNF(p["Status NF"])==="emitido").length;
  envios.innerText = pedidos.filter(p=>p["Frete"]).length;
}

/* RENDER */
function render(){

  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  tabela.innerHTML="";

  pedidos.forEach((p,i)=>{

    const status = statusNF(p["Status NF"]);

    if(filtro !== "todos" && status !== filtro) return;
    if(busca && !(p["Nome"]||"").toLowerCase().includes(busca)) return;

    tabela.innerHTML+=`
    <tr>
      <td>
        <button onclick="menu(${i},this)">⋮</button>
        ${p["ID Pedido"]}
      </td>
      <td>${p["Nome"]}</td>
      <td>R$ ${p["Valor"]}</td>
      <td><span class="badge ${status}">${status}</span></td>
      <td>${p["Frete"]?"📦":"-"}</td>
    </tr>`;
  });
}

/* MENU */
function menu(i,el){

  fecharMenu(); // 🔥 garante que nunca fica aberto duplicado

  const p = pedidos[i];
  const m = document.createElement("div");
  m.className="menu-popup";

  let html="";

  // 🔥 ESCONDE BOTÕES CONFORME STATUS
  if(statusNF(p["Status NF"]) !== "emitido"){
    html+=`<button onclick="emitir(${i})">📄 Emitir Nota</button>`;
  }

  if(!p["Frete"]){
    html+=`<button onclick="envio(${i})">📦 Gerar Envio</button>`;
  }

  html+=`<button onclick="nota(${i})">👁 Nota</button>`;
  html+=`<button onclick="pdf(${i})">📥 PDF</button>`;
  html+=`<button onclick="declaracao(${i})">📦 Declaração</button>`;

  m.innerHTML=html;

  document.body.appendChild(m);

  const r=el.getBoundingClientRect();
  m.style.top=r.bottom+"px";
  m.style.left=r.left+"px";
  m.style.display="flex";

  menuAtual=m;
}

/* CLICK FORA = FECHA MENU */
document.addEventListener("click", (e)=>{
  if(!e.target.closest(".menu-popup") && !e.target.closest("button")){
    fecharMenu();
  }
});

/* AÇÕES */
async function emitir(i){
  fecharMenu(); // 🔥 fecha instantâneo
  toast("Emitindo...");
  await fetch(API+"?acao=emitir&id="+pedidos[i]["ID Pedido"]);
  await carregar(); // 🔥 recarrega dados atualizados
}

async function envio(i){
  fecharMenu(); // 🔥 fecha instantâneo
  toast("Gerando envio...");
  await fetch(API+"?acao=envio&id="+pedidos[i]["ID Pedido"]);
  await carregar(); // 🔥 atualiza tela
}

function nota(i){
  fecharMenu();
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}`);
}

function pdf(i){
  fecharMenu();
  window.open(`nota.html?id=${pedidos[i]["ID Pedido"]}&pdf=1`);
}

function declaracao(i){
  fecharMenu();
  const p = pedidos[i];
  window.open(`declaracao.html?nome=${p["Nome"]}&valor=${p["Valor"]}`);
}

/* FILTROS */
document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtro").addEventListener("change", render);

/* INIT */
carregar();

</script>

  

</body>
</html>
