<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Notas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

button {
  padding: 8px 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<h1>Painel de Notas Fiscais</h1>

<table>
<thead>
<tr>
  <th>Pedido</th>
  <th>Cliente</th>
  <th>CPF/CNPJ</th>
  <th>Email</th>
  <th>Ação</th>
</tr>
</thead>

<tbody id="tabela">
</tbody>
</table>

<script>

const API_URL = "https://pix-romer-art.onrender.com/pedidos";

async function carregarDados() {
  try {
    const resposta = await fetch(API_URL);
    const dados = await resposta.json();

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    dados.forEach(item => {

      console.log("DADO:", item); // debug

      const id = item["ID Pedido"] || item["ID"] || "-";
      const nome = item["Nome"] || item["Cliente"] || "-";
      const cpf = item["CPF/CNPJ"] || item["CPF"] || "-";
      const email = item["Email"] || "-";

      const linha = `
        <tr>
          <td>${id}</td>
          <td>${nome}</td>
          <td>${cpf}</td>
          <td>${email}</td>
          <td>
            <button onclick="emitirNota('${id}')">
              Emitir Nota
            </button>
          </td>
        </tr>
      `;

      tabela.innerHTML += linha;
    });

  } catch (erro) {
    console.error("Erro ao carregar dados:", erro);
    alert("Erro ao carregar pedidos");
  }
}

function emitirNota(id) {
  alert("Emitir nota para pedido: " + id);

  // Próximo nível: aqui vamos integrar com Make 🔥
}

carregarDados();

</script>

</body>
</html>
