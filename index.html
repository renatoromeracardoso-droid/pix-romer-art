<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RomerArt Pedidos</title>

<style>
body{background:#0f172a;font-family:Arial;color:#fff;}
.app{max-width:420px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:#fff;font-weight:bold;}
.add{background:#f97316;}
.pix{background:#16a34a;}
.whats{background:#25d366;display:none;}
.box{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h3>Cliente</h3>
<input id="cliente" placeholder="Nome *">
<input id="email" placeholder="Email *">
<input id="cep" placeholder="CEP *">
<input id="endereco" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="numero" placeholder="Número *">
</div>

<div class="card">
<h3>Serviço</h3>

<select id="tipo"></select>
<select id="item"></select>
<select id="esp"></select>

<input id="larg" placeholder="Largura mm (máx 400)">
<input id="alt" placeholder="Altura mm (máx 400)">
<input id="qtd" value="1">

<button class="add" onclick="addItem()">Adicionar</button>
<button class="pix" onclick="gerarPix()">Gerar PIX</button>
<button id="btnWhats" class="whats" onclick="enviarWhats()">Enviar Pedido</button>

</div>

<div id="resumo" class="box"></div>

</div>

<script>

// ================= CONFIG =================
const WHATS = "5511946447040";

const URLS = {
 config:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=170544498&output=csv",
 servicos:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=51228853&output=csv",
 produtos:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=189072882&output=csv",
 materiais:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-EWqn0pnDWtXB4Jz54d4OuVzcb9VEVKWU5cHYr76cc_RjKc76Mt00s51AEfOAbrx2T_xsBnriDFeH/pub?gid=0&output=csv"
};

let DB = {servicos:[],produtos:[],materiais:[]};
let itens = [];
let pago = false;

// ================= CSV =================
function csvToJson(csv){
 let linhas = csv.split("\n").filter(l=>l.trim());
 let headers = linhas[0].split(",");
 return linhas.slice(1).map(l=>{
   let obj={};
   l.split(",").forEach((v,i)=> obj[headers[i].trim()] = v.trim());
   return obj;
 });
}

// ================= CARREGAR PLANILHA =================
async function carregarDB(){

 DB.servicos = csvToJson(await (await fetch(URLS.servicos)).text());
 DB.produtos = csvToJson(await (await fetch(URLS.produtos)).text());
 DB.materiais = csvToJson(await (await fetch(URLS.materiais)).text());

 tipo.innerHTML = "<option value=''>Selecione</option>";
 DB.servicos.forEach(s=> tipo.innerHTML += `<option>${s.nome}</option>`);
}

// ================= TROCA SERVIÇO =================
tipo.onchange = ()=>{

 item.innerHTML="<option value=''>Selecione</option>";

 if(tipo.value==="Corte"){
   DB.materiais.forEach(m=> item.innerHTML+=`<option>${m.nome}</option>`);
 }

 if(tipo.value==="Gravação"){
   DB.produtos.forEach(p=> item.innerHTML+=`<option>${p.nome}</option>`);
 }

 if(tipo.value==="Corte + Gravação"){
   [...DB.materiais,...DB.produtos].forEach(x=> item.innerHTML+=`<option>${x.nome}</option>`);
 }
}

// ================= ESPESSURA =================
item.onchange = ()=>{

 esp.innerHTML="";
 esp.style.display="none";

 let mat = DB.materiais.find(m=>m.nome===item.value);

 if(mat && tipo.value !== "Gravação"){
   esp.style.display="block";
   mat.espessuras.split("|").forEach(e=>{
     esp.innerHTML+=`<option>${e}mm</option>`;
   });
 }
}

// ================= CEP =================
cep.onblur = async ()=>{
 let c = cep.value.replace(/\D/g,'');
 if(c.length!==8)return;
 let d = await (await fetch("https://viacep.com.br/ws/"+c+"/json/")).json();
 endereco.value=d.logradouro||"";
 bairro.value=d.bairro||"";
 cidade.value=d.localidade||"";
}

// ================= LIMITES =================
larg.oninput=()=>{ if(larg.value>400) larg.value=400; }
alt.oninput=()=>{ if(alt.value>400) alt.value=400; }

// ================= ADD =================
function addItem(){

 let l=+larg.value,a=+alt.value,q=+qtd.value;

 if(!l||!a||!q)return alert("Preencha medidas");

 let valor = ((l*a)/100)*0.1*q + 2;

 itens.push({
   tipo:tipo.value,
   item:item.value,
   esp:esp.value||"-",
   l,a,q,valor
 });

 render();
}

// ================= RESUMO =================
function render(){

 let total=0;
 let html=`<b>Pedido ${Date.now()}</b><br><br>`;

 html+=`${cliente.value}<br>${email.value}<br>${endereco.value}, ${numero.value}<br>${bairro.value} - ${cidade.value}<br><br>`;

 itens.forEach((i,x)=>{
   total+=i.valor;
   html+=`${x+1}) ${i.tipo}<br>${i.item} | Esp:${i.esp}<br>${i.l}x${i.a} Qtd:${i.q}<br>R$ ${i.valor.toFixed(2)}<br><br>`;
 });

 let frete = cep.value.startsWith("03822")?0:15;

 total+=frete;

 let desc=total*0.05;
 let final=total-desc;

 html+=`Frete:${frete===0?"Grátis":"R$"+frete}<br>Subtotal:R$${total.toFixed(2)}<br>Desconto:-R$${desc.toFixed(2)}<br><b>Total:R$${final.toFixed(2)}</b>`;

 resumo.innerHTML=html;
}

// ================= PIX =================
function gerarPix(){

 let total=itens.reduce((s,i)=>s+i.valor,0);
 let final=Number((total-total*0.05).toFixed(2));

 fetch("https://pix-romer-art.onrender.com/pix",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({valor:final,email:email.value})
 })
 .then(r=>r.json())
 .then(d=>{

 resumo.innerHTML+=`<br><img src="data:image/png;base64,${d.qr_code_base64}" width="200"><br><textarea>${d.qr_code}</textarea><br><b id="status">Aguardando...</b>`;

 verificar(d.id);

 });
}

// ================= STATUS =================
function verificar(id){

 let t=setInterval(()=>{

 fetch("https://pix-romer-art.onrender.com/status/"+id)
 .then(r=>r.json())
 .then(d=>{

 if(d.status==="approved"){
   status.innerHTML="✅ Pago";
   btnWhats.style.display="block";
   pago=true;
   clearInterval(t);
 }

 });

 },3000);
}

// ================= WHATS =================
function enviarWhats(){

 if(!pago)return alert("Pague primeiro");

 window.open("https://wa.me/"+WHATS+"?text="+encodeURIComponent(resumo.innerText));
}

// ================= START =================
carregarDB();

</script>

</body>
</html>
