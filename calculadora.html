<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Bancos</title>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px }
.card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:20px }
table { width:100%; border-collapse: collapse; margin-top:10px }
th, td { padding:8px; border-bottom:1px solid #334155; text-align:left }
th { background:#020617 }
.best { color:#22c55e; font-weight:bold }
input { width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:10px }
button { width:100%; padding:12px; border:none; border-radius:10px; background:#22c55e; color:#000; font-weight:bold }
.highlight { background:#064e3b }
</style>
</head>
<body><div class="card">
<h2>Valor do Produto</h2>
<input type="number" id="valor" placeholder="Ex: 100">
</div><button onclick="calcular()">Calcular Melhor Opção</button>

<div id="tabelas"></div><script>

// 🔵 NUVEM PAGO (ATUALIZADO)
const nuvemPago = {
 nome: "Nuvem Pago",
 pix: 0.99,
 credito: [
   {prazo:"2 dias", taxa:5.19, fixa:0.35},
   {prazo:"14 dias", taxa:4.69, fixa:0.35},
   {prazo:"30 dias", taxa:4.19, fixa:0.35}
 ],
 boleto: 2.39
};

// 🟡 MERCADO PAGO (COM +2% DA NUVEM)
const mercadoPago = {
 nome: "Mercado Pago",
 pix: 0.99 + 2, // 2% adicional
 credito: [
   {prazo:"Na hora", taxa:4.98 + 2, fixa:0},
   {prazo:"14 dias", taxa:4.49 + 2, fixa:0},
   {prazo:"30 dias", taxa:3.98 + 2, fixa:0}
 ],
 boleto: 3.49 + 0 // fixo permanece
};

const bancos = [nuvemPago, mercadoPago];

function calcPix(v, t){ return v - (v*t/100); }
function calcCred(v, t, f){ return v - (v*t/100) - f; }
function calcBol(v, f){ return v - f; }

function calcular(){
 let valor = parseFloat(document.getElementById('valor').value) || 0;
 let melhorGlobal = {valor:0, texto:"", id:""};
 let html = "";

 bancos.forEach((b, i) => {
   let melhorBanco = {valor:0, texto:""};

   html += `<div class='card'><h2>${b.nome}</h2>`;
   html += `<table><tr><th>Tipo</th><th>Condição</th><th>Líquido</th></tr>`;

   // PIX
   let pix = calcPix(valor, b.pix);
   let idPix = `${i}-pix`;
   html += `<tr id='${idPix}'><td>PIX</td><td>Na hora</td><td>R$ ${pix.toFixed(2)}</td></tr>`;

   if(pix > melhorBanco.valor){ melhorBanco = {valor:pix, texto:`PIX (Na hora)`}; }
   if(pix > melhorGlobal.valor){ melhorGlobal = {valor:pix, texto:`${b.nome} - PIX`, id:idPix}; }

   // Crédito
   b.credito.forEach((c, j) => {
     let v = calcCred(valor, c.taxa, c.fixa);
     let id = `${i}-cred-${j}`;

     html += `<tr id='${id}'><td>Crédito</td><td>${c.prazo}</td><td>R$ ${v.toFixed(2)}</td></tr>`;

     if(v > melhorBanco.valor){ melhorBanco = {valor:v, texto:`Crédito (${c.prazo})`}; }
     if(v > melhorGlobal.valor){ melhorGlobal = {valor:v, texto:`${b.nome} - Crédito (${c.prazo})`, id:id}; }
   });

   // Boleto
   let bol = calcBol(valor, b.boleto);
   let idBol = `${i}-bol`;

   html += `<tr id='${idBol}'><td>Boleto</td><td>Padrão</td><td>R$ ${bol.toFixed(2)}</td></tr>`;

   if(bol > melhorBanco.valor){ melhorBanco = {valor:bol, texto:`Boleto`}; }
   if(bol > melhorGlobal.valor){ melhorGlobal = {valor:bol, texto:`${b.nome} - Boleto`, id:idBol}; }

   html += `</table>`;
   html += `<p class='best'>🏆 Melhor neste banco: ${melhorBanco.texto} → R$ ${melhorBanco.valor.toFixed(2)}</p>`;
   html += `</div>`;
 });

 html += `<div class='card'><h2 class='best'>🏆 Melhor Geral</h2>
 <p>${melhorGlobal.texto} → R$ ${melhorGlobal.valor.toFixed(2)}</p></div>`;

 document.getElementById('tabelas').innerHTML = html;

 // destacar melhor linha
 if(melhorGlobal.id){
   document.getElementById(melhorGlobal.id).classList.add('highlight');
 }
}

</script></body>
</html>
