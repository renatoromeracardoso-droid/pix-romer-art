<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:10px}
</style>
</head>

<body>

<h2>Pedidos</h2>
<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
 apiKey:"SUA_KEY",
 authDomain:"firestore-database-9b92d.firebaseapp.com",
 projectId:"firestore-database-9b92d"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

db.collection("pedidos").onSnapshot(snapshot=>{

 const div=document.getElementById("lista")
 div.innerHTML=""

 snapshot.forEach(doc=>{
  const p=doc.data()

  div.innerHTML+=`
  <div class="card">
   <b>${p.cliente.nome}</b><br>
   Total: R$ ${p.total}<br>
   Status: ${p.status}<br>
   Pagamento: ${p.pagamento}<br>

   <button onclick="update('${doc.id}','produção')">Produção</button>
   <button onclick="update('${doc.id}','enviado')">Enviado</button>
  </div>`
 })

})

function update(id,status){
 db.collection("pedidos").doc(id).update({status})
}

</script>

</body>
</html>
