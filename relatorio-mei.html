<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório MEI</title>

<style>
body{
  font-family:Arial;
  background:#fff;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.topo{
  margin-bottom:15px;
  display:flex;
  gap:10px;
  align-items:center;
}

select{
  padding:8px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

td{
  border:2px solid black;
  padding:6px;
}

.title{
  text-align:center;
  font-weight:bold;
  background:#eee;
}

.section{
  font-weight:bold;
  background:#f5f5f5;
}

.right{
  text-align:right;
}

.btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

@media print{
  .btn,.topo{display:none;}
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
  📅 Período:
  <input type="month" id="mes" onchange="carregar()">
</div>

<table>

<tr>
  <td colspan="3" class="title">RELATÓRIO MENSAL DAS RECEITAS BRUTAS</td>
</tr>

<tr>
  <td colspan="3">CNPJ: <span id="cnpj">-</span></td>
</tr>

<tr>
  <td colspan="3">Empreendedor individual: <span id="nome">-</span></td>
</tr>

<tr>
  <td colspan="3">Período de apuração: <span id="periodo">-</span></td>
</tr>

<tr class="section">
  <td colspan="3">REVENDA DE MERCADORIAS (COMÉRCIO)</td>
</tr>

<tr>
  <td>I – Sem nota</td>
  <td class="right" id="r1">R$ 0</td>
</tr>

<tr>
  <td>II – Com nota</td>
  <td class="right" id="r2">R$ 0</td>
</tr>

<tr>
  <td>III – Total</td>
  <td class="right" id="r3">R$ 0</td>
</tr>

<tr class="section">
  <td>X - Total geral</td>
  <td class="right" id="total">R$ 0</td>
</tr>

</table>

<button class="btn" onclick="window.print()">🖨 Imprimir</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzxPEsJg9iOwMIYey4ZyazDnhcgIHdV8rzE1aeF_y9Q78LHNHhlLyPUjy4nTTbegmC4zA/exec";

// define mês atual automático
const hoje = new Date();
document.getElementById("mes").value = hoje.toISOString().slice(0,7);

async function carregar(){

  const mesSelecionado = document.getElementById("mes").value;

  const r = await fetch(API);
  const dados = await r.json();

  let comNF = 0;
  let semNF = 0;

  dados.forEach(p=>{

    if(!p["Data"]) return;

    const data = new Date(p["Data"]);
    const mesPedido = data.toISOString().slice(0,7);

    if(mesPedido !== mesSelecionado) return;

    const valor = parseFloat(p["Valor"]||0);

    if((p["Status NF"]||"").toLowerCase()=="emitido"){
      comNF += valor;
    }else{
      semNF += valor;
    }

  });

  document.getElementById("r1").innerText = "R$ " + semNF.toFixed(2);
  document.getElementById("r2").innerText = "R$ " + comNF.toFixed(2);
  document.getElementById("r3").innerText = "R$ " + (semNF+comNF).toFixed(2);
  document.getElementById("total").innerText = "R$ " + (semNF+comNF).toFixed(2);

  // Nome do mês bonito
  const [ano,mes] = mesSelecionado.split("-");
  const nomeMes = new Date(ano, mes-1).toLocaleDateString('pt-BR',{month:'long'});

  document.getElementById("periodo").innerText = nomeMes + "/" + ano;

  document.getElementById("nome").innerText = "RomerArt";
  document.getElementById("cnpj").innerText = "SEU CNPJ";

}

carregar();

</script>

</body>
</html>
