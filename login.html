<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • RomerArt</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

/* 🔥 LOGO */
.logo img{
  height:60px;
  margin-bottom:10px;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#f97316;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.erro{
  color:red;
  font-size:12px;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

  <!-- 🔥 LOGO -->
  <div class="logo">
    <img src="RomerArt.png">
  </div>

  <h2>🔐 Login</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="logar()">Entrar</button>

  <div id="erro" class="erro"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwNnaXwAeQW_8GcG067p9JTfJmHeLwtfzT_V55ffcPBOx53LSZJGg9quz0IO8WVQ_miOA/exec";

/* 🔐 LOGIN SAAS */
async function logar(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(!user || !pass){
    erro.innerText = "Preencha usuário e senha";
    return;
  }

  try{

    const r = await fetch(`${API}?acao=login&user=${user}&pass=${pass}`);
    const res = await r.json();

    if(res.ok){

      // 🔥 salva tudo (token + usuario + nivel)
      localStorage.setItem("token", res.token);
      localStorage.setItem("usuario", res.usuario);
      localStorage.setItem("nivel", res.nivel);

      window.location.href = "index.html";

    }else{
      erro.innerText = "Usuário ou senha inválidos";
    }

  }catch(e){
    erro.innerText = "Erro de conexão";
  }
}

/* 🔁 AUTO LOGIN */
const token = localStorage.getItem("token");

if(token){
  fetch(API + "?acao=validar&token=" + token)
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){

        // 🔥 mantém dados atualizados
        localStorage.setItem("usuario", res.usuario);
        localStorage.setItem("nivel", res.nivel);

        window.location.href="index.html";

      }else{
        localStorage.removeItem("token");
      }
    })
    .catch(()=>{});
}

</script>

</body>
</html>
